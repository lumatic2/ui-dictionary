      { value: "both-auto", label: "라이트 + 다크 (시스템 따름)", sub: "기본 추천", rank: 1, bg: "linear-gradient(90deg, rgb(250,248,244) 50%, rgb(29,24,19) 50%)", ink: "rgba(20,18,14,.9)" },
      { value: "light-only", label: "라이트만", sub: "범위 축소", rank: 2, bg: "rgb(250,248,244)", ink: "rgba(28,23,16,.95)" },
      { value: "dark-first", label: "다크 우선", sub: "밤 무드 브랜드", rank: 3, bg: "rgb(24,22,26)", ink: "rgba(244,244,248,.95)" },
    ]},
  { id: "motion", title: "모션 톤 (만져보세요)", type: "demo", hint: "칩에 마우스를 올려보기",
    cands: [
      { value: "minimal", label: "담백", sub: "전환만", rank: 2, cls: "d-plain", desc: "색 전환만, 모션 없음." },
      { value: "standard", label: "표준", sub: "hover + 등장", rank: 1, cls: "d-std", desc: "부양·등장 모션. 대부분의 제품에 알맞음." },
      { value: "rich", label: "풍부", sub: "스크롤·커서 연출", rank: 3, cls: "d-rich", desc: "실험적 표현은 별도 승인." },
    ]},
  { id: "a11y", title: "접근성 레벨", type: "textc", hint: "대비·키보드·스크린리더 기준",
    cands: [
      { value: "aa", label: "WCAG AA", sub: "실무 표준 (4.5:1) — 기본", rank: 1 },
      { value: "aaa-body", label: "AA + 본문 AAA", sub: "본문 7:1 목표", rank: 2 },
      { value: "aaa", label: "WCAG AAA 전면", sub: "공공·의료급", rank: 3 },
    ]},
];
/* ================= 렌더러 (에이전트 수정 불필요) ================= */
const sel = {}; let tileSel = null;
const app = document.getElementById('app');
function wireRow(code) {
  const d = document.createElement('div');
  if (code.startsWith('hd:')) { d.className = 'wire'; const k = code.slice(3);
    const map = { cta: '<div class="w-row"><i style="width:36px;height:8px;flex:none"></i><i style="height:8px"></i><i class="w-accent" style="width:34px;height:8px;flex:none"></i></div>',
      links: '<div class="w-row"><i style="width:36px;height:8px;flex:none"></i><i style="height:8px"></i></div>',
      logo: '<div class="w-row"><i style="width:36px;height:8px;flex:none"></i></div>',
      center: '<div class="w-row"><i style="height:8px"></i><i style="width:36px;height:10px;flex:none"></i><i style="height:8px"></i></div>',
      thin: '<div class="w-row"><i style="height:5px"></i></div>',
      burger: '<div class="w-row"><i style="width:36px;height:8px;flex:none"></i><i style="height:8px;visibility:hidden"></i><i style="width:14px;height:8px;flex:none"></i></div>' };
    d.innerHTML = map[k]; return d; }
  if (code === 'nb') { d.className = 'wire'; d.innerHTML = '<div class="w-row"><i style="height:12px"></i><i class="w-accent" style="width:30%;height:12px;flex:none"></i></div>'; return d; }
  d.className = 'wire';
  if (code.startsWith('h')) d.innerHTML = `<i style="height:${code.slice(1)}px"></i>`;
  else if (code.startsWith('sp')) d.innerHTML = `<div class="w-row"><i style="height:${code.slice(2)}px"></i><i class="w-accent" style="height:${code.slice(2)}px"></i></div>`;
  else if (code.startsWith('sb')) d.innerHTML = `<div class="w-row"><i class="w-accent" style="height:${code.slice(2)}px;flex:.6"></i><i style="height:${code.slice(2)}px"></i></div>`;
  else if (code.startsWith('r:')) d.innerHTML = `<div class="w-row">${'<i style="height:16px"></i>'.repeat(+code.slice(2))}</div>`;
  else if (code.startsWith('b')) d.innerHTML = `<i style="height:${code.slice(1)}px;opacity:.5"></i>`;
  return d;
}
function candBody(axis, c) {
  const b = document.createElement('div'); b.className = 'body-slot';
  if (axis.type === 'mini') {
    b.classList.add('mini');
    b.style.background = c.bg || 'rgb(250,248,244)'; b.style.color = c.ink || 'rgba(28,23,16,.95)';
    if (axis.id === 'accent') { b.style.background = 'rgb(250,249,246)'; b.style.color = 'rgba(24,22,18,.95)'; }
    if (axis.id === 'imagery') { b.style.minHeight = '96px'; b.title = c.label; return b; }
    b.innerHTML = `<div class="m-title">화면 제목</div><div class="m-sub">보조 설명 텍스트</div>
      <span class="m-btn" style="background:${c.ac || '#5a5248'};color:#fff">주요 버튼</span>
      ${c.card ? `<div class="m-card" style="background:${c.card}">카드 위 콘텐츠</div>` : ''}`;
  } else if (axis.type === 'spec') {
    b.classList.add('spec');
    b.innerHTML = `<div class="s-head" style="font-family:${c.hf};font-weight:${c.hw}">오늘 만든 것이 제일 좋다</div>
      <p class="s-body" style="font-family:${c.bf}">본문은 읽기 편해야 합니다. 위계는 굵기와 크기로. 1234 Aa</p>`;
  } else if (axis.type === 'wire') {
    b.style.display = 'flex'; b.style.flexDirection = 'column'; b.style.gap = '5px'; b.style.justifyContent = 'center';
    c.rows.forEach(r => b.appendChild(wireRow(r)));
  } else if (axis.type === 'cardr') {
    b.innerHTML = `<div style="${c.style};border-radius:10px;padding:12px 14px;font-size:11.5px">
      ${c.photo ? '<div style="height:34px;border-radius:6px;background:linear-gradient(135deg,#d9c3a5,#a67c52);margin-bottom:8px"></div>' : ''}
      <b style="font-size:12.5px">카드 제목</b><div style="opacity:.6;margin-top:3px">설명 텍스트 한 줄</div></div>`;
  } else if (axis.type === 'iconr') {
    b.style.display = 'flex'; b.style.gap = '14px'; b.style.alignItems = 'center'; b.style.justifyContent = 'center';
    if (c.none) { b.innerHTML = '<span style="font-size:12px;opacity:.5">텍스트만으로</span>'; }
    else b.innerHTML = ['M4 8h16M4 14h10', 'M12 4l3 6 6 1-4.5 4 1 6-5.5-3-5.5 3 1-6L3 11l6-1z', 'M5 12a7 7 0 1014 0 7 7 0 00-14 0'].map(p =>
      `<svg width="26" height="26" viewBox="0 0 24 24" fill="${c.fill}" stroke="currentColor" stroke-width="${c.sw}" stroke-linecap="round"><path d="${p}"/></svg>`).join('');
  } else if (axis.type === 'demo') {
    b.classList.add(c.cls);
    b.innerHTML = `<span class="demo-chip">올려보세요</span><p style="font-size:12px;opacity:.6;margin-top:8px">${c.desc}</p>`;
  } else if (axis.type === 'textc') {
    b.innerHTML = `<div style="font-size:15px;font-weight:700">${c.label}</div><p style="font-size:12.5px;opacity:.65;margin-top:6px">${c.sub}</p>`;
    b.style.minHeight = '84px';
  }
  return b;
}
function effRank(axis, c) {
  if (tileSel) { const t = TILES.find(t => t.value === tileSel); if (t && t.boost && t.boost[axis.id] === c.value) return 0; }
  return c.rank;
}
function renderAxis(axis) {
  const sec = document.createElement('section'); sec.id = 'ax-' + axis.id;
  sec.innerHTML = `<h2><span class="step">2단</span>${axis.title}</h2><p class="hint">${axis.hint || '추천순 정렬 — 1순위가 왼쪽 위'}</p>`;
  const g = document.createElement('div');
  if (axis.type === 'steps') {
    g.className = 'steps';
    [...axis.cands].sort((a, b) => a.rank - b.rank && 0 || (a.r ?? a.w) - (b.r ?? b.w)).forEach(c => {
      const st = document.createElement('div'); st.className = 'st'; st.tabIndex = 0; st.dataset.value = c.value;
      const box = axis.id === 'radius' ? `<div class="demo-box" style="border-radius:${c.r}px"></div>` : `<div class="demo-box" style="width:${c.w}px"></div>`;
      st.innerHTML = `${box}${c.label}${effRank(axis, c) <= 1 ? ' <span style="color:#1a6b3c">★</span>' : ''}`;
      st.addEventListener('click', () => { g.querySelectorAll('.st').forEach(o => o.classList.remove('sel')); st.classList.add('sel'); sel[axis.id] = c.value; refresh(); });
      st.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); st.click(); } });
      g.appendChild(st);
    });
  } else {
    g.className = 'grid';
    [...axis.cands].sort((a, b) => effRank(axis, a) - effRank(axis, b)).forEach(c => {
      const o = document.createElement('div'); o.className = 'opt'; o.tabIndex = 0; o.dataset.value = c.value;
      if (sel[axis.id] === c.value) o.classList.add('sel');
      const r = effRank(axis, c);
      o.innerHTML = `<span class="rank ${r <= 1 ? 'r1' : ''}">${r === 0 ? '타일 추천' : r + '순위'}</span>`;
      o.appendChild(candBody(axis, c));
      const lb = document.createElement('div'); lb.className = 'label';
      lb.innerHTML = `${c.label}${c.sub ? ` <small>${c.sub}</small>` : ''}`; o.appendChild(lb);
      o.addEventListener('click', () => { g.querySelectorAll('.opt').forEach(x => x.classList.remove('sel')); o.classList.add('sel'); sel[axis.id] = c.value; refresh(); });
      o.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); o.click(); } });
      g.appendChild(o);
    });
  }
  sec.appendChild(g); return sec;
}
function renderAll() {
  app.innerHTML = '';
  const tsec = document.createElement('section');
  tsec.innerHTML = `<h2><span class="step">1단</span>방향 타일 — 큰 방향부터</h2><p class="hint">하나를 고르면 아래 축들이 그 방향 추천순으로 재정렬됩니다 (선택은 자유)</p>`;
  const tg = document.createElement('div'); tg.className = 'tile-grid';
  [...TILES].sort((a, b) => a.rank - b.rank).forEach(t => {
    const o = document.createElement('div'); o.className = 'opt tile'; o.tabIndex = 0;
    if (tileSel === t.value) o.classList.add('sel');
    o.innerHTML = `<span class="rank ${t.rank === 1 ? 'r1' : ''}">${t.rank}순위</span>
      <div class="body-slot" style="background:${t.bg};color:${t.ink}">
        <div class="t-head" style="font-family:${t.font}">${t.name}</div>
        <div class="t-sub">${t.desc}</div>
        <div class="t-row"><span class="t-btn" style="background:${t.accent};color:#fff;border-radius:${t.radius}">버튼</span>
        <span class="t-dot" style="background:${t.accent}"></span><span class="t-dot" style="background:${t.ink};opacity:.25"></span></div>
      </div><div class="label">${t.name}</div>`;
    o.addEventListener('click', () => { tileSel = tileSel === t.value ? null : t.value; renderAll(); refresh(); });
    o.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); o.click(); } });
    tg.appendChild(o);
  });
  tsec.appendChild(tg); app.appendChild(tsec);
  AXES.forEach(a => app.appendChild(renderAxis(a)));
  document.querySelectorAll('.d-rich').forEach(dv => {
    const chip = dv.querySelector('.demo-chip');
    dv.addEventListener('pointermove', e => { const r = dv.getBoundingClientRect();
      chip.style.transform = `translate(${(e.clientX - r.left - r.width / 2) * .07}px, ${(e.clientY - r.top - r.height / 2) * .1}px)`; });
  });
  refresh();
}
function refresh() {
  const n = Object.keys(sel).length;
  document.getElementById('status').textContent = `${n} / ${AXES.length} 축 선택됨${tileSel ? ' · 타일: ' + TILES.find(t => t.value === tileSel).name : ''}`;
  document.getElementById('send').disabled = n < AXES.length;
}
document.getElementById('send').addEventListener('click', async () => {
  const payload = { version: 2, tile: tileSel, selections: sel, submittedAt: new Date().toISOString() };
  try {
    const res = await fetch('/select', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error(res.status);
    document.getElementById('status').textContent = '전달 완료 — 에이전트가 DESIGN.md에 반영합니다.';
    document.getElementById('send').disabled = true;
  } catch {
    const fb = document.getElementById('fallback');
    fb.style.display = 'block'; fb.value = JSON.stringify(payload, null, 2);
    document.getElementById('status').textContent = '서버 전달 실패 — 아래 JSON을 복사해 에이전트에게 붙여넣어 주세요.';
  }
});
renderAll();
</script>
</body>
</html>
