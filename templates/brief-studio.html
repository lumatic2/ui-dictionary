<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
* { box-sizing: border-box; margin: 0; }
body { font-family: ui-sans-serif, system-ui, sans-serif; background: rgb(248,248,246); color: rgba(20,18,14,.95); line-height: 1.6; word-break: keep-all; }
.wrap { max-width: 1440px; margin: 0 auto; padding: 32px 24px 110px; }

#preview { position: sticky; top: 16px; border: 1px solid rgba(20,18,14,.12); border-radius: 14px; overflow: hidden; background: #fff; }
#preview .pv-title { padding: 10px 14px; font-size: 12px; font-weight: 700; letter-spacing: .08em; color: rgba(20,18,14,.5); border-bottom: 1px solid rgba(20,18,14,.08); background: #fff; }
#pv-site { font-size: 10px; line-height: 1.5; word-break: keep-all; }
@media (max-width: 1080px) { .studio-cols { grid-template-columns: 1fr; } #preview { position: static; order: -1; } }
h1 { font-size: 26px; letter-spacing: -0.02em; }
.lead { color: rgba(20,18,14,.58); margin-top: 6px; font-size: 15px; max-width: 70ch; }
h2 { font-size: 19px; margin: 46px 0 2px; }
h2 .step { color: #1a6b3c; font-size: 13px; font-weight: 700; margin-right: 8px; vertical-align: 2px; }
.hint { font-size: 13px; color: rgba(20,18,14,.58); margin-bottom: 14px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
.opt { position: relative; background: #fff; border: 2px solid rgba(20,18,14,.10); border-radius: 12px; cursor: pointer; transition: border-color .15s ease; overflow: hidden; }
.opt:hover { border-color: rgba(20,18,14,.35); }
.opt.sel { border-color: #1a6b3c; }
/* 순위·선택 표시는 오버레이가 아니라 예약된 상단 밴드 — 콘텐츠와 절대 겹치지 않음 (ST1) */
.opt .band { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px 6px; min-height: 30px; background: #fff; border-bottom: 1px solid rgba(20,18,14,.06); }
.opt .rank { font-size: 11px; font-weight: 700; color: rgba(20,18,14,.45); background: rgba(20,18,14,.06); border-radius: 4px; padding: 1px 7px; }
.opt .rank.r1 { color: #1a6b3c; background: rgba(26,107,60,.1); }
.opt .sel-mark { display: none; font-size: 12px; font-weight: 700; color: #1a6b3c; }
.opt.sel .sel-mark { display: inline; }
/* 대형 그룹 (판단 정보가 많은 축: 타일·이미지) */
.grid.lg { grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 16px; }
.grid.lg .body-slot { min-height: 190px; }
.tile-grid .body-slot { min-height: 170px; }
.opt .label { padding: 9px 12px; font-size: 12.5px; font-weight: 600; border-top: 1px solid rgba(20,18,14,.08); display: flex; justify-content: space-between; gap: 8px; }
.opt .label small { font-weight: 400; color: rgba(20,18,14,.55); white-space: nowrap; }
.body-slot { padding: 16px; min-height: 118px; }
/* 타일 */
.tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
.tile .t-head { font-size: 21px; line-height: 1.2; }
.tile .t-sub { font-size: 12px; margin-top: 4px; opacity: .75; }
.tile .t-row { display: flex; gap: 6px; margin-top: 12px; align-items: center; }
.tile .t-btn { padding: 6px 13px; font-size: 11.5px; font-weight: 600; }
.tile .t-dot { width: 14px; height: 14px; border-radius: 999px; }
/* 미니 UI 프리뷰 (베이스/액센트) */
.mini .m-title { font-size: 14px; font-weight: 700; }
.mini .m-sub { font-size: 11.5px; margin-top: 2px; opacity: .62; }
.mini .m-btn { display: inline-block; margin-top: 10px; padding: 6px 12px; border-radius: 6px; font-size: 11.5px; font-weight: 600; }
.mini .m-card { margin-top: 8px; padding: 8px 10px; border-radius: 8px; font-size: 11px; }
/* 스펙시멘 */
.spec .s-head { font-size: 21px; line-height: 1.2; letter-spacing: -0.015em; }
.spec .s-body { font-size: 12.5px; margin-top: 7px; opacity: .78; }
/* 와이어프레임 */
.wire { display: flex; flex-direction: column; gap: 4px; }
.wire i { display: block; background: rgba(20,18,14,.10); border-radius: 3px; font-style: normal; }
.wire .w-accent { background: rgba(26,107,60,.35); }
.wire .w-row { display: flex; gap: 4px; }
.wire .w-row i { flex: 1; }
/* 슬라이더(스텝) */
.steps { display: flex; gap: 8px; padding: 16px; }
.steps .st { flex: 1; text-align: center; padding: 12px 4px 10px; border: 2px solid rgba(20,18,14,.10); border-radius: 10px; cursor: pointer; font-size: 12px; }
.steps .st:hover { border-color: rgba(20,18,14,.35); }
.steps .st.sel { border-color: #1a6b3c; font-weight: 700; }
.steps .st .demo-box { margin: 0 auto 6px; width: 34px; height: 24px; background: rgba(20,18,14,.14); }
/* 데모(모션) */
.demo-chip { display: inline-block; padding: 7px 14px; border-radius: 6px; background: rgba(20,18,14,.08); font-size: 12.5px; }
.d-std .demo-chip { transition: transform .18s ease, box-shadow .18s ease; }
.d-std .demo-chip:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(20,18,14,.12); }
.d-plain .demo-chip { transition: background-color .15s ease; } .d-plain .demo-chip:hover { background: rgba(20,18,14,.16); }
.d-rich .demo-chip { transition: transform .12s ease-out; }
/* ST4: 마우스 인터랙션 종류 데모 */
.d-glow .demo-chip { transition: box-shadow .2s ease; }
.d-glow .demo-chip:hover { box-shadow: 0 0 18px 2px currentColor; }
.d-underline .demo-chip { border-radius: 0; background: transparent !important; border-bottom: 2px solid currentColor; padding-bottom: 4px; position: relative; }
.d-underline .demo-chip::after { content: ""; position: absolute; left: 0; bottom: -2px; height: 2px; width: 0; background: currentColor; transition: width .25s ease; }
.d-underline .demo-chip:hover::after { width: 100%; }
.d-field { position: relative; overflow: hidden; }
.d-field .field-bg { position: absolute; inset: 0; background: radial-gradient(140px circle at var(--fx,50%) var(--fy,50%), currentColor, transparent 70%); opacity: .18; pointer-events: none; transition: opacity .2s; }
.d-field:hover .field-bg { opacity: .32; }
/* 카피 후보 */
.copy-slot { display: grid; place-items: center; text-align: center; }
.copy-slot .c-head { font-size: 19px; line-height: 1.25; letter-spacing: -0.015em; }
.copy-slot .c-sub { font-size: 12.5px; opacity: .7; }
@media (prefers-reduced-motion: reduce) { .opt * { transition: none !important; transform: none !important; } }
/* 제출 바 */
.submit-bar { position: fixed; left: 0; right: 0; bottom: 0; background: rgba(255,255,254,.94); border-top: 1px solid rgba(20,18,14,.10); padding: 12px 24px; display: flex; gap: 16px; align-items: center; justify-content: center; backdrop-filter: blur(6px); z-index: 5; }
.submit-bar .status { font-size: 13px; color: rgba(20,18,14,.58); }
#send { height: 42px; padding: 0 26px; border: none; border-radius: 6px; background: #1a6b3c; color: #fff; font-size: 14.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
#send:hover { background: #14582f; } #send:disabled { opacity: .45; cursor: not-allowed; }
#send:focus-visible { outline: 3px solid rgba(26,107,60,.4); outline-offset: 2px; }
#fallback { display: none; width: 100%; max-width: 640px; font-family: ui-monospace, monospace; font-size: 12px; padding: 10px; }
</style>
</head>

<div class="wrap">
  <h1>Brief Studio <span style="color:#1a6b3c">v2</span></h1>
  <p class="lead">① 먼저 방향 타일을 하나 고르면 아래 후보들이 그 방향 추천순으로 재정렬됩니다 (다른 조합도 자유롭게 선택 가능).

    : `<div style="display:flex;gap:${C.gap}px"><div style="flex:1"><b>브랜드</b></div><div style="flex:1;opacity:.55">링크<br>링크</div><div style="flex:1;opacity:.55">링크<br>링크</div></div>`;
  document.getElementById('pv-site').innerHTML = `
    <div style="background:${C.bg};color:${C.ink};font-family:${C.bf}">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 12px;font-size:9.5px">
        <b style="font-family:${C.hf}">브랜드<span style="color:${C.ac}">.</span></b><span style="display:flex;gap:8px;align-items:center">${nav}${cta2}</span>
      </div>
      ${(comp.pv || ['hero','cards','info']).map(k => (SEC[k] || (() => ''))()).join('')}
      <div style="border-top:1px solid rgba(127,127,127,.25);padding:9px 12px">${footer}</div>
    </div>`;
}
function attachRich() {
  document.querySelectorAll('.d-field').forEach(dv => {
    if (dv.dataset.fieldWired) return; dv.dataset.fieldWired = '1';
    if (!dv.querySelector('.field-bg')) { const f = document.createElement('div'); f.className = 'field-bg'; dv.prepend(f); }
    dv.addEventListener('pointermove', e => { const r = dv.getBoundingClientRect();
      dv.style.setProperty('--fx', ((e.clientX - r.left) / r.width * 100) + '%');
      dv.style.setProperty('--fy', ((e.clientY - r.top) / r.height * 100) + '%'); });
  });
  document.querySelectorAll('.d-rich').forEach(dv => {
    if (dv.dataset.richWired) return; dv.dataset.richWired = '1';
    const chip = dv.querySelector('.demo-chip');
    dv.addEventListener('pointermove', e => { const r = dv.getBoundingClientRect();
      chip.style.transform = `translate(${(e.clientX - r.left - r.width / 2) * .07}px, ${(e.clientY - r.top - r.height / 2) * .1}px)`; });
  });
}
function renderAll() {
  app.innerHTML = '';
  const tsec = document.createElement('section');
  tsec.innerHTML = `<h2><span class="step">1단</span>방향 타일 — 큰 방향부터</h2><p class="hint">하나를 고르면 아래 축들이 그 방향 추천순으로 재정렬되고, 오른쪽 미리보기가 따라옵니다</p>`;
  const tg = document.createElement('div'); tg.className = 'tile-grid';
  [...TILES].sort((a, b) => a.rank - b.rank).forEach(t => {
    const o = document.createElement('div'); o.className = 'opt tile'; o.tabIndex = 0;
    if (tileSel === t.value) o.classList.add('sel');
    o.innerHTML = `<div class="band"><span class="rank ${t.rank === 1 ? 'r1' : ''}">${t.rank}순위</span><span class="sel-mark">✓ 선택됨</span></div>
      <div class="body-slot" style="background:${t.bg};color:${t.ink}">
        <div class="t-head" style="font-family:${t.font}">${t.name}</div>
        <div class="t-sub">${t.desc}</div>
        <div class="t-row"><span class="t-btn" style="background:${t.accent};color:#fff;border-radius:${t.radius}">버튼</span>
        <span class="t-dot" style="background:${t.accent}"></span><span class="t-dot" style="background:${t.ink};opacity:.25"></span></div>
      </div><div class="label">${t.name}</div>`;
    o.addEventListener('click', () => { tileSel = tileSel === t.value ? null : t.value; renderAll(); });
    o.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); o.click(); } });
    tg.appendChild(o);
  });
  tsec.appendChild(tg); app.appendChild(tsec);
  AXES.forEach(a => app.appendChild(renderAxis(a)));
  attachRich(); renderPreview(); refresh();
}
function refresh() {
  const n = Object.keys(sel).length;
  document.getElementById('status').textContent = `${n} / ${AXES.length} 축 선택됨${tileSel ? ' · 타일: ' + TILES.find(t => t.value === tileSel).name : ''}`;
  document.getElementById('send').disabled = n < AXES.length;
}
document.getElementById('send').addEventListener('click', async () => {
  const payload = { version: 2, tile: tileSel, selections: sel, submittedAt: new Date().toISOString() };
  try {
    const res = await fetch('/select', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error(res.status);
    document.getElementById('status').textContent = '전달 완료 — 에이전트가 DESIGN.md에 반영합니다.';
    document.getElementById('send').disabled = true;
  } catch {
    const fb = document.getElementById('fallback');
    fb.style.display = 'block'; fb.value = JSON.stringify(payload, null, 2);
    document.getElementById('status').textContent = '서버 전달 실패 — 아래 JSON을 복사해 에이전트에게 붙여넣어 주세요.';
  }
});
renderAll();
</script>
</body>
</html>
