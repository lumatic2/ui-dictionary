# @askewly/design 를 npm 에 배포한다 — 토큰 없이(OIDC Trusted Publishing).
#
# 왜 수동 트리거인가: 이 패키지는 검사 규칙을 담고 있어 배포가 곧 남의 프로젝트의
# 판정 기준 변경이다. main push 마다 자동으로 나가면 의도하지 않은 규칙이 퍼진다.
# 사람이 버전을 올리고 명시적으로 실행한다.
#
# 절차 정본: docs/design-system/cli-release-procedure.md
name: publish-cli

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true 면 실제 배포 없이 pack 내용만 확인한다"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # OIDC — 이것이 npm 토큰을 대체한다

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing 은 npm 11.5.1+ 에서만 동작한다. setup-node 가 딸려
      # 보내는 npm 은 더 낮을 수 있어 명시적으로 올린다.
      - name: npm 버전 확보
        run: |
          npm install -g npm@latest
          npm --version

      - run: npm ci

      - name: 게이트
        run: |
          npm run build
          npx tsc --noEmit
          npx vitest run

      # 담기는 파일을 로그에 남긴다 — 누출(src/·test/)이 있으면 여기서 보인다.
      - name: pack 내용 확인
        run: npm pack --dry-run

      - name: 배포
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public

      # "publish 가 성공을 찍었다"와 "레지스트리에서 받을 수 있다"는 다른 사실이다.
      # 2026-07-22 최초 배포에서 실제로 3분간 갈렸다.
      #
      # 이 단계는 한 번 틀렸다(run 29852373791): 패키지 문서가 200 이면 통과로 봤는데,
      # 그건 이전 버전 때문에 즉시 통과한다. **버전**이 받아지는지를 물어야 한다.
      - name: 전파 확인 (버전 단위)
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "배포한 버전: $VERSION"
          for i in $(seq 1 20); do
            if npm view "@askewly/design@$VERSION" version > /dev/null 2>&1; then
              echo "try $i: $VERSION 조회 성공"
              exit 0
            fi
            echo "try $i: 아직 전파되지 않음"
            sleep 15
          done
          echo "::error::5분 안에 $VERSION 이 레지스트리에서 조회되지 않았다"
          exit 1

      # 설치와 검사를 분리한다. 합쳐 두면 npx 실패(ETARGET 등)와 "린터가 위반을
      # 찾음"이 둘 다 exit 1 이라 서로를 가린다 — 위 run 에서 실제로 거짓 안심과
      # 거짓 경보가 동시에 났다. 설치가 먼저 실패하면 그 자리에서 멈춘다.
      - name: 레포 밖 실증
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          WORK=$(mktemp -d)
          cd "$WORK"
          npm init -y > /dev/null
          npm install "@askewly/design@$VERSION"   # 실패하면 여기서 멈춘다

          mkdir -p bad clean
          printf 'export const A = () => <div style={{ color: "#111", background: "rgb(1,2,3)" }} />\n' > bad/a.tsx
          printf 'export const B = () => <div className="bg-primary" />\n' > clean/b.tsx
          BIN=node_modules/.bin/askewly-design

          set +e
          "$BIN" verify bad --ext tsx; BAD=$?
          "$BIN" verify clean --ext tsx; CLEAN=$?
          set -e

          echo "bad exit=$BAD (기대 1) · clean exit=$CLEAN (기대 0)"
          [ "$BAD" -eq 1 ]   || { echo "::error::위반이 있는데 exit $BAD"; exit 1; }
          [ "$CLEAN" -eq 0 ] || { echo "::error::깨끗한 코드에 exit $CLEAN (오탐)"; exit 1; }
          echo "레포 밖 실증 OK"
