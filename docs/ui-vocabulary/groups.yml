# UI Vocabulary Groups
#
# 정본 지위: docs/design-system/pattern-taxonomy.md §4, §6
# term의 미세 분류(~74종 추정, 실측 57종). 각 group은 category 하위 소속이며,
# term -> group 소속은 이 파일이 아니라 각 term의 `group` 필드(terms.yml)가 갖는다.
# 이 파일은 group id/category/label 정의만 갖는다 (ids 배열 없음).
#
# 생성 이력: scripts/build-ui-vocabulary-data.mjs가 이 파일을 읽어
# examples/ui-vocabulary-site/src/data/terms.generated.ts 에 groups로 방출한다.

