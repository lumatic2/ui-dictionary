# UI Vocabulary candidate inbox.
#
# Temporary buffer for the current collection batch.
# Keep only plausible non-duplicate candidates here.
# Run both audit commands before promotion:
# - `node scripts/audit-ui-vocabulary-candidates.mjs`
# - `node scripts/audit-ui-vocabulary-candidates.mjs --strict-duplicates`
#
# Workflow:
# 1. Pick one narrow batch theme and collect about 20 candidates.
# 2. Add candidate entries below.
# 3. Run audit and strict duplicate audit.
# 4. Remove duplicates, or turn them into aliases/related notes on existing terms.
# 5. Move remaining clean entries to terms.yml and remove them from this inbox.
# 6. Run validation/build/lint/smoke, then ask before deployment.

# Batch: CF3 empty-collection fill (Blog Sections, Contact Sections,
# Content Sections, Logo Clouds). Source: docs/research/cf3-collection-mapping-2026-07-10.md
# audit confirmed terms.yml has no existing terms for these four collections.
#
# Excluded from this batch: `logo-marquee` (spare candidate recommended by the
# mapping audit). While drafting, found it is a near-duplicate of the existing
# `marquee-row` term (docs/ui-vocabulary/terms.yml, category: style, kind:
# motion-pattern), whose own prompt_phrases already say "고객 로고가 천천히
# 흐르는 marquee row를 넣어줘" — i.e. the logo-marquee use case is already
# covered. Per workflow rule "Same concept: do not add a new term. Add useful
# wording to the existing term's aliases," recommend adding "logo marquee" /
# "로고 마키" to marquee-row's aliases at the next terms.yml promotion touch,
# not adding a new term now.

