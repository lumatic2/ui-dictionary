      note: shadcn block ecosystem content and prose marketing sections
  confidence: medium
- id: cross-sell-related-strip
  status: draft
  category: structure
  group: structure-sections
  kind: block
  ko:
    name: 연관 상품 추천 스트립
    aliases:
      - cross-sell related strip
      - 함께 구매하면 좋은 상품
      - 관련 상품 스트립
  en:
    name: Cross-sell / related products strip
    aliases:
      - Related products strip
      - You may also like strip
  one_liner: 상품 상세나 장바구니 하단에서 관련·추천 상품을 소규모 캐러셀로 보여주는 스트립.
  description: 함께 구매하면 좋은 상품이나 관련 상품 같은 섹션 헤딩 아래 기존 product-card를 가로 스크롤 캐러셀로
    나열한다. 추천 로직 자체는 이 term의 범위 밖이며 UI 구조만 다룬다.
  visual_anatomy:
    - section heading
    - horizontal scrollable row of product-card items
    - scroll affordance
    - optional quick add-to-cart action per item
  when_to_use:
    - 상품 상세나 장바구니 하단에서 관련·연관 상품을 짧게 노출해야 할 때
  anti_use:
    - 추천 로직 자체나 개인화 전략을 설명해야 하면 이 term의 범위 밖이다
  prompt_phrases:
    - 상품 상세 하단에 관련 상품 캐러셀인 cross-sell related strip을 넣어줘
    - 장바구니 아래 함께 구매하면 좋은 상품 스트립을 보여줘
  asset:
    kind: mini-mock
    variant: cross-sell-related-strip
    props:
      items: 4
  sources:
    - source_id: blocks-so-library
      note: shadcn block ecosystem ecommerce related products blocks
  related:
    - id: product-card
      relation: use-with
      note: 상품 상세나 장바구니 하단의 cross-sell related strip은 이 product card를 그대로 재사용하는 캐러셀
        조합이다.
  confidence: medium
- id: danger-zone
  status: draft
  category: structure
  group: structure-sections
  kind: block
  ko:
    name: 위험 구역
    aliases:
      - danger zone
      - 삭제 구역
      - 위험한 설정 섹션
  en:
    name: Danger zone
    aliases:
      - Destructive settings section
      - Advanced destructive actions
  one_liner: 삭제, 소유권 이전, 아카이브처럼 되돌릴 수 없는 작업을 설정 페이지 하단에 격리해 담는 섹션.
  description: 위치와 경고 색으로 실수 클릭을 구조적으로 어렵게 만들고, 각 행동은 다단계 확인을 거치게 한다.
  visual_anatomy:
    - warning-bordered section
    - danger zone heading label
    - action row with short description
    - outlined destructive button
    - typed-confirmation modal
    - consequence explainer text
  when_to_use:
    - 설정 페이지에 삭제·소유권 이전·아카이브처럼 되돌릴 수 없는 행동이 있을 때
  anti_use:
    - 되돌릴 수 있는 일반 설정 변경까지 여기 넣으면 진짜 위험한 행동의 무게가 희석된다
  prompt_phrases:
    - 설정 페이지 맨 아래에 삭제와 소유권 이전이 있는 danger zone 섹션을 만들어줘
    - 위험한 설정을 빨간 테두리로 분리한 danger zone을 넣어줘
  asset:
    kind: mini-mock
    variant: danger-zone
    props:
      actions: 2
  sources:
    - source_id: github-primer-components
      note: destructive settings section pattern
  related:
    - id: destructive-confirmation
      relation: use-with
      note: danger zone의 각 행동 버튼은 즉시 실행되지 않고 destructive confirmation(이름 재입력 등 typed
        confirmation)을 거쳐야 한다
  confidence: medium
