- id: docs-landing-hub-category-cards
  status: draft
  category: structure
  group: structure-sections
  kind: block
  ko:
    name: 문서 랜딩 허브 카드
    aliases:
      - docs landing hub
      - 문서 홈 카테고리 카드
      - 문서 진입 페이지
  en:
    name: Docs landing hub page with category cards
    aliases:
      - Docs home category cards
      - Documentation hub page
  one_liner: 문서 루트 진입 페이지에서 하위 카테고리를 아이콘과 설명이 있는 카드로 나열해 다음 탐색 지점을 고르게 하는 허브 페이지.
  description: 문서 사이트의 최상위 진입점에서 Getting Started, API, Guides 같은 하위 카테고리를 카드 그리드로
    보여준다. 각 카드는 사이드바 최상위 그룹과 1:1로 대응해, 카드를 고르는 것이 사이드바의 한 그룹으로 진입하는 것과 같다.
  visual_anatomy:
    - hub page header
    - category card grid
    - per-card icon
    - per-card title and short description
    - optional item-count or auto-generated excerpt
  when_to_use:
    - 문서가 여러 하위 카테고리로 나뉘어 있고 방문자가 첫 진입에서 목적지를 골라야 할 때
    - 사이드바 트리를 보여주기 전에 상위 개요를 먼저 제공하고 싶을 때
  anti_use:
    - 카테고리가 하나뿐이거나 문서 규모가 작으면 바로 article-documentation-layout으로 진입시키는 편이 낫다
  prompt_phrases:
    - 문서 루트에 카테고리 카드 그리드가 있는 허브 페이지를 만들어줘
    - Getting Started/API/Guides를 아이콘 카드로 나열한 문서 홈을 만들어줘
  asset:
    kind: mini-mock
    variant: docs-landing-hub-category-cards
    props:
      cards: 4
  sources:
    - source_id: ui-patterns-library
      note: documentation landing hub page with category card grid pattern
  confidence: medium
