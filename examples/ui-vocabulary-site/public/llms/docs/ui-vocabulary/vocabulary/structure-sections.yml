- id: container
  status: draft
  category: structure
  group: structure-sections
  ko:
    name: 컨테이너
    aliases:
      - container
      - wrapper
      - 내용 폭
  en:
    name: Container
    aliases:
      - Wrapper
      - Content container
  one_liner: 콘텐츠의 최대 폭과 좌우 여백을 잡아주는 레이아웃 영역.
  description: 넓은 화면에서도 내용이 너무 퍼지지 않게 하고 정렬 기준을 만든다.
  visual_anatomy:
    - max-width boundary
    - horizontal padding
    - centered content
    - responsive width
  when_to_use:
    - 페이지 전체 콘텐츠를 일정 폭 안에 정리할 때
    - 데스크톱에서 읽기 폭을 제한해야 할 때
  anti_use:
    - 모든 작은 요소에 중첩 컨테이너를 만들지 않는다
    - 데이터 테이블처럼 넓이가 필요한 콘텐츠를 억지로 좁히지 않는다
  prompt_phrases:
    - 본문을 가운데 정렬된 container 안에 넣어줘
    - 최대 폭이 있는 콘텐츠 컨테이너를 만들어줘
  asset:
    kind: diagram
    variant: container
    props:
      maxWidth: true
  sources:
    - source_id: material-m3-components
      note: layout and component container usage
  confidence: low
- id: content-section
  status: draft
  category: structure
  group: structure-sections
  kind: block
  ko:
    name: 콘텐츠 섹션
    aliases:
      - content section
      - 본문 콘텐츠 섹션
      - 텍스트 이미지 섹션
  en:
    name: Content section
    aliases:
      - Prose section
      - Text and image section
  one_liner: 제목, 본문 텍스트, 이미지를 묶어 하나의 주제를 설명하는 랜딩 섹션.
  description: 랜딩 페이지나 소개 페이지에서 기능이나 스토리 하나를 긴 설명과 이미지로 풀어낸다.
  visual_anatomy:
    - section heading
    - body copy
    - supporting image
    - optional link or button
  when_to_use:
    - 제품 스토리나 기능 하나를 자세한 글과 이미지로 설명할 때
  anti_use:
    - 사용자가 직접 글을 입력하고 편집해야 하면 rich-text-editor가 필요하다
    - 단순히 화면을 나누기만 하면 범용 section으로 충분하다
  prompt_phrases:
    - 왼쪽에 이미지
    - 오른쪽에 설명 글이 있는 content section을 만들어줘
  related:
    - id: section
      relation: compare
      note: section은 화면을 나누는 범용 구조 개념이고 content-section은 본문 글과 이미지를 담는 구체적인 마케팅 블록이다.
    - id: rich-text-editor
      relation: compare
      note: rich-text-editor는 사용자가 글을 직접 작성하는 입력 위젯이고 content-section은 이미 작성된 콘텐츠를
        보여주는 정적 섹션이다.
  navigation:
    canonical_path:
      - Plus
      - UI Blocks
      - Marketing
      - Page Sections
      - Content Sections
    also_appears_in:
      - - Plus
        - UI Blocks
        - Marketing
        - Page Sections
      - - Plus
        - Templates
        - Marketing Pages
  asset:
    kind: mini-mock
    variant: content-section
  sources:
