- id: billing-summary
  status: draft
  category: data-display
  group: data-commerce-billing
  ko:
    name: 결제 요약
    aliases:
      - billing summary
      - 청구 요약
      - billing overview
  en:
    name: Billing summary
    aliases:
      - Billing overview
      - Subscription summary
  one_liner: 현재 플랜, 다음 청구일, 결제 금액, 결제수단을 요약하는 영역.
  description: 계정 설정에서 구독과 청구 상태를 한눈에 확인하게 한다.
  visual_anatomy:
    - current plan
    - next invoice date
    - amount
    - payment method
    - manage action
  when_to_use:
    - 구독 설정이나 계정 결제 화면의 상단 요약에서
  anti_use:
    - 장바구니 결제 전 합계는 cart summary가 더 정확하다
  prompt_phrases:
    - 플랜 다음 청구일 결제수단이 있는 billing summary를 만들어줘
  asset:
    kind: mini-mock
    variant: billing-summary
    props:
      plan: Pro
  sources:
    - source_id: carbon-design-components
      note: structured summary card patterns
  confidence: medium
- id: cart-summary
  status: draft
  category: data-display
  group: data-commerce-billing
  ko:
    name: 장바구니 요약
    aliases:
      - cart summary
      - 주문 요약
      - checkout summary
  en:
    name: Cart summary
    aliases:
      - Order summary
      - Checkout summary
  one_liner: 상품 합계, 배송비, 할인, 총 결제 금액을 요약하는 영역.
  description: 결제 전 사용자가 비용 구성을 확인하고 다음 단계로 이동하게 한다.
  visual_anatomy:
    - line items
    - subtotal
    - discount
    - shipping
    - total
    - checkout action
  when_to_use:
    - 장바구니나 체크아웃에서 결제 금액을 확인해야 할 때
  anti_use:
    - 주문 완료 이후에는 order status나 receipt가 더 적절하다
  prompt_phrases:
    - 소계 배송비 할인 총액이 있는 cart summary를 만들어줘
  asset:
    kind: mini-mock
    variant: cart-summary
    props:
      total: true
  sources:
    - source_id: material-m3-components
      note: lists and cards for commerce summary
  confidence: medium
- id: cart-summary-bar
  status: draft
  category: data-display
  group: data-commerce-billing
  ko:
    name: 장바구니 요약 바
    aliases:
      - cart summary bar
      - 하단 장바구니 바
      - 주문 요약 바
      - 결제 바
  en:
    name: Cart summary bar
    aliases:
      - Cart bottom bar
      - Checkout summary bar
  one_liner: 모바일 화면 하단에 장바구니 수량, 금액, 결제 버튼을 압축해 보여주는 바.
  description: 사용자가 상품을 둘러보는 동안 현재 장바구니 상태와 다음 행동을 계속 확인하게 한다.
  visual_anatomy:
    - item count
    - total price
    - checkout action
    - sticky bottom bar
  when_to_use:
    - 모바일 쇼핑
    - 음식 주문
    - 예약 흐름에서 누적 선택 상태를 보여줄 때
  anti_use:
    - 상세한 비용 내역은 cart-summary나 checkout screen에 따로 보여준다
  prompt_phrases:
    - 화면 아래에 수량과 총액이 보이는 cart summary bar를 고정해줘
  asset:
    kind: mini-mock
    variant: cart-summary-bar
    props:
      count: 2
  sources:
    - source_id: material-m3-components
      note: bottom action and summary placement
  navigation:
    canonical_path:
      - Plus
      - UI Blocks
      - Ecommerce
      - Components
    also_appears_in:
      - - Plus
        - Templates
        - Ecommerce Screens
  related:
    - id: cart-summary
      relation: compare
      note: browsing 중 누적 상태를 보여주는 하단 바는 cart summary bar고, checkout 단계에서 세금·배송비까지 포함해
        스크롤과 무관하게 고정 노출하는 최종 총액(sticky order total 개념,
        `recipes/commerce/checkout-order-summary.md` 참고)은 cart summary와 항상 일치해야
        한다.
  confidence: high
