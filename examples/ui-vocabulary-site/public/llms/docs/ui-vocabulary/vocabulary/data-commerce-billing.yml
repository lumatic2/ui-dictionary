    aliases:
      - File attachments list
      - Attachment rows
  one_liner: 첨부된 파일을 이름, 크기, 상태, 제거 행동과 함께 나열하는 목록.
  description: 메시지, 폼, 이슈, 문서에 붙은 파일을 업로드 상태와 함께 관리한다.
