# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: address-card
  status: draft
  category: data-display
  group: data-commerce-billing
  ko:
    name: 주소 카드
    aliases:
      - address card
      - 배송지 카드
      - address selector
  en:
    name: Address card
    aliases:
      - Shipping address card
      - Address selector
  one_liner: 배송지나 청구지 주소를 카드 형태로 표시하고 선택하는 UI.
  description: 수령인, 주소, 전화번호, 기본 주소 배지, 편집 행동을 함께 보여준다.
  visual_anatomy:
    - recipient
    - address lines
    - default badge
    - selected state
    - edit action
  when_to_use:
    - 여러 배송지나 청구지 중 하나를 고를 때
  anti_use:
    - 주소를 새로 입력하는 폼은 address form으로 분리한다
  prompt_phrases:
    - 기본 배송지 배지가 있는 address card를 만들어줘
  asset:
    kind: mini-mock
    variant: address-card
    props:
      default: true
  sources:
    - source_id: material-m3-components
      note: cards and selection controls
  confidence: medium
- id: attachment-list
