- id: reviews-summary-block
  status: draft
  category: data-display
  group: data-commerce-billing
  kind: block
  ko:
    name: 리뷰 요약 블록
    aliases:
      - reviews summary block
      - 리뷰 평점 요약
      - 상품 리뷰 요약
  en:
    name: Reviews summary block
    aliases:
      - Review summary block
      - Rating summary block
  one_liner: 평균 평점과 별점 분포, 개별 리뷰 목록을 한 블록에 묶어 구매 결정을 돕는 UI.
  description: 상품 상세 페이지에서 평균 평점과 분포 막대 같은 요약 지표를 개별 리뷰 목록과 함께 배치해 신뢰를 만든다.
  visual_anatomy:
    - average rating number
    - star distribution bars
    - review count
    - individual review cards
    - verified purchase badge
  when_to_use:
    - 상품 상세에서 평점 요약과 실제 리뷰를 함께 보여줘야 할 때
  anti_use:
    - 평점 분포 없이 인용문만 나열하는 마케팅 신뢰 섹션은 testimonial section이 더 적합하다
  prompt_phrases:
    - 평균 평점과 별점 분포
    - 개별 리뷰가 있는 reviews summary block을 상품 상세에 넣어줘
  related:
    - id: testimonial-section
      relation: compare
      note: 마케팅 신뢰용 고객 인용문 나열은 testimonial section, 평점 분포와 실제 상품 리뷰 목록을 함께 보여줘야 하면
        reviews summary block이다.
    - id: review-list-with-filters
      relation: compare
      note: 평점 분포 요약과 리뷰 목록을 한 블록으로 묶어 보여주는 것이 reviews summary block이고, 평점/사진 유무/구매 인증
        여부로 리뷰를 걸러내고 정렬하는 상호작용이 핵심이면 review list with filters다.
  asset:
    kind: mini-mock
    variant: reviews-summary-block
    props:
      rating: 4.5
  sources:
    - source_id: blocks-so-library
      note: shadcn block ecosystem ecommerce review summary blocks
  navigation:
    canonical_path:
      - Plus
      - UI Blocks
      - Ecommerce
      - Components
    also_appears_in:
      - - Plus
        - Templates
        - Ecommerce Screens
  confidence: medium
