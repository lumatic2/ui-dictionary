  one_liner: 여러 사용자의 아바타를 겹치거나 나란히 보여주는 사람 묶음 표시.
  description: 공유 문서, 팀 공간, 댓글 참여자처럼 여러 사람의 존재를 compact하게 보여준다.
  visual_anatomy:
    - overlapping avatars
    - overflow count
