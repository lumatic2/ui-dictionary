- id: avatar
  status: draft
  category: data-display
  group: data-people-integrations
  ko:
    name: 아바타
    aliases:
      - 프로필 이미지
      - avatar
  en:
    name: Avatar
    aliases:
      - User avatar
      - Profile image
  one_liner: 사용자나 조직을 나타내는 작은 이미지 또는 이니셜.
  description: 프로필 사진, 이니셜, fallback 색상으로 사람이나 계정을 식별한다.
  visual_anatomy:
    - circular or rounded image
    - fallback initials
    - optional status badge
  when_to_use:
    - 사용자 목록
    - 댓글
    - 프로필 메뉴에서 사람을 빠르게 구분할 때
  anti_use:
    - 장식 이미지처럼 쓰지 않는다
    - 의미 없는 랜덤 이미지는 혼란을 줄 수 있다
  prompt_phrases:
    - 댓글 옆에 avatar를 넣어줘
    - 프로필 이미지가 없으면 이니셜을 보여줘
  asset:
    kind: mini-mock
    variant: avatar
    props:
      status: online
  sources:
    - source_id: shadcn-ui-docs
      note: avatar component
  confidence: high
- id: avatar-group
  status: draft
  category: data-display
  group: data-people-integrations
  ko:
    name: 아바타 그룹
    aliases:
      - 겹친 아바타
