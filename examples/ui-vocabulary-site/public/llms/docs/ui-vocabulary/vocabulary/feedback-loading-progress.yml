- id: spinner
  status: draft
  category: feedback
  group: feedback-loading-progress
  ko:
    name: 로딩 스피너
    aliases:
      - spinner
      - loading indicator
  en:
    name: Spinner
    aliases:
      - Loading spinner
      - Circular progress
  one_liner: 작업 중임을 회전 애니메이션으로 보여주는 로딩 표시.
  description: 정확한 진행률은 모르지만 처리 중임을 알려야 할 때 쓴다.
  visual_anatomy:
    - circular ring
    - rotating gap
    - loading label optional
  when_to_use:
    - 짧은 비동기 처리 중 상태를 알려야 할 때
    - 진행률을 측정할 수 없을 때
  anti_use:
    - 긴 작업에는 설명과 progress bar를 함께 검토한다
    - 화면 전체를 불필요하게 막지 않는다
  prompt_phrases:
    - 데이터 불러오는 동안 loading spinner를 보여줘
    - 버튼 안에 작은 스피너를 넣어줘
  asset:
    kind: mini-mock
    variant: spinner
    props:
      size: sm
  sources:
    - source_id: material-m3-components
      note: circular progress indicator
  confidence: high
