- id: combobox
  status: draft
  category: input
  group: input-pickers
  ko:
    name: 콤보박스
    aliases:
      - 검색 가능한 선택창
      - 자동완성 선택
      - combobox
  en:
    name: Combobox
    aliases:
      - Autocomplete select
      - Searchable select
  one_liner: 입력과 선택을 함께 제공하는 검색 가능한 선택 요소.
  description: 사용자가 텍스트를 입력해 옵션을 필터링하고 목록에서 값을 고를 수 있다.
  visual_anatomy:
    - input trigger
    - typed query
    - filtered option list
    - highlighted option
  when_to_use:
    - 선택지가 많아 검색이 필요할 때
    - 사용자가 값을 입력하며 고르게 할 때
  anti_use:
    - 선택지가 적으면 select나 radio group이 더 단순하다
    - 자유 입력만 필요하면 text field를 쓴다
  prompt_phrases:
    - 국가를 검색해서 고르는 combobox를 넣어줘
    - 옵션이 많은 선택창은 검색 가능하게 만들어줘
  asset:
    kind: mini-mock
    variant: combobox
    props:
      open: true
  sources:
    - source_id: wai-aria-apg-patterns
      note: combobox interaction pattern
  related:
    - id: select
      relation: compare
      note: 검색 없이 정해진 값 하나만 고르면 combobox보다 select가 단순하다.
    - id: autocomplete
      relation: compare
      note: 추천 입력과 검색 선택이 핵심이면 autocomplete와 겹치므로 입력 자유도와 선택 강도를 먼저 정한다.
    - id: dropdown-menu
      relation: compare
      note: combobox는 값을 입력/선택하는 control이고 dropdown menu는 명령 목록이다.
  confidence: high
