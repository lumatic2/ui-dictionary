    - 일정 날짜를 모바일에서 고를 때
  anti_use:
    - 정확한 시간까지 필요하면 time picker나 datetime flow를 함께 쓴다
  prompt_phrases:
    - 예약 날짜를 고르는 mobile date picker를 바텀시트 안에 넣어줘
