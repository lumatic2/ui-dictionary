- id: chip-input-mobile
  status: draft
  category: input
  group: input-pickers
  ko:
    name: 모바일 칩 입력
    aliases:
      - chip input mobile
      - 모바일 태그 입력
      - 토큰 입력
      - 태그 칩
  en:
    name: Mobile chip input
    aliases:
      - Mobile tag input
      - Tokenized input
  one_liner: 모바일 입력창 안에서 여러 값을 칩 형태로 추가하고 지우는 입력 패턴.
  description: 관심사, 수신자, 태그처럼 여러 짧은 값을 작은 화면에서도 구분해 편집하게 한다.
  visual_anatomy:
    - input container
    - chips
    - remove affordance
    - add token button
  when_to_use:
    - 여러 태그
    - 사람
    - 키워드를 모바일에서 입력할 때
  anti_use:
    - 값이 많아지면 좁은 화면에서 복잡해지므로 별도 선택 화면을 검토한다
  prompt_phrases:
    - 관심사를 여러 개 추가하는 mobile chip input을 넣어줘
  asset:
    kind: mini-mock
    variant: chip-input-mobile
    props:
      chips: 2
  sources:
    - source_id: material-m3-components
      note: chips as compact input tokens
