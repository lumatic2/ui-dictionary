  one_liner: 색상 값을 팔레트, 스와치, 입력값으로 고르는 요소.
  description: 테마 색, 태그 색, 그래픽 편집처럼 시각적 색 선택이 필요한 곳에 쓴다.
  visual_anatomy:
    - color swatch
