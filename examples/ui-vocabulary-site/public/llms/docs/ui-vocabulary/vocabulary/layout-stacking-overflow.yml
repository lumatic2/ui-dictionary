# 겹침·넘침 (layout-stacking-overflow)
# category: layout-rendering · 용어 6개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: clipping-mask
  status: draft
  category: layout-rendering
  group: layout-stacking-overflow
  kind: visual-treatment
  ko:
    name: 클리핑 마스크
    aliases:
      - clipping mask
      - clip path
      - 마스크 처리
  en:
    name: Clipping mask
    aliases:
      - Clip path
      - Masking
  one_liner: 요소의 보이는 영역을 특정 모양이나 경계 안으로 제한하는 처리.
  description: 이미지 썸네일, 아바타, decorative shape처럼 콘텐츠를 원하는 형태로 잘라 보여준다.
  visual_anatomy:
    - source shape
    - mask boundary
    - clipped content
    - hidden outside
  when_to_use:
    - 이미지나 배경을 원형
    - 카드형
    - 비정형 형태로 잘라야 할 때
  anti_use:
    - 텍스트나 필수 UI를 잘라 조작 가능 영역을 모호하게 만들면 안 된다
  prompt_phrases:
    - 프로필 이미지를 원형 clipping mask로 잘라줘
  asset:
    kind: diagram
    variant: clipping-mask
  sources:
    - source_id: mdn-css-reference
      note: CSS clip-path and mask-related properties define clipping behavior
  confidence: high
- id: layout-shift
  status: draft
  category: layout-rendering
  group: layout-stacking-overflow
  kind: visual-treatment
  ko:
    name: 레이아웃 이동
    aliases:
      - layout shift
      - 누적 레이아웃 이동
      - CLS
  en:
    name: Layout shift
    aliases:
      - Cumulative layout shift
      - CLS
  one_liner: 이미지, 광고, 동적 콘텐츠가 늦게 들어오면서 기존 화면 요소가 갑자기 밀리는 현상.
  description: 예약된 크기, aspect-ratio, skeleton을 사용해 사용자가 읽거나 누르던 위치가 튀지 않게 막는다.
  visual_anatomy:
    - before position
    - late content
    - shifted element
    - reserved space
  when_to_use:
    - 이미지나 비동기 데이터 때문에 카드 높이가 나중에 바뀔 때
  anti_use:
    - 의도적인 expand/collapse 전환과 성능 문제인 layout shift를 섞어 부르지 않는다
  prompt_phrases:
    - 이미지 로딩 때문에 layout shift가 생기지 않게 영역을 미리 잡아줘
  related:
    - id: aspect-ratio
      relation: use-with
      note: media 영역의 비율을 미리 잡아 layout shift를 줄인다
  asset:
    kind: diagram
    variant: layout-shift
  sources:
    - source_id: mdn-css-layout
      note: CSS layout guidance covers reserving space and stable layout behavior
  confidence: medium
- id: overflow
  status: draft
  category: layout-rendering
  group: layout-stacking-overflow
  kind: visual-treatment
  ko:
    name: 오버플로
    aliases:
      - overflow
      - 넘침 처리
      - 스크롤 넘침
  en:
    name: Overflow
    aliases:
      - Content overflow
      - Overflow clipping
  one_liner: 콘텐츠가 컨테이너보다 클 때 보일지, 잘릴지, 스크롤될지 정하는 처리.
  description: 긴 텍스트, 표, 카드 목록이 지정된 영역을 넘을 때 레이아웃이 무너지지 않게 한다.
  visual_anatomy:
    - container boundary
    - overflowing content
    - clipping or scroll
    - scrollbar optional
  when_to_use:
    - 콘텐츠 길이가 가변적인 카드나 패널을 만들 때
  anti_use:
    - 중요한 내용이 잘리는지 모른 채 overflow hidden을 쓰면 정보가 사라진다
  prompt_phrases:
    - 긴 목록은 컨테이너 안에서 overflow scroll로 처리해줘
  asset:
    kind: diagram
    variant: overflow
  sources:
    - source_id: mdn-css-layout
      note: CSS layout docs cover overflow behavior
  confidence: high
- id: stacking-context
  status: draft
  category: layout-rendering
  group: layout-stacking-overflow
  kind: visual-treatment
  ko:
    name: 스태킹 컨텍스트
    aliases:
      - stacking context
      - 쌓임 맥락
      - 레이어 컨텍스트
  en:
    name: Stacking context
    aliases:
      - Stacking context
      - Layering context
  one_liner: z-index가 비교되는 독립적인 레이어 그룹.
  description: transform, opacity, positioned element 같은 조건 때문에 z-index가 예상대로 작동하지
    않을 때 원인이 된다.
  visual_anatomy:
    - parent layer group
    - child layers
    - isolated stacking
    - outside layer
  when_to_use:
    - z-index를 올렸는데도 요소가 앞으로 나오지 않는 문제를 설명할 때
  anti_use:
    - 단순 겹침 문제를 모두 z-index 숫자 문제로만 보면 원인을 놓칠 수 있다
  prompt_phrases:
    - tooltip이 카드 안에 갇히는 stacking context 문제를 해결해줘
  asset:
    kind: diagram
    variant: stacking-context
  sources:
    - source_id: mdn-css-layout
      note: CSS layout and positioning docs explain stacking behavior
  confidence: high
- id: sticky-position
  status: draft
  category: layout-rendering
  group: layout-stacking-overflow
  kind: visual-treatment
  ko:
    name: 스티키 위치
    aliases:
      - sticky position
      - position sticky
      - 고정되는 요소
  en:
    name: Sticky position
    aliases:
      - Position sticky
      - Sticky element
  one_liner: 스크롤하다가 기준 위치에 닿으면 화면에 붙어 따라오는 배치 방식.
  description: table header, section nav, top bar처럼 긴 콘텐츠를 탐색할 때 맥락을 유지하게 한다.
  visual_anatomy:
    - scroll container
    - sticky element
    - threshold
    - stuck state
  when_to_use:
    - 긴 목록이나 문서에서 현재 헤더나 액션을 계속 보여줘야 할 때
  anti_use:
    - sticky 요소가 너무 많으면 화면 공간을 잠식하고 겹침 문제가 생긴다
  prompt_phrases:
    - 테이블 헤더를 sticky position으로 고정해줘
  asset:
    kind: diagram
    variant: sticky-position
  sources:
    - source_id: mdn-css-layout
      note: CSS position sticky behavior is part of layout and positioning
  confidence: high
