# ARIA·스크린리더 (accessibility-aria-screen-reader)
# category: accessibility · 용어 4개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: aria-expanded
  status: draft
  category: accessibility
  group: accessibility-aria-screen-reader
  kind: component
  ko:
    name: 확장 상태 ARIA
    aliases:
      - aria-expanded
      - 펼침 상태
      - 접힘 상태
  en:
    name: ARIA expanded state
    aliases:
      - aria-expanded
      - Expanded state
      - Collapsed state
  one_liner: 아코디언, disclosure, 메뉴처럼 열리고 닫히는 UI의 현재 펼침 상태를 보조기술에 알리는 속성.
  description: 시각적으로 열린 상태뿐 아니라 screen reader에도 해당 컨트롤이 확장되었는지 전달한다.
  visual_anatomy:
    - toggle control
    - expanded panel
    - expanded label
    - collapsed alternative
  when_to_use:
    - 버튼이 숨겨진 패널이나 메뉴를 열고 닫을 때
  anti_use:
    - 실제로 펼칠 대상이 없는 단순 링크나 버튼에는 붙이지 않는다
  prompt_phrases:
    - accordion trigger에 aria-expanded 상태가 맞게 반영되게 해줘
  asset:
    kind: mini-mock
    variant: aria-expanded
  sources:
    - source_id: wai-aria-apg-patterns
      note: APG disclosure and accordion patterns use expanded state semantics
  confidence: high
- id: aria-invalid
  status: draft
  category: accessibility
  group: accessibility-aria-screen-reader
  kind: component
  ko:
    name: 오류 입력 ARIA
    aliases:
      - aria-invalid
      - invalid state
      - 입력 오류 상태
  en:
    name: ARIA invalid state
    aliases:
      - aria-invalid
      - Invalid input state
      - Error state attribute
  one_liner: 입력값이 유효하지 않음을 보조기술과 UI 상태에 함께 전달하는 속성.
  description: validation message와 함께 사용해 사용자가 어떤 필드에 오류가 있는지 키보드와 screen reader로도
    알 수 있게 한다.
  visual_anatomy:
    - input field
    - error border
    - error message
    - invalid attribute
  when_to_use:
    - 폼 검증 실패 후 특정 입력 필드가 잘못되었음을 표시할 때
  anti_use:
    - 검증 전부터 모든 필드를 invalid로 표시하면 사용자가 불필요하게 압박을 받는다
  prompt_phrases:
    - 이메일 오류가 나면 aria-invalid와 validation message를 같이 보여줘
  related:
    - id: validation-message
      relation: use-with
      note: 오류 상태는 보통 입력창 근처의 검증 메시지와 함께 설명한다
  asset:
    kind: mini-mock
    variant: aria-invalid
  sources:
    - source_id: wai-aria-apg-patterns
      note: APG form patterns include accessible error state expectations
  confidence: high
- id: aria-live
  status: draft
  category: accessibility
  group: accessibility-aria-screen-reader
  kind: component
  ko:
    name: 라이브 영역 ARIA
    aliases:
      - aria-live
      - live region
      - 실시간 알림 영역
  en:
    name: ARIA live region
    aliases:
      - aria-live
      - Live region
      - Announced update
  one_liner: 화면 일부가 동적으로 바뀔 때 그 변경 내용을 보조기술에 알리는 영역.
  description: toast, 저장 완료, 검색 결과 수 변경처럼 포커스를 옮기지 않고 알려야 하는 상태 변화에 쓴다.
  visual_anatomy:
    - status message
    - dynamic update
    - announcement area
    - polite or assertive mode
  when_to_use:
    - 비동기 작업 결과나 상태 메시지를 screen reader 사용자에게 알려야 할 때
  anti_use:
    - 자주 바뀌는 값 전체를 계속 announce하면 방해가 된다
  prompt_phrases:
    - 저장 완료 메시지는 aria-live 영역으로도 announce되게 해줘
  related:
    - id: toast
      relation: use-with
      note: toast가 시각 알림이면 live region은 보조기술 알림 역할을 한다
  asset:
    kind: mini-mock
    variant: aria-live
  sources:
    - source_id: wai-aria-apg-patterns
      note: APG patterns describe status and live announcement behavior
  confidence: high
- id: sr-only
  status: draft
  category: accessibility
  group: accessibility-aria-screen-reader
  kind: component
  ko:
    name: 스크린리더 전용 텍스트
    aliases:
      - sr-only
      - visually hidden
      - 보이지 않는 접근성 텍스트
  en:
    name: Screen-reader-only text
    aliases:
      - sr-only
      - Visually hidden text
      - Assistive text
  one_liner: 화면에는 보이지 않지만 screen reader에는 읽히도록 남기는 보조 텍스트.
  description: 아이콘 버튼, 상태 점, 축약 라벨처럼 시각 정보만으로는 의미가 부족한 UI에 숨은 설명을 더한다.
  visual_anatomy:
    - visible icon
    - hidden text label
    - accessibility name
    - assistive output
  when_to_use:
    - 아이콘만 있는 버튼이나 시각적 상태에 이름을 붙여야 할 때
  anti_use:
    - 화면에 필요한 설명을 sr-only로 숨겨 시각 사용자에게 정보를 빼앗으면 안 된다
  prompt_phrases:
    - 아이콘 버튼에는 sr-only label을 넣어 접근성 이름을 제공해줘
  asset:
    kind: mini-mock
    variant: sr-only
  sources:
    - source_id: wai-aria-apg-patterns
      note: APG patterns rely on accessible names for controls
  confidence: high
