- id: drawer
  status: draft
  category: structure
  group: structure-panels
  ko:
    name: 드로어
    aliases:
      - 시트
      - 사이드 패널
      - drawer
      - sheet
  en:
    name: Drawer
    aliases:
      - Sheet
      - Side panel
  one_liner: 화면 한쪽에서 밀려 나오는 보조 패널.
  description: 세부 정보, 필터, 편집 폼을 현재 화면 맥락 안에서 보여준다.
  visual_anatomy:
    - side or bottom panel
    - backdrop optional
    - handle or close button
    - content area
  when_to_use:
    - 현재 목록을 유지한 채 상세나 설정을 보여줄 때
    - 필터 패널을 옆에서 열 때
  anti_use:
    - 사용자의 즉각 확인이 필요한 경고에는 dialog가 더 명확하다
    - 전체 작업 흐름은 page가 낫다
  prompt_phrases:
    - 오른쪽에서 열리는 drawer에 상세 정보를 보여줘
    - 모바일에서는 bottom sheet로 열리게 해줘
  asset:
    kind: mini-mock
    variant: drawer
    props:
      side: right
  sources:
    - source_id: material-m3-components
      note: navigation drawer and sheet-like surfaces
  related:
    - id: dialog
      relation: compare
      note: 사용자 결정을 막고 받아야 하면 dialog, 화면 맥락을 유지한 보조 패널이면 drawer다.
    - id: side-sheet
      relation: compare
      note: drawer는 탐색/패널 전반을 넓게 부르고, side sheet는 작업 맥락의 측면 표면에 더 가깝다.
    - id: modal-bottom-sheet
      relation: alternative
      note: 모바일 하단에서 배경을 막아 선택을 받으면 modal bottom sheet를 쓴다.
  confidence: medium
