- id: popover
  status: draft
  category: structure
  group: structure-panels
  ko:
    name: 팝오버
    aliases:
      - 작은 떠있는 패널
      - popover
  en:
    name: Popover
    aliases:
      - Floating panel
  one_liner: 특정 트리거 근처에 뜨는 작은 보조 패널.
  description: 날짜 선택, 간단한 설정, 보조 정보를 현재 위치 근처에서 보여준다.
  visual_anatomy:
    - trigger
    - floating panel
    - arrow optional
    - compact content
  when_to_use:
    - 작은 입력이나 보조 정보를 주변 맥락에서 보여줄 때
  anti_use:
    - 중요한 결정이나 긴 내용은 dialog나 drawer가 낫다
    - hover-only 정보는 tooltip을 검토한다
  prompt_phrases:
    - 버튼을 누르면 작은 popover가 열리게 해줘
    - 날짜 선택기를 팝오버로 띄워줘
  asset:
    kind: mini-mock
    variant: popover
    props:
      open: true
  sources:
    - source_id: radix-ui-primitives
      note: popover primitive
  related:
    - id: dropdown-menu
      relation: compare
      note: 명령 목록이면 dropdown menu, 작은 폼이나 보조 콘텐츠가 있으면 popover가 적합하다.
    - id: tooltip
      relation: compare
      note: hover/focus의 짧은 설명만 필요하면 tooltip이고, 상호작용 콘텐츠가 있으면 popover다.
    - id: dialog
      relation: alternative
      note: 중요한 결정이나 긴 내용은 popover보다 dialog가 안전하다.
  confidence: high
