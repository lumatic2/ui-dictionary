# 패널·오버레이 (structure-panels)
# category: structure · 용어 18개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: adaptive-split-view
  status: draft
  category: structure
  group: structure-panels
  ko:
    name: 적응형 스플릿 뷰
    aliases:
      - adaptive split view
      - 사이드바 전환형 레이아웃
      - 탭바 사이드바 전환
  en:
    name: Adaptive split view
    aliases:
      - Sidebar/tab bar convertible layout
      - Adaptive sidebar layout
  one_liner: 창 크기에 따라 탭 바가 사이드바로 바뀌거나 목록-상세가 나란히 붙는 적응형 레이아웃.
  description: 좁은 화면에서는 화면 전환(stack) 또는 탭 바로 동작하다가, iPad 같은 넓은 화면에서는 사이드바나 나란한
    목록-상세 분할로 전환된다. 사용자가 즐겨찾는 목적지를 골라 커스터마이즈할 수 있다는 점에서 정적 2열 레이아웃인
    master-detail과 구분된다.
  visual_anatomy:
    - adaptive container
    - compact stack view
    - regular split view
    - primary list pane
    - secondary detail pane
    - tab-bar-to-sidebar toggle
  when_to_use:
    - 같은 앱이 폰과 태블릿처럼 서로 다른 창 크기에서 동작해야 할 때
    - 사용자가 목적지 목록을 커스터마이즈할 수 있어야 할 때
  anti_use:
    - 창 크기가 항상 고정된 데스크톱 전용 2열 화면이면 master-detail로 충분하다
    - 목적지 전환 없이 순수 콘텐츠 레이아웃만 필요하면 과도한 추상화다
  prompt_phrases:
    - 폰에서는 탭바
    - 태블릿에서는 사이드바로 바뀌는 adaptive split view를 만들어줘
    - 창을 넓히면 목록과 상세가 나란히 보이게 해줘
  related:
    - id: master-detail
      relation: compare
      note: master-detail은 고정 2열 레이아웃만 다루고, 창 크기에 따른 stack/split 전환이나 목적지 커스터마이즈는 다루지
        않는다.
  asset:
    kind: diagram
    variant: adaptive-split-view
    props:
      mode: split
  sources:
    - source_id: apple-hig-components
      note: adaptive tab bar to sidebar conversion and split view guidance
  confidence: medium
- id: card
  status: draft
  category: structure
  group: structure-panels
  ko:
    name: 카드
    aliases:
      - card
      - 정보 카드
  en:
    name: Card
    aliases:
      - Content card
  one_liner: 관련 정보를 하나의 박스 안에 묶어 보여주는 컨테이너.
  description: 제목, 설명, 이미지, 행동 버튼을 한 덩어리로 묶어 스캔하기 쉽게 한다.
  visual_anatomy:
    - container
    - title
    - body text
    - optional media
    - optional actions
  when_to_use:
    - 반복되는 항목을 목록이나 그리드로 보여줄 때
    - 하나의 주제를 독립적으로 묶을 때
  anti_use:
    - 페이지 섹션 전체를 카드처럼 중첩하지 않는다
    - 단순 텍스트 한 줄만 담기에는 과하다
  prompt_phrases:
    - 각 기능을 card로 묶어서 보여줘
    - 이미지와 설명이 있는 정보 카드를 만들어줘
  asset:
    kind: mini-mock
    variant: card
    props:
      media: true
  sources:
    - source_id: material-m3-components
      note: card component
  confidence: high
- id: dialog
  status: draft
  category: structure
  group: structure-panels
  ko:
    name: 모달
    aliases:
      - 다이얼로그
      - modal
      - dialog
  en:
    name: Dialog
    aliases:
      - Modal
      - Modal dialog
  one_liner: 현재 화면 위에 떠서 사용자의 집중 행동을 요구하는 창.
  description: 배경을 덮고 제목, 내용, 행동 버튼을 보여주며 닫기 전까지 주의를 모은다.
  visual_anatomy:
    - backdrop
    - dialog surface
    - title
    - content
    - action buttons
    - close button
  when_to_use:
    - 확인
    - 입력
    - 중요한 결정을 화면 흐름 위에서 처리할 때
  anti_use:
    - 단순 안내는 toast나 banner가 낫다
    - 긴 복잡한 작업은 별도 페이지나 drawer가 적합할 수 있다
  prompt_phrases:
    - 삭제 확인 modal을 띄워줘
    - 화면 중앙에 dialog를 열고 취소와 삭제 버튼을 넣어줘
  asset:
    kind: mini-mock
    variant: dialog
    props:
      open: true
  sources:
    - source_id: wai-aria-apg-patterns
      note: dialog modal pattern
  related:
    - id: drawer
      relation: compare
      note: 즉시 결정이나 확인을 막고 받아야 하면 dialog, 현재 화면 맥락을 유지하며 보조 작업을 하면 drawer가 낫다.
    - id: side-sheet
      relation: alternative
      note: 넓은 화면에서 상세나 편집을 옆으로 열면 side sheet가 더 작업 친화적이다.
    - id: modal-bottom-sheet
      relation: alternative
      note: 모바일에서 짧은 선택을 하단에서 받으면 modal bottom sheet가 더 자연스럽다.
  navigation:
    canonical_path:
      - Plus
      - UI Kit
      - Overlays
    also_appears_in:
      - - Plus
        - UI Blocks
        - Application UI
        - Overlays
  confidence: high
- id: disclosure-card
  status: draft
  category: structure
  group: structure-panels
  kind: component
  ko:
    name: 펼침 카드
    aliases:
      - disclosure card
      - expandable card
      - 접히는 카드
  en:
    name: Disclosure card
    aliases:
      - Expandable card
      - Collapsible card
  one_liner: 카드 헤더를 눌러 세부 내용을 펼치거나 접는 카드형 disclosure.
  description: 설정 요약, FAQ, 요금제 세부 기능처럼 기본 정보는 보이고 자세한 내용은 필요할 때 펼치게 한다.
  visual_anatomy:
    - card header
    - chevron indicator
    - summary content
    - expandable body
  when_to_use:
    - 카드 목록에서 각 항목의 상세 정보를 필요할 때만 보여줄 때
  anti_use:
    - 단순 텍스트 목록이면 accordion이 더 표준적이다
  prompt_phrases:
    - 설정 항목을 펼칠 수 있는 disclosure card로 보여줘
  related:
    - id: disclosure
      relation: compare
      note: disclosure는 펼침/접힘 동작이고, disclosure card는 그 동작을 카드 표면에 적용한 조합이다.
  asset:
    kind: mini-mock
    variant: disclosure-card
  sources:
    - source_id: coss-ui-docs
      note: Origin accordion/collapsible examples include card-like disclosure
        compositions
  confidence: medium
- id: dockable-panel
  status: draft
  category: structure
  group: structure-panels
  ko:
    name: 도킹 패널
    aliases:
      - dockable panel
      - 고정 가능한 패널
      - dock panel
  en:
    name: Dockable panel
    aliases:
      - Dock panel
      - Docked panel
  one_liner: 떠 있는 패널을 화면 가장자리나 레이아웃 안에 고정할 수 있는 패턴.
  description: 전문 도구에서 사용자가 작업 방식에 맞춰 패널을 붙이거나 분리해 배치한다.
  visual_anatomy:
    - panel surface
    - dock target
    - attached state
    - undocked state
  when_to_use:
    - 고급 사용자가 작업 공간 배치를 자주 바꾸는 생산성 도구에서
  anti_use:
    - 초보자용 단순 앱에서는 배치 자유도가 오히려 부담이다
  prompt_phrases:
    - 오른쪽에 붙이거나 띄울 수 있는 dockable panel을 구현해줘
  asset:
    kind: mini-mock
    variant: dockable-panel
    props:
      docked: true
  sources:
    - source_id: fluent2-react-components
      note: panels and command surfaces in productivity UI
