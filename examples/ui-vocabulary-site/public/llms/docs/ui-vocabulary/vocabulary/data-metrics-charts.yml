- id: area-chart-card
  status: draft
  category: data-display
  group: data-metrics-charts
  kind: block
  ko:
    name: 영역 차트 카드
    aliases:
      - area chart card
      - chart-area-default
      - chart-area-gradient
  en:
    name: Area chart card
    aliases:
      - Area chart card
      - chart-area-default
      - chart-area-gradient
  one_liner: 시간에 따른 추세와 누적 변화를 영역으로 채워 보여주는 차트 카드.
  description: 방문자, 매출, 사용량처럼 흐름과 규모감을 동시에 보여줘야 하는 지표에 쓴다.
  visual_anatomy:
    - card title
    - time range
    - filled area chart
    - summary value
  when_to_use:
    - 기간별 추세와 총량의 느낌을 함께 보여줄 때
  anti_use:
    - 정확한 항목 비교는 bar-chart-card가 더 읽기 쉽다
  prompt_phrases:
    - 기간별 트래픽을 보여주는 area chart card를 만들어줘
  asset:
    kind: mini-mock
    variant: area-chart-card
  sources:
    - source_id: shadcn-ui-docs
      note: area chart block examples
  confidence: high
- id: bar-chart-card
  status: draft
  category: data-display
  group: data-metrics-charts
  kind: block
  ko:
    name: 막대 차트 카드
    aliases:
      - bar chart card
      - chart-bar-default
      - chart-bar-horizontal
  en:
    name: Bar chart card
    aliases:
      - Bar chart card
      - chart-bar-default
      - chart-bar-horizontal
  one_liner: 항목이나 기간별 값을 막대 길이로 비교하는 차트 카드.
  description: 카테고리별 매출, 월별 가입자, 상태별 건수처럼 값의 차이를 빠르게 비교한다.
  visual_anatomy:
    - card title
    - category axis
    - value bars
    - optional labels
  when_to_use:
    - 여러 항목의 크기 차이를 명확히 비교해야 할 때
  anti_use:
    - 비율 구성이 핵심이면 pie-chart-card나 radial-chart-card가 더 적합하다
  prompt_phrases:
    - 월별 매출을 비교하는 bar chart card를 만들어줘
  asset:
    kind: mini-mock
    variant: bar-chart-card
  sources:
    - source_id: shadcn-ui-docs
      note: bar chart block examples
  confidence: high
- id: chart
  status: draft
  category: data-display
  group: data-metrics-charts
  ko:
    name: 차트
    aliases:
      - 그래프
      - chart
  en:
    name: Chart
    aliases:
      - Graph
      - Data visualization
  one_liner: 숫자 데이터를 시각적 형태로 보여주는 요소.
  description: 막대, 선, 영역, 원형 등 데이터 관계에 맞는 형태로 추세나 비교를 표현한다.
  visual_anatomy:
    - plot area
    - axes or labels
    - data marks
    - legend optional
  when_to_use:
    - 추세
    - 비교
    - 분포를 숫자보다 빠르게 이해하게 할 때
  anti_use:
    - 값이 한두 개뿐이면 metric card나 plain text가 낫다
    - 장식용 차트는 피한다
  prompt_phrases:
    - 월별 매출을 line chart로 보여줘
    - 카테고리별 비중을 bar chart로 비교해줘
  asset:
    kind: diagram
    variant: chart
    props:
      type: bar
  sources:
    - source_id: carbon-design-components
      note: data visualization guidance
  confidence: medium
- id: chart-axis
  status: draft
  category: data-display
  group: data-metrics-charts
  ko:
    name: 차트 축
    aliases:
      - axis
      - x축
      - y축
  en:
    name: Chart axis
    aliases:
      - Axis
      - X-axis
      - Y-axis
  one_liner: 차트에서 값의 기준과 범위를 보여주는 가로·세로 기준선.
  description: 데이터 위치가 어떤 값이나 범주를 의미하는지 눈금과 라벨로 설명한다.
  visual_anatomy:
    - axis line
    - tick marks
    - tick labels
    - axis title optional
  when_to_use:
    - 숫자 규모나 범주 위치를 읽어야 하는 차트에서
  anti_use:
    - 작은 sparkline처럼 추세만 보여줄 때는 축을 줄일 수 있다
    - 눈금이 너무 많으면 읽기 어렵다
  prompt_phrases:
    - 라인 차트에 x-axis와 y-axis 라벨을 넣어줘
    - 축 눈금이 보이는 bar chart를 만들어줘
  asset:
    kind: diagram
    variant: chart-axis
    props:
      axes: 2
  sources:
    - source_id: carbon-design-components
      note: chart axes and data visualization guidance
  confidence: medium
