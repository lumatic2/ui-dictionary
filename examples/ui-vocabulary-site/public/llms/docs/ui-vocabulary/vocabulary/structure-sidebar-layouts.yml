# 사이드바 레이아웃 (structure-sidebar-layouts)
# category: structure · 용어 9개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: calendar-sidebar-layout
  status: draft
  category: structure
  group: structure-sidebar-layouts
  kind: block
  ko:
    name: 캘린더 사이드바 레이아웃
    aliases:
      - calendar sidebar
      - sidebar-12
      - schedule sidebar
  en:
    name: Calendar sidebar layout
    aliases:
      - Calendar sidebar
      - sidebar-12
      - Schedule sidebar
  one_liner: 사이드바에 작은 캘린더나 일정 필터를 두고 메인 영역에서 일정 콘텐츠를 보는 레이아웃.
  description: 예약, 일정, 프로젝트 마감 화면에서 날짜 맥락을 항상 유지하면서 목록이나 상세를 탐색한다.
  visual_anatomy:
    - sidebar calendar
    - date filters
    - schedule list
    - content detail
  when_to_use:
    - 날짜 선택이 화면 탐색의 핵심 축일 때
  anti_use:
    - 단일 날짜 입력만 필요하면 date-picker가 더 적합하다
  prompt_phrases:
    - 사이드바에 달력이 있는 calendar sidebar layout을 만들어줘
  asset:
    kind: mini-mock
    variant: calendar-sidebar-layout
  sources:
    - source_id: shadcn-ui-docs
      note: sidebar with calendar block reference
  confidence: high
- id: collapsible-sidebar-layout
  status: draft
  category: structure
  group: structure-sidebar-layouts
  kind: block
  ko:
    name: 접이식 사이드바 레이아웃
    aliases:
      - collapsible sidebar block
      - sidebar-02
      - sidebar-05
  en:
    name: Collapsible sidebar layout
    aliases:
      - Collapsible sidebar block
      - sidebar-02
      - sidebar-05
  one_liner: 섹션이나 하위 메뉴를 접고 펼칠 수 있는 사이드바 중심 앱 레이아웃.
  description: 메뉴 깊이가 깊거나 팀, 프로젝트, 설정처럼 그룹화된 목적지가 많을 때 탐색 밀도를 조절한다.
  visual_anatomy:
    - collapsible groups
    - nested menu items
    - active item
    - main content
  when_to_use:
    - 사이드바 항목이 많아 섹션별 접기가 필요할 때
  anti_use:
    - 메뉴가 5개 이하라면 일반 sidebar-dashboard-layout이 더 명확하다
  prompt_phrases:
    - 하위 메뉴를 접고 펼치는 collapsible sidebar layout을 만들어줘
  asset:
    kind: mini-mock
    variant: collapsible-sidebar-layout
  sources:
    - source_id: shadcn-ui-docs
      note: sidebar collapsible block variants
  confidence: high
- id: dual-sidebar-layout
  status: draft
  category: structure
  group: structure-sidebar-layouts
  kind: block
  ko:
    name: 양쪽 사이드바 레이아웃
    aliases:
      - dual sidebar
      - left and right sidebar
      - sidebar-15
  en:
    name: Dual sidebar layout
    aliases:
      - Dual sidebar
      - Left and right sidebar
      - sidebar-15
  one_liner: 왼쪽에는 내비게이션, 오른쪽에는 보조 패널을 두고 중앙 작업 영역을 감싸는 레이아웃.
  description: 편집기, 분석 도구, CRM처럼 탐색과 상세 맥락을 동시에 유지해야 하는 복잡한 앱에 쓴다.
  visual_anatomy:
    - left navigation
    - center workspace
    - right inspector
    - resizable zones
  when_to_use:
    - 화면 양쪽에 서로 다른 보조 맥락이 필요할 때
  anti_use:
    - 콘텐츠 폭이 좁아지면 모바일이나 작은 데스크톱에서 부담이 크다
  prompt_phrases:
    - 왼쪽 메뉴와 오른쪽 inspector가 있는 dual sidebar layout을 만들어줘
  asset:
    kind: mini-mock
    variant: dual-sidebar-layout
  sources:
    - source_id: shadcn-ui-docs
      note: left and right sidebar block reference
  confidence: high
