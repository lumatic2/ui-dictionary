      - icon sidebar
      - sidebar-07
      - collapsed icon rail
  en:
    name: Icon sidebar layout
    aliases:
      - Icon sidebar
      - sidebar-07
      - Collapsed icon rail
  one_liner: 사이드바를 아이콘 폭으로 접어 화면 공간을 확보하는 앱 레이아웃.
  description: 화면 폭이 좁거나 작업 영역을 넓게 쓰는 도구에서 내비게이션 접근성을 유지하면서 공간을 절약한다.
