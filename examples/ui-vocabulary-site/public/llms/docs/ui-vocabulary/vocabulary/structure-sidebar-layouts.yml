    - narrow icon rail
    - active icon
    - optional expanded label
    - content canvas
  when_to_use:
    - 데이터 테이블, 캔버스, 편집기처럼 메인 영역이 넓어야 할 때
  anti_use:
    - 아이콘 의미가 불명확하면 텍스트가 있는 사이드바를 쓴다
  prompt_phrases:
    - 아이콘만 남기고 접히는 icon sidebar layout을 만들어줘
  asset:
    kind: mini-mock
    variant: icon-sidebar-layout
  sources:
    - source_id: shadcn-ui-docs
      note: sidebar icon collapsed block reference
  confidence: high
- id: inset-sidebar-layout
