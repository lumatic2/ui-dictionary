- id: app-shell
  status: draft
  category: structure
  group: structure-app-layout
  ko:
    name: 앱 셸
    aliases:
      - app shell
      - 앱 레이아웃
      - application shell
  en:
    name: App shell
    aliases:
      - Application shell
      - App layout frame
  one_liner: 헤더, 사이드바, 콘텐츠 영역처럼 앱의 고정 뼈대를 이루는 레이아웃.
  description: 대시보드나 관리 도구에서 반복되는 전역 내비게이션과 작업 영역을 안정적으로 배치한다.
  visual_anatomy:
    - top bar
    - sidebar
    - content area
    - persistent navigation
  when_to_use:
    - 여러 화면이 같은 앱 구조를 공유할 때
  anti_use:
    - 단일 랜딩 페이지처럼 앱 내비게이션이 필요 없는 화면에는 과하다
  prompt_phrases:
    - 왼쪽 사이드바와 상단바가 있는 app shell 레이아웃을 만들어줘
  asset:
    kind: diagram
    variant: app-shell
    props:
      sidebar: true
  sources:
    - source_id: material-m3-components
      note: app bars and navigation components
  confidence: medium
- id: billing-settings-page
