# 탐색 전환 (selection-navigation)
# category: selection · 용어 21개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: anchor-nav
  status: draft
  category: selection
  group: selection-navigation
  ko:
    name: 앵커 내비게이션
    aliases:
      - anchor nav
      - 목차 링크
      - 섹션 내비게이션
  en:
    name: Anchor navigation
    aliases:
      - In-page navigation
      - Table of contents nav
  one_liner: 같은 페이지 안의 섹션으로 이동하는 링크 목록.
  description: 긴 문서나 설정 화면에서 현재 섹션을 보여주고 클릭하면 해당 위치로 스크롤한다. 문서 사이트의 우측 고정 rail은
    IntersectionObserver 기반 scroll spy로 스크롤 위치에 따라 활성 섹션 항목을 자동으로 강조하는 형태로 자주
    쓰인다.
  visual_anatomy:
    - section links
    - active section
    - sticky side or top area
    - anchor targets
    - scroll-spy active highlight
  when_to_use:
    - 한 페이지가 길고 섹션이 명확할 때
    - 사용자가 원하는 부분으로 바로 이동해야 할 때
  anti_use:
    - 페이지가 짧으면 불필요하다
    - 앱의 주요 페이지 이동과 섞지 않는다
  prompt_phrases:
    - 문서 왼쪽에 anchor navigation을 넣어줘
    - 스크롤 위치에 따라 현재 섹션을 강조해줘
  asset:
    kind: mini-mock
    variant: anchor-nav
    props:
      active: 1
  sources:
    - source_id: apple-hig-components
      note: navigation and content structure guidance
  confidence: medium
- id: back-button
  status: draft
  category: selection
  group: selection-navigation
  ko:
    name: 뒤로가기 버튼
    aliases:
      - back button
      - 이전 버튼
      - 뒤로
  en:
    name: Back button
    aliases:
      - Back navigation
      - Previous button
  one_liner: 이전 화면이나 상위 화면으로 돌아가게 하는 내비게이션 버튼.
  description: 상세 화면, 설정 하위 화면, 모바일 내비게이션에서 현재 흐름을 되돌린다.
  visual_anatomy:
    - left arrow icon
    - optional label
    - top bar placement
    - navigation target
  when_to_use:
    - 사용자가 상세나 하위 화면에서 원래 위치로 돌아가야 할 때
  anti_use:
    - 취소나 닫기 행동과 의미를 섞지 않는다
    - 브라우저 뒤로가기와 충돌하지 않게 한다
  prompt_phrases:
    - 상단 왼쪽에 back button을 넣어줘
    - 뒤로가기 화살표와 이전 라벨을 보여줘
  asset:
    kind: mini-mock
    variant: back-button
    props:
      label: 이전
  sources:
    - source_id: apple-hig-components
      note: navigation bars and back affordance
  confidence: high
- id: bottom-navigation
  status: draft
  category: selection
  group: selection-navigation
  ko:
    name: 하단 내비게이션
    aliases:
      - bottom navigation
      - bottom nav
      - 하단 탭
  en:
    name: Bottom navigation
    aliases:
      - Bottom nav
      - Navigation bar
  one_liner: 모바일 화면 하단에 주요 목적지를 아이콘과 라벨로 배치한 내비게이션.
  description: 앱의 최상위 섹션을 엄지로 쉽게 전환하게 한다.
  visual_anatomy:
    - bottom bar
    - destination icons
    - labels
    - active indicator
    - optional badge
  when_to_use:
    - 모바일 앱의 주요 섹션이 3-5개일 때
    - 어디서든 최상위 목적지로 이동해야 할 때
  anti_use:
    - 일회성 행동이나 설정을 목적지로 넣지 않는다
    - 항목이 너무 많으면 숨김 메뉴를 검토한다
  prompt_phrases:
    - 모바일 화면 아래에 bottom navigation을 넣어줘
    - 홈 검색 프로필 3개 탭을 하단에 배치해줘
  asset:
    kind: mini-mock
    variant: bottom-navigation
    props:
      items: 3
  sources:
    - source_id: mui-material-components
      note: bottom navigation component definition
  confidence: high
- id: breadcrumb
  status: draft
  category: selection
  group: selection-navigation
  ko:
    name: 브레드크럼
    aliases:
      - 현재 위치 경로
      - breadcrumb
  en:
    name: Breadcrumb
    aliases:
      - Breadcrumb navigation
  one_liner: 현재 페이지가 전체 구조에서 어디인지 보여주는 경로 표시.
  description: 홈부터 현재 페이지까지 상위 경로를 링크로 나열한다.
  visual_anatomy:
    - ancestor links
    - separators
    - current page label
  when_to_use:
    - 계층 구조가 깊은 사이트에서 현재 위치를 알려줄 때
    - 상위 페이지로 돌아가기 쉽게 할 때
  anti_use:
    - 단일 페이지나 얕은 구조에는 불필요하다
    - 주요 navigation을 대체하지 않는다
  prompt_phrases:
    - 상단에 홈 > 대시보드 > 설정 breadcrumb를 넣어줘
    - 현재 위치 경로를 브레드크럼으로 보여줘
  asset:
    kind: mini-mock
    variant: breadcrumb
    props:
      depth: 3
  sources:
    - source_id: material-m3-components
      note: navigation patterns
  related:
    - id: pagination
      relation: use-with
      note: 문서 사이트에서는 상단 breadcrumb(계층 위치)와 하단 prev/next pagination(선형 이동)이 한 세트로 쓰여
        순서가 있는 학습 경로를 만든다.
  confidence: medium
- id: breadcrumbs-menu
  status: draft
  category: selection
  group: selection-navigation
  ko:
    name: 브레드크럼 메뉴
    aliases:
      - breadcrumb menu
      - 경로 메뉴
      - sibling path menu
  en:
    name: Breadcrumbs menu
    aliases:
      - Breadcrumb menu
      - Path menu
  one_liner: 브레드크럼의 한 경로 항목에서 형제 위치를 펼쳐 고르는 메뉴.
  description: 현재 위치를 보여주면서 같은 깊이의 다른 섹션으로 빠르게 이동하게 한다.
  visual_anatomy:
    - breadcrumb path
    - menu trigger
    - sibling options
    - current item
  when_to_use:
    - 계층 경로 안에서 형제 페이지 이동이 잦을 때
  anti_use:
    - 경로가 짧고 단순하면 일반 breadcrumb가 충분하다
  prompt_phrases:
    - breadcrumb의 중간 항목을 누르면 sibling menu가 열리게 해줘
  asset:
    kind: mini-mock
    variant: breadcrumbs-menu
    props:
      menu: true
  sources:
    - source_id: wai-aria-apg-patterns
      note: menu button pattern
  confidence: medium
- id: data-import-wizard-validation-preview
  status: draft
  category: selection
  group: selection-navigation
  kind: block
  ko:
    name: 데이터 임포트 검증 위저드
    aliases:
      - import wizard
      - CSV 임포트 마법사
      - 데이터 가져오기 검증 미리보기
  en:
    name: Data import wizard with validation preview
    aliases:
      - CSV import wizard
      - Import validation wizard
  one_liner: 파일 업로드부터 컬럼 매핑, 행 단위 검증 미리보기, 결과 요약까지 이어지는 다단계 데이터 임포트 흐름.
  description: CSV·파일 업로드 이후 컬럼을 자동·수동으로 매핑하고, 제출 전 행·열 단위 오류를 미리보기에서 강조해 실패를 줄인다.
  visual_anatomy:
    - file upload step
    - auto-detected column mapping table
    - manual remap control per column
    - when-blank default choice
    - preview table with row-level error highlighting
    - inline fix affordance
    - import summary count
  when_to_use:
    - 사용자가 대량의 외부 데이터를 업로드해 시스템에 반영해야 할 때
  anti_use:
    - 시작 방법 자체를 고르는 단계라면 import-data-choice가 더 적합하다 — 이 위저드는 방법을 고른 이후의 실제 임포트
      실행 흐름이다
  prompt_phrases:
    - CSV 업로드 후 컬럼 매핑과 오류 미리보기가 있는 data import wizard를 만들어줘
    - 행 단위 오류를 강조하는 임포트 검증 미리보기를 넣어줘
  asset:
    kind: mini-mock
    variant: data-import-wizard-validation-preview
    props:
      step: 3
  sources:
    - source_id: material-m3-components
      note: progress and navigation pattern for multi-step flows
  related:
    - id: wizard
      relation: compare
      note: wizard는 다단계 흐름의 일반 패턴이고, 이 항목은 파일 업로드→컬럼 매핑→행 단위 검증 미리보기→제출 요약으로 이어지는 데이터
        임포트에 특화된 구체적 인스턴스다
    - id: import-data-choice
      relation: compare
      note: import-data-choice는 CSV·직접 입력·외부 연결 중 시작 방법을 고르는 선택 UI이고, 이 위저드는 그 방법을 고른
        이후 실제 파일을 매핑·검증·제출하는 다단계 실행 흐름이다
  confidence: medium
- id: edge-swipe-back
  status: draft
