  en:
    name: Mobile segmented tabs
    aliases:
      - Segmented tabs
      - Mobile segmented control
      - Segmented view switcher
  one_liner: 모바일 화면 상단에서 같은 화면 안의 하위 보기들을 짧은 세그먼트 버튼으로 전환하는 패턴.
  description: 전체/인기/내 항목처럼 같은 맥락의 보기만 빠르게 바꿀 때, 탭보다 compact한 형태로 쓴다.
  visual_anatomy:
    - segmented container
    - two to four options
    - selected segment
    - content below
  when_to_use:
    - 모바일에서 같은 화면의 하위 필터나 보기 모드를 전환할 때
  anti_use:
    - 앱의 최상위 목적지 전환에는 tab bar나 bottom navigation을 쓴다
    - 옵션이 많으면 chip group이나 dropdown을 검토한다
  prompt_phrases:
    - 모바일 화면 상단에 전체 인기 내 글을 바꾸는 segmented tabs를 넣어줘
  asset:
    kind: mini-mock
