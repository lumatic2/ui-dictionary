    - 여러 주요 페이지를 반복적으로 이동해야 할 때
    - 현재 섹션을 상단에서 보여줘야 할 때
  anti_use:
    - 명령 메뉴와 혼동하지 않는다
    - 너무 많은 링크는 grouping이나 sidebar를 검토한다
  prompt_phrases:
    - 상단에 logo와 메뉴 링크가 있는 navigation bar를 넣어줘
