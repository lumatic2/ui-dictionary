- id: onboarding-carousel-skip-pattern
  status: draft
  category: selection
  group: selection-navigation
  ko:
    name: 건너뛰기 있는 온보딩 페이저
    aliases:
      - onboarding skip pattern
      - 온보딩 건너뛰기
      - 스킵 가능한 온보딩
  en:
    name: Onboarding carousel skip pattern
    aliases:
      - Skippable onboarding flow
      - Onboarding skip rule
  one_liner: 온보딩 모든 페이지에서 항상 건너뛰기가 가능하고, 한 번 건너뛰면 다음 실행부터 다시 노출되지 않는 규칙.
  description: onboarding-pager의 페이지 넘김 구조 위에, 언제나 접근 가능한 건너뛰기 버튼과 건너뛴 뒤 재실행 시
    자동으로 다시 보여주지 않는 규칙, 그리고 도움말/설정에서 다시 찾아볼 수 있는 경로까지 묶은 상태 계약이다.
    onboarding-pager 자체의 anatomy는 점과 다음 버튼만 서술하며 건너뛰기 상태나 재노출 금지 규칙은 명시하지 않는다.
