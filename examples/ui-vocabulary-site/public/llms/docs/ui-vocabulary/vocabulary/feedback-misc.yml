  en:
    name: Scale transition
    aliases:
      - Zoom transition
      - Scale animation
  one_liner: 요소가 커지거나 작아지며 등장, 선택, 강조 상태를 표현하는 전환.
  description: 버튼 press, selected card, popover 등장처럼 중심에서 변화하는 느낌을 줄 때 쓴다.
