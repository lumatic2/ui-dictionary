- id: transition
  status: draft
  category: feedback
  group: feedback-misc
  kind: motion-pattern
  ko:
    name: 전환
    aliases:
      - transition
      - CSS transition
      - 상태 전환
  en:
    name: Transition
    aliases:
      - CSS transition
      - State transition
  one_liner: 요소의 상태 변화가 즉시 바뀌지 않고 일정 시간에 걸쳐 이어지게 하는 모션.
  description: hover, focus, open 상태 변화가 갑자기 튀지 않도록 색, 위치, 투명도 변화를 부드럽게 연결한다.
  visual_anatomy:
    - start state
    - changed property
    - duration
    - end state
  when_to_use:
    - 버튼 hover나 패널 열림처럼 짧은 상태 변화를 부드럽게 만들 때
  anti_use:
    - 사용자 입력 결과가 즉시 보여야 하는 중요한 상태를 느리게 만들지 않는다
  prompt_phrases:
    - 버튼 hover에 180ms transition을 넣어줘
