- id: docs-changelog-page
  status: draft
  category: data-display
  group: data-display-misc
  kind: block
  ko:
    name: 체인지로그 페이지
    aliases:
      - changelog page
      - 릴리즈 노트 페이지
      - 업데이트 히스토리 페이지
  en:
    name: Changelog page
    aliases:
      - Release notes page
      - Update history page
  one_liner: 날짜별로 묶인 릴리즈 항목을 카테고리 필터와 함께 나열하는 changelog 전용 페이지.
  description: release-note-card 단위 항목들을 날짜 헤더 아래 그룹핑하고, 상단 카테고리 필터 chip과 하단
    more-보기 페이지네이션으로 긴 변경 이력을 탐색 가능하게 만든다.
  visual_anatomy:
    - date header groups
    - release note cards per group
    - category filter chips
    - search field
    - show-more pagination
  when_to_use:
    - 제품의 전체 변경 이력을 날짜/카테고리별로 탐색 가능한 한 페이지로 제공해야 할 때
  anti_use:
    - 항목이 몇 개뿐이면 release-note-card 목록만으로 충분하고 별도 페이지 레이아웃은 과하다
  prompt_phrases:
    - 날짜별로 묶이고 카테고리 필터가 있는 changelog 페이지를 만들어줘
    - 릴리즈 노트를 최신순으로 나열하고 더보기 버튼을 넣어줘
