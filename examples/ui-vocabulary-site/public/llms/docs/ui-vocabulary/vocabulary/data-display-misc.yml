- id: blog-post-card
  status: draft
  category: data-display
  group: data-display-misc
  kind: component
  ko:
    name: 블로그 포스트 카드
    aliases:
      - blog post card
      - 블로그 카드
      - article card
  en:
    name: Blog post card
    aliases:
      - Article card
      - Post preview card
  one_liner: 블로그 글 하나를 썸네일과 요약으로 미리 보여주는 카드.
  description: 블로그 목록이나 그리드에서 글 제목, 요약, 작성자, 날짜를 함께 보여줘 클릭 전에 내용을 가늠하게 한다.
  visual_anatomy:
    - cover image
    - category tag
    - title
    - excerpt
    - author avatar
    - date
  when_to_use:
    - 블로그 목록에서 여러 글을 미리보기로 나열할 때
    - 관련 글 추천 영역을 만들 때
  anti_use:
    - 본문 전체를 카드에 담지 않는다
    - 단일 공지나 안내는 banner나 alert가 더 적합하다
  prompt_phrases:
    - 썸네일과 요약이 있는 blog post card를 만들어줘
    - 작성자와 날짜가 보이는 블로그 카드를 그리드에 배치해줘
  navigation:
    canonical_path:
      - Plus
      - UI Blocks
      - Marketing
      - Page Sections
      - Blog Sections
    also_appears_in:
      - - Plus
        - UI Blocks
        - Marketing
        - Page Sections
  asset:
    kind: mini-mock
    variant: blog-post-card
  sources:
    - source_id: blocks-so-library
      note: shadcn block ecosystem blog and article card examples
  confidence: medium
