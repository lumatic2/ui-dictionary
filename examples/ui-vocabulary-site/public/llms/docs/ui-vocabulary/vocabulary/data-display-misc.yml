    props:
      groups: 3
  sources:
    - source_id: ui-patterns-library
      note: date-grouped changelog/release notes page with category filters
  related:
    - id: release-note-card
      relation: use-with
      note: docs-changelog-page는 release-note-card를 날짜 그룹으로 배치하는 페이지 레이아웃이다.
  confidence: medium
