- id: carousel-peek
  status: draft
  category: structure
  group: structure-mobile
  ko:
    name: 피크 캐러셀
    aliases:
      - carousel peek
      - 옆 카드 살짝 보이기
      - 카드 피크
      - 다음 카드 보임
  en:
    name: Carousel peek
    aliases:
      - Peeking carousel
      - Partial next card
  one_liner: 다음 카드가 화면 가장자리에 살짝 보여 좌우 스와이프 가능함을 암시하는 모바일 캐러셀.
  description: 사용자가 가로 스크롤 가능한 콘텐츠임을 직관적으로 알아차리게 하는 시각적 힌트다.
  visual_anatomy:
    - active card
    - partially visible next card
    - horizontal overflow
    - swipe direction cue
  when_to_use:
    - 모바일에서 카드 목록이 가로로 더 있음을 보여주고 싶을 때
  anti_use:
    - 정확한 비교가 필요한 표나 긴 텍스트 카드에는 부적합하다
  prompt_phrases:
    - 다음 카드가 오른쪽에 살짝 보이는 carousel peek 레이아웃으로 만들어줘
  asset:
    kind: mini-mock
    variant: carousel-peek
    props:
      peeking: true
  sources:
    - source_id: material-m3-components
      note: carousel layouts and scroll affordance
  confidence: medium
- id: full-screen-dialog
  status: draft
  category: structure
  group: structure-mobile
  ko:
    name: 전체 화면 다이얼로그
    aliases:
      - full-screen dialog
      - 전체 화면 모달
      - 모바일 전체 화면 편집
  en:
    name: Full-screen dialog
    aliases:
      - Fullscreen dialog
      - Full-screen modal
  one_liner: 모바일에서 복잡한 작업을 별도 화면처럼 전체 화면으로 여는 모달.
  description: 작은 dialog나 bottom sheet에 담기 어려운 편집, 작성, 설정 흐름을 현재 맥락 위의 전체 화면 작업으로 만든다.
  visual_anatomy:
    - full-screen surface
    - close button
    - title
    - save action
    - form content
  when_to_use:
    - 모바일에서 작성이나 편집처럼 집중 작업이 필요할 때
  anti_use:
    - 단순 확인에는 alert dialog나 bottom sheet가 더 가볍다
  prompt_phrases:
    - 모바일에서 프로필 편집을 full-screen dialog로 열어줘
  asset:
    kind: mini-mock
    variant: full-screen-dialog
    props:
      title: true
  sources:
    - source_id: material-m3-components
      note: full-screen dialog component
  confidence: high
- id: large-title-header
  status: draft
  category: structure
  group: structure-mobile
  ko:
    name: 큰 제목 헤더
    aliases:
      - large title header
      - 라지 타이틀
      - 큰 타이틀 상단바
      - 접히는 큰 제목
      - 내비게이션 스택 헤더
  en:
    name: Large title header
    aliases:
      - Large title navigation bar
      - Collapsing large title
      - Navigation stack header
  one_liner: 모바일 화면 상단에서 큰 제목을 보여주고 스크롤 시 작게 접히는 헤더 패턴.
  description: 목록이나 홈 화면에서 현재 섹션을 강하게 드러내다가, 스크롤 후에는 공간을 아껴 compact header처럼 동작한다.
    계층형 드릴다운 화면에서는 뒤로가기 버튼과 함께 쓰이며, 뒤로가기는 시트 dismiss와 혼동해서는 안 되는 별개의 동작이다.
  visual_anatomy:
    - large title text
    - top safe area
    - collapsing header
    - content list below
    - optional back button
  when_to_use:
    - 모바일 앱의 첫 화면이나 주요 목록에서 섹션 이름을 크게 보여줄 때
  anti_use:
    - 작업 폼이나 밀도 높은 화면에는 공간을 많이 차지할 수 있다
    - 데스크톱 hero headline과 혼동하지 않는다
  prompt_phrases:
    - 모바일 목록 화면 상단에 스크롤하면 접히는 large title header를 넣어줘
  related:
    - id: top-app-bar
      relation: compare
      note: 스크롤 방향에 따라 바가 나타나거나 사라지는 show/hide 규칙은 large-title-header의 큰 제목 접힘과 별개로
        top-app-bar 자체에도 적용된다. 스크린리더가 활성 상태일 때는 스크롤로 바를 숨기지 않는 접근성 예외가 두 항목 모두에
        적용된다.
  asset:
    kind: mini-mock
    variant: large-title-header
    props:
      collapsible: true
  sources:
    - source_id: apple-hig-components
      note: navigation bars with large titles in app screens
  confidence: medium
