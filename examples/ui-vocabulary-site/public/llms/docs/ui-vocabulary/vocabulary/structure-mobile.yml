    - 배경을 어둡게 깔고 아래에서 modal bottom sheet가 올라오게 해줘
  asset:
    kind: mini-mock
    variant: modal-bottom-sheet
    props:
      scrim: true
  sources:
    - source_id: material-m3-components
      note: modal bottom sheets behavior
