      relation: compare
      note: 중앙 집중 창이면 dialog, 모바일 하단에서 올라오는 짧은 선택/폼이면 modal bottom sheet가 자연스럽다.
    - id: drawer
      relation: compare
      note: 측면 패널이면 drawer, 하단에서 배경을 막고 올라오면 modal bottom sheet다.
    - id: side-sheet
      relation: alternative
      note: 데스크톱의 보조 상세/편집 패널은 side sheet가 더 적합할 수 있다.
  confidence: high
