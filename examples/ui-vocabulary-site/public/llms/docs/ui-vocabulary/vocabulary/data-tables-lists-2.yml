# 테이블·리스트 (data-tables-lists) — part 2/2
# category: data-display · 용어 17개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: list
  status: draft
  category: data-display
  group: data-tables-lists
  ko:
    name: 리스트
    aliases:
      - 목록
      - list
  en:
    name: List
    aliases:
      - List view
  one_liner: 항목을 세로로 나열해 읽고 선택하게 하는 구조.
  description: 각 행은 텍스트, 아이콘, 보조 정보, 행동을 가질 수 있다.
  visual_anatomy:
    - stacked rows
    - primary text
    - secondary text
    - optional leading icon
  when_to_use:
    - 항목을 순서대로 읽거나 비교해야 할 때
    - 모바일에서 스캔 가능한 목록이 필요할 때
  anti_use:
    - 시각 비교가 중요하면 grid나 card layout이 낫다
    - 표 형식의 행열 데이터는 table을 쓴다
  prompt_phrases:
    - 알림을 list로 세로 나열해줘
    - 각 행에 아이콘과 설명이 있는 목록을 만들어줘
  asset:
    kind: mini-mock
    variant: list
    props:
      rows: 3
  sources:
    - source_id: material-m3-components
      note: lists component
  confidence: high
- id: nested-list
  status: draft
  category: data-display
  group: data-tables-lists
  ko:
    name: 중첩 리스트
    aliases:
      - nested list
      - 하위 목록
      - nested rows
  en:
    name: Nested list
    aliases:
      - Sublist
      - Nested rows
  one_liner: 목록 안의 항목 아래에 하위 항목을 들여쓰기해 보여주는 구조.
  description: 댓글 답글, 카테고리 하위 항목, 작업 subtasks처럼 부모-자식 관계를 표현한다.
  visual_anatomy:
    - parent row
    - indented child rows
    - expand state
    - hierarchy spacing
  when_to_use:
    - 목록 항목 사이에 위계가 있을 때
  anti_use:
    - 깊이가 깊어지면 tree view가 더 명확하다
  prompt_phrases:
    - 작업과 하위 작업을 nested list로 보여줘
  asset:
    kind: mini-mock
    variant: nested-list
    props:
      children: true
  sources:
    - source_id: material-m3-components
      note: lists component
