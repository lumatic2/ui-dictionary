- id: order-history-list
  status: draft
  category: data-display
  group: data-tables-lists
  kind: block
  ko:
    name: 주문 내역 목록
    aliases:
      - order history list
      - 주문 이력
      - 지난 주문 목록
  en:
    name: Order history list
    aliases:
      - Order list
      - Purchase history list
  one_liner: 과거 주문들을 날짜·금액·상태로 훑어보고 상세나 재주문으로 이어지는 목록.
  description: 계정의 여러 주문을 행 단위로 나열해 사용자가 과거 구매를 스캔하고 상세 확인이나 재주문을 시작하게 한다.
  visual_anatomy:
    - order row
    - date and order number
    - item thumbnails
    - total price
    - status chip
    - view detail or reorder action
  when_to_use:
    - 계정이나 마이페이지에서 여러 주문을 한 번에 훑어봐야 할 때
  anti_use:
    - 단일 주문 하나의 진행 상태만 보여줄 때는 order status가 더 적합하다
  prompt_phrases:
    - 날짜 금액 상태 칩이 있는 order history list를 마이페이지에 넣어줘
  related:
    - id: order-status
      relation: compare
      note: 단일 주문의 진행 상태 표시는 order status, 여러 주문을 스캔 가능한 행으로 나열하는 목록 뷰는 order history
        list다.
  asset:
    kind: mini-mock
    variant: order-history-list
    props:
      rows: 3
  sources:
    - source_id: blocks-so-library
      note: shadcn block ecosystem ecommerce order history blocks
  navigation:
    canonical_path:
      - Plus
      - Templates
      - Ecommerce Screens
    also_appears_in:
      - - Plus
        - UI Blocks
        - Ecommerce
        - Components
  confidence: medium
- id: permission-matrix-editor
  status: draft
  category: data-display
  group: data-tables-lists
  kind: block
  ko:
    name: 권한 매트릭스 편집기
    aliases:
      - permission matrix editor
      - 역할 권한 매트릭스
      - 권한표
  en:
    name: Permission matrix editor
    aliases:
      - Role permission matrix
      - Access matrix editor
  one_liner: 역할을 열, 권한·모듈을 행으로 배치해 체크박스로 접근 범위를 부여하는 매트릭스 편집기.
  description: ERP, CRM, 내부 어드민 도구에서 역할별로 어떤 모듈에 어떤 권한을 허용할지 표 형태로 한눈에 편집하게 한다.
  visual_anatomy:
    - role columns
    - permission rows grouped by module
    - checkbox or toggle cell
    - select-all in row/column
    - role inheritance indicator
    - duplicate role as base action
    - default-deny visualization
  when_to_use:
    - 역할별 접근 범위를 여러 모듈에 걸쳐 한 화면에서 관리해야 할 때
  anti_use:
    - 역할이 하나뿐이거나 권한이 단순하면 개별 permission-prompt나 role-badge 정도로 충분하다
  prompt_phrases:
    - 역할을 열로 권한을 행으로 배치한 permission matrix editor를 만들어줘
    - 체크박스로 모듈별 접근 권한을 켜고 끄는 권한 매트릭스를 넣어줘
  asset:
    kind: mini-mock
    variant: permission-matrix-editor
    props:
      roles: 3
  sources:
    - source_id: ui-patterns-library
      note: matrix-style permission and access control editors in admin tools
  related:
    - id: role-badge
      relation: compare
      note: role badge는 한 사용자의 역할을 작은 배지로 보여주는 표시 전용 요소이고, permission matrix editor는
        여러 역할과 모듈 조합의 접근 권한 자체를 표 형태로 편집하는 도구다
  confidence: medium
- id: pivot-table
