- id: review-list-with-filters
  status: draft
  category: data-display
  group: data-tables-lists
  kind: block
  ko:
    name: 필터 리뷰 목록
    aliases:
      - review list with filters
      - 리뷰 필터 목록
      - 후기 필터링 목록
  en:
    name: Review list with filters
    aliases:
      - Filterable review list
      - Review filter and sort list
  one_liner: 평점, 사진 유무, 구매 인증 여부로 개별 리뷰를 걸러내고 정렬하는 목록.
  description: 필터 칩과 정렬 컨트롤을 목록 위에 두어 사용자가 원하는 리뷰만 좁혀보게 한다.
    `reviews-summary-block`이 평점 분포 요약과 리뷰 목록을 한 블록으로 묶는 term이라면, 이 term은 그 목록
    안에서의 필터/정렬 상호작용 자체가 핵심이다.
  visual_anatomy:
    - filter chips for rating/has-photo/verified-purchase
    - sort control
    - review row with rating/author/date/body/photos
    - pagination or load-more
  when_to_use:
    - 상품 상세의 리뷰가 많아 사용자가 평점이나 사진
    - 구매 인증 여부로 좁혀봐야 할 때
  anti_use:
    - 리뷰 수가 적으면 필터 없이 reviews-summary-block만으로 충분하다
  prompt_phrases:
    - 평점 사진 유무 구매인증으로 거르는 review list with filters를 만들어줘
    - 최근순 도움순 정렬이 있는 필터 리뷰 목록을 넣어줘
  asset:
    kind: mini-mock
    variant: review-list-with-filters
    props:
      filters: 2
  sources:
    - source_id: blocks-so-library
      note: shadcn block ecosystem ecommerce review list and filter blocks
  related:
    - id: reviews-summary-block
      relation: compare
      note: 평점 분포 요약과 리뷰 목록을 한 블록으로 묶어 보여주는 것이 reviews summary block이고, 평점/사진 유무/구매 인증
        여부로 리뷰를 걸러내고 정렬하는 상호작용이 핵심이면 review list with filters다.
  confidence: medium
