    - 중요한 결정이나 긴 오류 설명은 dialog나 alert를 쓴다
    - 사용자가 반드시 읽어야 하는 정보를 자동으로 사라지게 하지 않는다
  prompt_phrases:
    - 저장되면 오른쪽 아래에 toast를 띄워줘
    - 복사 완료 스낵바를 보여줘
