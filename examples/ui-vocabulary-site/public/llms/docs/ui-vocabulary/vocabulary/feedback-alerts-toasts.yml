      relation: compare
      note: action 없이 짧은 상태만 알리면 toast, 실행 취소 같은 action이 있으면 snackbar가 좋다.
    - id: alert
      relation: compare
      note: 사용자가 계속 읽어야 하는 오류나 안내는 snackbar보다 alert/banner로 유지한다.
    - id: undo-toast
