    - 작업 결과를 짧게 알리고 되돌리기 같은 한 가지 행동을 제공할 때
  anti_use:
    - 중요한 오류나 긴 안내에는 alert나 dialog를 쓴다
  prompt_phrases:
    - 저장 완료 후 하단 snackbar에 실행 취소 버튼을 보여줘
  asset:
