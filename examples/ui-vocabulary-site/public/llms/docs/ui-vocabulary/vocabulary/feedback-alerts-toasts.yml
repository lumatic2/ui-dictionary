  when_to_use:
    - 특정 필드 묶음이나 섹션에만 관련된 안내가 있을 때
  anti_use:
    - 전역 문제는 alert banner나 dialog로 더 명확히 알린다
  prompt_phrases:
    - 결제 섹션 안에 inline alert로 카드 오류를 보여줘
  asset:
    kind: mini-mock
    variant: inline-alert
    props:
      tone: warning
  sources:
    - source_id: shadcn-ui-docs
      note: alert component variants
  confidence: high
