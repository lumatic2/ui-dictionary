# 알림·토스트·배너 (feedback-alerts-toasts)
# category: feedback · 용어 16개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: alert
  status: draft
  category: feedback
  group: feedback-alerts-toasts
  ko:
    name: 알림 배너
    aliases:
      - alert
      - banner
      - 경고 박스
  en:
    name: Alert
    aliases:
      - Banner
      - Inline alert
  one_liner: 중요한 상태나 경고를 지속적으로 보여주는 메시지 영역.
  description: 페이지 안에 배치되어 정보, 성공, 경고, 오류 상태를 설명한다.
  visual_anatomy:
    - status icon
    - message
    - colored container
    - optional action
  when_to_use:
    - 사용자가 알아야 하는 상태를 화면 안에 유지해야 할 때
    - 오류나 경고를 맥락 안에서 설명할 때
  anti_use:
    - 짧은 완료 피드백은 toast가 낫다
    - 확인을 요구하는 위험 행동은 dialog를 검토한다
  prompt_phrases:
    - 상단에 오류 alert banner를 보여줘
    - 결제 실패 안내를 inline alert로 넣어줘
  asset:
    kind: mini-mock
    variant: alert
    props:
      tone: warning
  sources:
    - source_id: shadcn-ui-docs
      note: alert component
  related:
    - id: toast
      relation: compare
      note: 잠깐 보여도 되는 완료 피드백은 toast, 화면 안에 유지해야 하는 안내는 alert/banner다.
    - id: snackbar
      relation: compare
      note: 짧은 메시지와 한 가지 action이면 snackbar, 맥락 안에서 지속 표시하면 alert가 맞다.
    - id: inline-alert
      relation: compare
      note: 폼이나 섹션 내부 오류처럼 위치 맥락이 중요하면 inline alert로 좁혀 부른다.
    - id: callout
      relation: compare
      note: 문서 본문 중간에 삽입되는 note/warning/tip 등급 강조 박스는 callout이고, 앱 화면의 지속적 상태/오류 안내는
        alert다.
  confidence: high
- id: announcement-banner
  status: draft
  category: feedback
  group: feedback-alerts-toasts
  ko:
    name: 공지 배너
    aliases:
      - announcement banner
      - 공지사항 배너
      - notice banner
  en:
    name: Announcement banner
    aliases:
      - Notice banner
      - Announcement bar
  one_liner: 제품 공지, 변경사항, 이벤트를 눈에 띄게 알리는 배너.
  description: 중요한 안내를 페이지 상단이나 섹션 상단에 배치하고 자세히 보기 행동을 제공한다.
  visual_anatomy:
    - announcement text
    - icon
    - link action
    - dismiss action
  when_to_use:
    - 사용자가 알아야 하는 제품 공지나 일시적 안내가 있을 때
  anti_use:
    - 사용자 작업 실패나 오류에는 error toast/alert가 더 정확하다
  prompt_phrases:
    - 상단에 닫을 수 있는 announcement banner를 넣어줘
  asset:
    kind: mini-mock
    variant: announcement-banner
    props:
      dismissible: true
  sources:
    - source_id: atlassian-design-components
      note: banner communication
  confidence: high
- id: callout
  status: draft
  category: feedback
  group: feedback-alerts-toasts
  kind: block
  ko:
    name: 콜아웃
    aliases:
      - callout
      - admonition
      - 강조 박스
  en:
    name: Callout
    aliases:
      - Admonition
      - Callout box
  one_liner: 문서 본문 중간에 note/tip/info/caution/danger 등급으로 구분해 삽입하는 강조 박스.
  description: 좌측 컬러 바 또는 배경색과 아이콘, 등급 라벨로 문단 사이에 삽입되어 본문 흐름을 방해하지 않으면서 중요한 보충 정보를
    강조한다. note/tip/info/caution/danger 5등급 명명은 Docusaurus 같은 문서 프레임워크의
    admonition 관례를 따른다.
  visual_anatomy:
    - left color bar or tinted background
    - grade icon
    - title label (Note/Tip/Info/Caution/Danger)
    - body text
    - full-width insertion between paragraphs
  when_to_use:
    - 문서 본문 중간에 보충 설명
    - 팁
    - 주의사항을 등급별로 구분해 강조해야 할 때
  anti_use:
    - 앱 화면의 지속적인 상태나 오류 안내는 alert/banner가 더 정확하다
    - 잠깐 보여줄 완료 피드백은 toast를 쓴다
  prompt_phrases:
    - 문서 본문에 note/warning 등급의 callout box를 넣어줘
    - 왼쪽 컬러 바가 있는 admonition 박스를 만들어줘
  asset:
    kind: mini-mock
    variant: callout
    props:
      tone: warning
  sources:
    - source_id: ui-patterns-library
      note: documentation callout/admonition box pattern (note/tip/info/caution/danger
        Docusaurus-style admonition grading)
  related:
    - id: alert
      relation: compare
      note: callout은 문서 본문 저작 콘텐츠에 삽입되는 등급별 강조 박스이고, alert는 앱 화면의 상태/오류를 알리는 지속적 메시지
        영역이다.
  confidence: medium
- id: error-toast
  status: draft
  category: feedback
  group: feedback-alerts-toasts
  ko:
    name: 오류 토스트
    aliases:
      - error toast
      - 실패 토스트
      - 에러 알림
  en:
    name: Error toast
    aliases:
      - Error notification
      - Failure toast
  one_liner: 가벼운 작업 실패를 짧게 알리고 재시도 같은 행동을 제공하는 알림.
  description: 저장 실패나 복사 실패처럼 맥락은 유지하되 즉시 피드백이 필요한 오류에 쓴다.
  visual_anatomy:
    - error icon
    - failure message
    - retry action
    - close action
  when_to_use:
    - 오류가 현재 화면 전체를 막지는 않지만 사용자가 알아야 할 때
  anti_use:
    - 화면을 사용할 수 없는 심각한 오류는 error state나 retry panel이 낫다
  prompt_phrases:
    - 업로드 실패 시 다시 시도 버튼이 있는 error toast를 보여줘
  asset:
    kind: mini-mock
    variant: error-toast
    props:
      retry: true
  sources:
    - source_id: material-m3-components
      note: snackbar action and feedback behavior
  confidence: high
- id: inline-alert
