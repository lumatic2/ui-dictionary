      relation: compare
      note: 사용자가 계속 봐야 하는 상태나 오류는 자동으로 사라지는 toast보다 alert/banner가 낫다.
    - id: dialog
      relation: alternative
      note: 사용자 결정을 받아야 하는 위험 행동은 toast가 아니라 dialog를 쓴다.
