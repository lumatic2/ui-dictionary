# 인증·온보딩 화면 (structure-auth-layouts)
# category: structure · 용어 7개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: auth-card
  status: draft
  category: structure
  group: structure-auth-layouts
  kind: block
  ko:
    name: 인증 카드
    aliases:
      - auth card
      - 로그인 카드
      - authentication card
  en:
    name: Auth card
    aliases:
      - Authentication card
      - Login card
  one_liner: 로그인, 가입, 비밀번호 복구 폼을 하나의 중앙 카드로 감싸는 인증 화면 블록.
  description: 인증 페이지의 핵심 폼을 로고, 제목, 설명, 보조 링크와 함께 카드 형태로 묶는다.
  visual_anatomy:
    - centered card
    - logo or product name
    - auth form
    - secondary links
    - optional provider buttons
  when_to_use:
    - 인증 폼을 독립적인 카드로 집중시켜 보여줄 때
  anti_use:
    - 전체 페이지 레이아웃과 마케팅 패널까지 포함하면 split-auth-layout이나 login-page가 더 맞다
  prompt_phrases:
    - 중앙에 로고와 login form이 들어간 auth card를 만들어줘
  asset:
    kind: mini-mock
    variant: auth-card
  sources:
    - source_id: shadcn-ui-docs
      note: card and form composition reference
  confidence: high
- id: consent-review-screen
  status: draft
  category: structure
  group: structure-auth-layouts
  ko:
    name: 동의 검토 화면
    aliases:
      - 권한 동의 검토
      - consent review
  en:
    name: Consent review screen
    aliases:
      - Permission consent review
      - Data consent review
  one_liner: 사용자가 연결이나 가입 전에 제공할 데이터와 권한 범위를 검토하는 화면.
  description: 민감한 권한이나 데이터 접근을 요청하기 전에 항목별 범위와 이유를 확인하게 한다.
  visual_anatomy:
    - consent summary
    - permission list
    - data scope rows
    - accept action
    - back action
  when_to_use:
    - 외부 계정 연결
    - 개인정보 제공
    - 조직 권한 승인 전에 범위 확인이 필요할 때
  anti_use:
    - 브라우저나 OS 시스템 권한은 permission-prompt가 처리한다
  prompt_phrases:
    - 외부 계정 연결 전에 접근 범위를 보여주는 consent review screen을 만들어줘
  asset:
    kind: mini-mock
    variant: consent-review-screen
  sources:
    - source_id: apple-hig-components
      note: privacy and permission transparency guidance
  confidence: medium
- id: invite-acceptance-screen
  status: draft
  category: structure
  group: structure-auth-layouts
  ko:
    name: 초대 수락 화면
    aliases:
      - 워크스페이스 초대 수락
      - invite acceptance
  en:
    name: Invite acceptance screen
    aliases:
      - Invitation acceptance screen
      - Join workspace screen
  one_liner: 초대 링크로 들어온 사용자가 초대 대상과 참여 행동을 확인하는 화면.
  description: 초대한 조직, 역할, 이메일 주소, 수락/거절 행동을 한 화면에서 보여준다.
  visual_anatomy:
    - workspace identity
    - inviter or role
    - invited email
    - accept action
    - decline action
  when_to_use:
    - 팀
    - 워크스페이스
    - 프로젝트 초대를 링크나 이메일로 처리할 때
  anti_use:
    - 이미 로그인한 사용자의 단순 팀 전환은 account-switcher가 더 적합하다
  prompt_phrases:
    - 워크스페이스 초대 링크를 열면 invite acceptance screen을 보여줘
  asset:
    kind: mini-mock
    variant: invite-acceptance-screen
  sources:
    - source_id: page-flows
      note: invitation and account onboarding flow reference
  confidence: medium
- id: login-dialog
  status: draft
  category: structure
  group: structure-auth-layouts
  kind: block
  ko:
    name: 로그인 다이얼로그
    aliases:
      - login dialog
      - 로그인 모달
      - sign in modal
  en:
    name: Login dialog
    aliases:
      - Sign in modal
      - Authentication dialog
  one_liner: 현재 페이지를 떠나지 않고 로그인 폼을 모달로 띄우는 인증 블록.
  description: 댓글 작성, 저장, 구매처럼 특정 행동 직전에 로그인 필요 상태를 빠르게 처리한다.
  visual_anatomy:
    - modal surface
    - dialog title
    - login form
    - close action
    - signup link
  when_to_use:
    - 사용자가 하던 맥락을 유지한 채 로그인만 요구해야 할 때
  anti_use:
    - 인증이 제품 진입의 첫 화면이면 login-page가 더 명확하다
  prompt_phrases:
    - 저장 버튼을 누르면 현재 페이지 위에 login dialog가 뜨게 해줘
  asset:
    kind: mini-mock
    variant: login-dialog
  sources:
    - source_id: shadcn-ui-docs
      note: dialog and form composition reference
  confidence: high
- id: login-page
  status: draft
  category: structure
  group: structure-auth-layouts
  kind: block
  ko:
    name: 로그인 페이지
    aliases:
      - login page
      - sign in page
      - 로그인 화면
  en:
    name: Login page
    aliases:
      - Sign in page
      - Authentication page
  one_liner: 사용자가 제품에 들어오기 전 로그인 폼과 브랜드 요소를 함께 보는 전체 페이지.
  description: auth card, 배경, 로고, 약관 링크, 보조 CTA를 포함하는 인증 목적의 독립 페이지다.
  visual_anatomy:
    - page background
    - logo area
    - auth card or form
    - legal links
    - signup or support link
  when_to_use:
    - 제품 진입 전에 별도 로그인 화면이 필요할 때
  anti_use:
    - 현재 작업 위에서 잠깐 재인증만 필요하면 login-dialog나 reauthentication-form이 더 적합하다
  prompt_phrases:
    - 중앙 로그인 카드와 하단 약관 링크가 있는 login page를 만들어줘
  asset:
    kind: mini-mock
    variant: login-page
  sources:
    - source_id: shadcn-ui-docs
      note: shadcn login block composition reference
  navigation:
    canonical_path:
      - Plus
      - Templates
      - Auth Screens
    also_appears_in:
      - - Plus
        - UI Blocks
        - Application UI
        - Page Examples
  confidence: high
- id: split-auth-layout
  status: draft
  category: structure
  group: structure-auth-layouts
  kind: block
  ko:
    name: 분할 인증 레이아웃
    aliases:
      - split auth layout
      - 좌우 분할 로그인
      - auth split screen
  en:
    name: Split auth layout
    aliases:
      - Auth split screen
      - Split login layout
  one_liner: 한쪽에는 로그인/가입 폼, 다른 쪽에는 브랜드 이미지나 설명을 배치한 인증 페이지 레이아웃.
  description: B2B SaaS나 브랜드 강조가 필요한 제품에서 인증 폼과 제품 메시지를 나란히 보여준다.
  visual_anatomy:
    - form column
    - brand or illustration panel
    - logo
    - responsive stacking
  when_to_use:
    - 인증 화면에서 제품 가치나 브랜드 이미지를 함께 보여주고 싶을 때
  anti_use:
    - 단순하고 빠른 로그인만 필요하면 auth-card나 login-page가 더 가볍다
  prompt_phrases:
    - 왼쪽은 로그인 폼 오른쪽은 제품 소개가 있는 split auth layout을 만들어줘
  asset:
    kind: mini-mock
    variant: split-auth-layout
  sources:
    - source_id: shadcn-ui-docs
      note: shadcn login page block composition reference
  confidence: high
- id: welcome-choice-screen
  status: draft
  category: structure
  group: structure-auth-layouts
  ko:
    name: 시작 선택 화면
    aliases:
      - 웰컴 선택 화면
      - 시작 방식 선택
  en:
    name: Welcome choice screen
    aliases:
      - Start choice screen
      - Welcome option screen
  one_liner: 새 사용자가 템플릿 선택, 새로 만들기, 가져오기처럼 시작 방식을 고르는 첫 화면.
  description: 빈 제품에 바로 떨어뜨리지 않고 사용자의 의도에 맞는 첫 경로를 선택하게 한다.
  visual_anatomy:
    - welcome headline
    - option cards
    - recommended option
    - skip or later link
  when_to_use:
    - 처음 시작할 수 있는 경로가 여러 개이고 사용자의 목적을 먼저 알아야 할 때
  anti_use:
    - 단순 소개 슬라이드는 onboarding-pager가 더 적합하다
  prompt_phrases:
    - 첫 방문자에게 새로 만들기 가져오기 템플릿 선택이 있는 welcome choice screen을 보여줘
  asset:
    kind: mini-mock
    variant: welcome-choice-screen
  sources:
    - source_id: mobbin-mobile-patterns
      note: onboarding and first-run choice flow reference
  confidence: medium
