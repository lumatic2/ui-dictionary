- id: animated-gradient-background
  status: draft
  category: style
  group: style-decorative-effects
  kind: visual-treatment
  ko:
    name: 애니메이션 그라디언트 배경
    aliases:
      - animated gradient
      - 움직이는 그라디언트
      - gradient background
  en:
    name: Animated gradient background
    aliases:
      - Moving gradient background
      - Gradient animation
  one_liner: 배경의 색상 흐름이 천천히 움직이며 화면에 동적인 분위기를 주는 효과.
  description: 히어로, 빈 상태, 로딩 화면에서 정적인 배경보다 부드러운 움직임을 줄 때 사용한다.
  visual_anatomy:
    - gradient surface
    - animated color stops
    - soft motion
    - content overlay
  when_to_use:
    - 랜딩이나 AI 화면에서 배경에 은은한 동적 분위기를 줄 때
  anti_use:
    - 업무용 밀도 높은 폼이나 표 화면에서는 집중을 방해할 수 있다
  prompt_phrases:
    - 히어로 배경에 은은한 animated gradient background를 넣어줘
  asset:
    kind: mini-mock
    variant: animated-gradient-background
  sources:
    - source_id: magic-ui-docs
      note: Magic UI background and animation effect examples
  confidence: medium
