- id: bottom-app-bar
  status: draft
  category: action
  group: action-buttons
  ko:
    name: 하단 앱 바
    aliases:
      - bottom app bar
      - 하단 액션 바
      - 모바일 하단바
  en:
    name: Bottom app bar
    aliases:
      - Bottom action bar
      - Mobile bottom bar
  one_liner: 모바일 화면 아래에서 주요 행동과 보조 명령을 담는 고정 액션 바.
  description: 엄지로 누르기 쉬운 하단 영역에 메뉴, FAB, 주요 액션을 배치해 반복 행동을 빠르게 실행하게 한다.
  visual_anatomy:
    - bottom bar surface
    - primary action
    - secondary icons
    - safe-area spacing
  when_to_use:
    - 모바일에서 주요 액션을 항상 접근 가능하게 둘 때
    - 상단보다 하단 조작이 더 편한 화면에서
  anti_use:
    - 최상위 목적지 전환에는 bottom navigation이나 tab bar가 더 적합하다
    - 너무 많은 행동을 넣지 않는다
  prompt_phrases:
    - 모바일 화면 하단에 주요 추가 버튼이 있는 bottom app bar를 넣어줘
  asset:
    kind: mini-mock
    variant: bottom-app-bar
    props:
      fab: true
  sources:
    - source_id: material-m3-components
      note: bottom app bar and FAB placement guidance
  confidence: high
