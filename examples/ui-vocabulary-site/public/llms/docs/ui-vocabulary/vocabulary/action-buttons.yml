- id: floating-action-button
  status: draft
  category: action
  group: action-buttons
  ko:
    name: 플로팅 버튼
    aliases:
      - FAB
      - floating action button
      - 떠 있는 버튼
      - 라벨 FAB
      - extended FAB
  en:
    name: Floating action button
    aliases:
      - FAB
      - Extended FAB
  one_liner: 화면 위에 떠 있는 핵심 행동 버튼.
  description: 보통 둥글거나 확장형이며 새 항목 만들기 같은 주요 행동을 항상 보이게 한다. 아이콘과 텍스트 라벨을 함께 보여주는 넓은
    pill 형태(extended FAB)도 같은 개념의 변형이며, 스크롤 시 라벨을 접어 아이콘만 남기는 방식으로 의미를 유지할 수 있다.
  visual_anatomy:
    - floating circular button
    - elevation shadow
    - icon
    - fixed position
    - optional text label pill variant
    - collapse-to-icon on scroll
  when_to_use:
    - 모바일이나 앱 화면에서 가장 중요한 생성 행동을 빠르게 제공할 때
  anti_use:
    - 여러 개를 남발하지 않는다
    - 일반 폼 제출 버튼 대신 쓰지 않는다
  prompt_phrases:
    - 오른쪽 아래에 플러스 FAB를 넣어줘
    - 새 글 작성 floating action button을 만들어줘
  asset:
    kind: mini-mock
    variant: floating-action-button
    props:
      icon: plus
  sources:
    - source_id: material-m3-components
      note: floating action button
  related:
    - id: speed-dial
      relation: compare
      note: 단일 FAB가 눌렸을 때 보조 행동 3-4개로 펼쳐지는 조합은 speed-dial 쪽 전개-펼침 전환이며, 펼침 중 배경 스크림을
        둘지는 주 행동과 보조 행동의 위계에 따라 결정한다.
  confidence: high
