  one_liner: 요소가 얼마나 투명하거나 불투명하게 보이는지를 조절하는 시각 속성.
  description: 비활성 상태, 배경 레이어, hover 전후 상태처럼 강도를 낮춰 위계를 만들 때 쓴다.
