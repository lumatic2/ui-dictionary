- id: blend-mode
  status: draft
  category: style
  group: style-border-color
  kind: visual-treatment
  ko:
    name: 블렌드 모드
    aliases:
      - blend mode
      - mix-blend-mode
      - 합성 모드
  en:
    name: Blend mode
    aliases:
      - Mix blend mode
      - Compositing mode
  one_liner: 겹친 색이나 이미지가 서로 어떻게 섞일지 정하는 시각 합성 방식.
  description: 배경 이미지 위 텍스트, 장식 레이어, hover 효과에서 단순 투명도와 다른 색 섞임을 만든다.
  visual_anatomy:
    - background color
    - foreground layer
    - blended overlap
    - contrast result
  when_to_use:
    - 브랜드 그래픽이나 hero 배경에서 레이어 색이 자연스럽게 섞여야 할 때
  anti_use:
    - 본문 가독성이나 접근성 대비가 불안정해지면 쓰지 않는다
  prompt_phrases:
    - 히어로 이미지 위 그래픽에 subtle blend mode를 적용해줘
  asset:
    kind: mini-mock
    variant: blend-mode
  sources:
    - source_id: mdn-css-reference
      note: CSS blend mode properties define visual compositing behavior
  confidence: medium
