- id: semantic-color
  status: draft
  category: style
  group: style-border-color
  kind: visual-treatment
  ko:
    name: 의미 색상
    aliases:
      - semantic color
      - semantic token
      - 의미 기반 색
  en:
    name: Semantic color
    aliases:
      - Semantic token
      - Meaning-based color
  one_liner: 파랑, 회색 같은 실제 색값이 아니라 성공, 위험, 배경, 본문처럼 의미로 이름 붙인 색상.
  description: 테마나 브랜드가 바뀌어도 UI 의도는 `destructive`, `muted`, `primary` 같은 의미 이름으로 유지한다.
  visual_anatomy:
    - semantic labels
    - color swatches
    - UI states
    - token mapping
  when_to_use:
    - 디자인 시스템에서 상태와 역할 중심으로 색을 관리할 때
  anti_use:
    - 일회성 장식 색까지 모두 semantic token으로 만들면 관리 비용이 커진다
  prompt_phrases:
    - 삭제 버튼은 red가 아니라 destructive semantic color를 쓰게 해줘
  related:
    - id: color-contrast
      relation: use-with
      note: semantic color도 실제 배경과 텍스트 대비를 만족해야 한다
  asset:
    kind: mini-mock
    variant: semantic-color
  sources:
    - source_id: material-m3-components
      note: Material design systems organize color by roles and states
  confidence: high
