- id: outline
  status: draft
  category: style
  group: style-border-color
  kind: visual-treatment
  ko:
    name: 아웃라인
    aliases:
      - outline
      - 외곽선
      - 윤곽선
  en:
    name: Outline
    aliases:
      - Outer outline
      - Focus outline
  one_liner: 요소 바깥쪽에 그려지는 윤곽선으로 경계나 포커스 상태를 보여주는 처리.
  description: focus ring, 선택 영역, 강조 상태를 border와 별도로 표시해 레이아웃 크기를 바꾸지 않고 상태를 드러낸다.
  visual_anatomy:
    - element boundary
    - outside outline
    - offset gap
    - highlighted state
  when_to_use:
    - 포커스나 선택 상태를 레이아웃 흔들림 없이 표시할 때
  anti_use:
    - outline을 없애고 대체 표시를 제공하지 않으면 접근성이 나빠진다
  related:
