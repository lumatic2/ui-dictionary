- id: hairline-border
  status: draft
  category: style
  group: style-border-color
  kind: visual-treatment
  ko:
    name: 헤어라인 보더
    aliases:
      - hairline border
      - 얇은 테두리
      - 1px border
      - 미세 테두리
  en:
    name: Hairline border
    aliases:
      - Thin border
      - One pixel border
      - Fine border
  one_liner: 표면의 경계를 아주 얇은 선으로만 구분하는 미세한 테두리 처리.
  description: 카드, 패널, 입력창을 그림자 없이 조용하게 구분하거나 glassmorphism 표면의 가장자리를 잡을 때 쓴다.
  visual_anatomy:
    - thin border
    - adjacent surface
    - subtle contrast
    - rounded corner optional
  when_to_use:
    - 밀도 높은 UI에서 그림자 대신 경계를 살짝 보여줄 때
    - 반투명 표면의 가장자리를 정리할 때
  anti_use:
    - 배경과 선 색이 너무 비슷해 경계가 보이지 않으면 대비를 높인다
  prompt_phrases:
    - 카드에 그림자 대신 얇은 hairline border를 넣어줘
  related:
    - id: shadow-elevation
      relation: alternative
      note: 그림자 대신 조용한 경계만 필요하면 hairline border가 낫다
    - id: color-contrast
      relation: use-with
      note: 얇은 선은 대비가 낮으면 보이지 않는다
  asset:
    kind: mini-mock
    variant: hairline-border
  sources:
    - source_id: mdn-css-reference
      note: CSS border properties define thin surface boundaries
  confidence: high
- id: highlight-stroke
  status: draft
  category: style
  group: style-border-color
  kind: visual-treatment
  ko:
    name: 하이라이트 스트로크
    aliases:
      - highlight stroke
      - edge highlight
      - 빛 테두리
      - 상단 하이라이트
  en:
    name: Highlight stroke
    aliases:
      - Edge highlight
      - Light stroke
      - Top highlight
  one_liner: 표면 가장자리에 밝은 선을 더해 빛을 받은 듯한 입체감을 주는 처리.
  description: 어두운 카드나 glass surface의 상단/외곽에 얇은 밝은 선을 넣어 표면 방향과 깊이를 강조한다.
  visual_anatomy:
    - surface edge
    - bright stroke
    - darker body
    - directional light
  when_to_use:
    - 어두운 표면이나 유리 표면이 배경과 섞여 경계가 약할 때
  anti_use:
    - 모든 카드에 강하게 넣으면 과장된 glossy UI처럼 보일 수 있다
  prompt_phrases:
    - 어두운 카드 위쪽에 은은한 highlight stroke를 넣어줘
  related:
    - id: hairline-border
      relation: compare
      note: hairline border는 경계 전체를 균일하게 잡고 highlight stroke는 빛 방향을 표현한다
    - id: glassmorphism
      relation: use-with
      note: 유리 표면의 가장자리와 빛 반사를 강조할 때 함께 쓴다
  asset:
    kind: mini-mock
    variant: highlight-stroke
  sources:
    - source_id: mdn-css-reference
      note: CSS border, outline, and shadow styling can create edge highlight
        treatments
  confidence: medium
