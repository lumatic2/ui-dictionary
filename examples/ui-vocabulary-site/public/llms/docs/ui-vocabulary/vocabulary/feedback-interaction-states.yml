# 인터랙션 상태 (feedback-interaction-states)
# category: feedback · 용어 9개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: active-state
  status: draft
  category: feedback
  group: feedback-interaction-states
  kind: visual-effect
  ko:
    name: 활성 상태
    aliases:
      - active state
      - 현재 상태
      - 활성 탭
  en:
    name: Active state
    aliases:
      - Current state
      - Active item
  one_liner: 현재 선택되어 적용 중인 탭, 메뉴, 항목을 나타내는 상태.
  description: 사용자가 현재 위치나 선택된 범위를 잃지 않도록 배경, 텍스트 색, indicator로 표시한다.
  visual_anatomy:
    - item list
    - active item
    - indicator
    - inactive siblings
  when_to_use:
    - 탭
    - nav
    - segmented control에서 현재 선택을 보여줄 때
  anti_use:
    - hover나 focus와 같은 임시 상태와 시각 표현이 너무 비슷하면 혼란스럽다
  prompt_phrases:
    - 현재 선택된 탭에 active state를 분명히 표시해줘
  asset:
    kind: mini-mock
    variant: active-state
  sources:
    - source_id: material-m3-components
      note: Material navigation components show selected and active states
  confidence: high
- id: disabled-state
  status: draft
  category: feedback
  group: feedback-interaction-states
  kind: visual-effect
  ko:
    name: 비활성 상태
    aliases:
      - disabled state
      - disabled
      - 사용할 수 없음
  en:
    name: Disabled state
    aliases:
      - Unavailable state
      - Disabled control
  one_liner: 현재 조건에서는 조작할 수 없는 컨트롤임을 보여주는 상태.
  description: 권한, 입력 누락, 로딩 중 같은 이유로 버튼이나 필드가 동작하지 않음을 명확히 한다.
  visual_anatomy:
    - disabled control
    - reduced emphasis
    - cursor or aria disabled
    - explanatory context
  when_to_use:
    - 조건이 충족되기 전까지 행동을 막아야 할 때
  anti_use:
    - 왜 비활성인지 설명 없이 막으면 사용자가 다음 행동을 알기 어렵다
  prompt_phrases:
    - 필수 입력 전에는 제출 버튼을 disabled state로 보여줘
  asset:
    kind: mini-mock
    variant: disabled-state
  sources:
    - source_id: wai-aria-apg-patterns
      note: APG patterns document disabled and unavailable interactive states
  confidence: high
- id: drag-state
  status: draft
  category: feedback
  group: feedback-interaction-states
  kind: visual-effect
  ko:
    name: 드래그 상태
    aliases:
      - drag state
      - dragging
      - 끌기 상태
  en:
    name: Drag state
    aliases:
      - Dragging state
      - Drag feedback
  one_liner: 사용자가 항목을 끌고 있는 동안 원본과 이동 대상을 보여주는 상태.
  description: 리스트 재정렬, 칸반 이동, 파일 업로드에서 어떤 항목이 움직이는지 그림자와 투명도로 알려준다.
  visual_anatomy:
    - grabbed item
    - lifted surface
    - placeholder
    - pointer movement
  when_to_use:
    - 항목을 위치 이동하거나 업로드 영역으로 끌 수 있을 때
  anti_use:
    - 키보드 대체 조작이 없으면 접근성이 부족해질 수 있다
  prompt_phrases:
    - 리스트 항목을 끌 때 drag state를 그림자와 placeholder로 보여줘
  asset:
    kind: mini-mock
    variant: drag-state
  sources:
    - source_id: mdn-css-reference
      note: CSS state styling and transforms support drag feedback visuals
  confidence: medium
- id: drop-target
  status: draft
  category: feedback
  group: feedback-interaction-states
  kind: visual-effect
  ko:
    name: 드롭 대상
    aliases:
      - drop target
      - 드롭존
      - 놓을 위치
  en:
    name: Drop target
    aliases:
      - Drop zone
      - Drop area
  one_liner: 드래그 중인 항목을 놓을 수 있는 영역을 강조해 보여주는 대상.
  description: 파일 업로드나 칸반 보드에서 항목을 어디에 놓을 수 있는지 border, 배경, 안내 문구로 표시한다.
  visual_anatomy:
    - target area
    - dashed border
    - active highlight
    - drag item
  when_to_use:
    - 사용자가 끌고 있는 항목을 특정 영역에 놓아야 할 때
  anti_use:
    - 단순 클릭 업로드만 있으면 file-upload나 upload-dropzone이 더 직접적이다
  prompt_phrases:
    - 파일을 끌어오면 drop target 영역을 강조해줘
  asset:
    kind: mini-mock
    variant: drop-target
  sources:
    - source_id: mdn-css-reference
      note: CSS styling is used to expose drag and drop target feedback
  confidence: medium
- id: focus-ring
  status: draft
  category: feedback
  group: feedback-interaction-states
  kind: visual-effect
  ko:
    name: 포커스 링
    aliases:
      - focus ring
      - focus outline
      - 키보드 포커스
  en:
    name: Focus ring
    aliases:
      - Focus outline
      - Keyboard focus indicator
  one_liner: 키보드나 보조기술로 현재 선택된 요소를 보여주는 윤곽선.
  description: 탭 이동 중 현재 조작 대상이 어디인지 알려주는 접근성 핵심 시각 신호다.
  visual_anatomy:
    - interactive element
    - visible outline
    - offset or ring
    - focus state
  when_to_use:
    - 버튼
    - 입력창
    - 링크 등 모든 키보드 조작 요소에 필요하다
  anti_use:
    - outline을 없애고 대체 표시를 제공하지 않으면 접근성이 크게 떨어진다
  prompt_phrases:
    - 모든 버튼에 명확한 focus ring을 넣어줘
  asset:
    kind: mini-mock
    variant: focus-ring
  sources:
    - source_id: wai-aria-apg-patterns
      note: APG patterns rely on visible keyboard focus indicators
  navigation:
    canonical_path:
      - Docs
      - Accessibility
    also_appears_in:
      - - Plus
        - UI Kit
        - Controls
  confidence: high
- id: hover-reveal
  status: draft
  category: feedback
  group: feedback-interaction-states
  kind: visual-effect
  ko:
    name: 호버 리빌
    aliases:
      - hover reveal
      - hover actions
      - 마우스오버 노출
  en:
    name: Hover reveal
    aliases:
      - Hover actions
      - Revealed on hover
  one_liner: 평소에는 숨겨 둔 보조 정보나 액션을 hover 때만 드러내는 패턴.
  description: 카드 액션, 행 메뉴, 보조 메타를 화면 밀도 안에서 조용히 숨기되 발견 가능성을 유지한다.
  visual_anatomy:
    - default card
    - hidden action
    - hover state
    - revealed control
  when_to_use:
    - 데스크톱에서 반복 항목의 보조 액션을 덜 시끄럽게 보여줄 때
  anti_use:
    - 모바일이나 키보드 사용자에게 같은 액션 접근 경로가 없으면 쓰면 안 된다
  related:
    - id: hover-state
      relation: use-with
      note: hover reveal은 hover state를 이용해 숨은 내용을 노출한다
  prompt_phrases:
    - 카드 오른쪽 액션은 hover reveal로 나타나게 해줘
  asset:
    kind: mini-mock
    variant: hover-reveal
  sources:
    - source_id: mdn-css-reference
      note: CSS hover pseudo-class supports hover-revealed controls
  confidence: high
- id: hover-state
  status: draft
  category: feedback
  group: feedback-interaction-states
  kind: visual-effect
  ko:
    name: 호버 상태
    aliases:
      - hover state
      - 마우스 오버
      - hover
  en:
    name: Hover state
    aliases:
      - Mouse hover
      - Hover effect
  one_liner: 포인터가 요소 위에 올라갔을 때 보여주는 반응 상태.
  description: 버튼, 카드, 메뉴 항목이 클릭 가능하거나 현재 포인터 대상임을 색, 그림자, 이동으로 보여준다.
  visual_anatomy:
    - default surface
    - pointer target
    - hover styling
    - transition
  when_to_use:
    - 데스크톱에서 클릭 가능한 요소임을 더 명확히 할 때
  anti_use:
    - 터치 기기에서는 hover에만 핵심 정보를 숨기면 안 된다
  prompt_phrases:
    - 카드에 hover state를 추가해서 클릭 가능해 보이게 해줘
  asset:
    kind: mini-mock
    variant: hover-state
  sources:
    - source_id: mdn-css-reference
      note: CSS pseudo-classes include hover state styling
  confidence: high
- id: selected-state
  status: draft
  category: feedback
  group: feedback-interaction-states
  kind: visual-effect
  ko:
    name: 선택 상태
    aliases:
      - selected state
      - selected
      - 선택됨
  en:
    name: Selected state
    aliases:
      - Selected item
      - Selection state
  one_liner: 여러 항목 중 사용자가 선택한 항목임을 나타내는 상태.
  description: checkbox, list item, chip, 카드 선택에서 현재 선택값을 표시하고 다음 행동의 맥락을 만든다.
  visual_anatomy:
    - item group
    - selected item
    - check mark or highlight
    - unselected items
  when_to_use:
    - 목록이나 카드 중 하나 이상을 선택할 때
  anti_use:
    - active navigation state와 selected data state를 같은 의미로 섞지 않는다
  prompt_phrases:
    - 선택된 카드에는 selected state와 체크 표시를 보여줘
  asset:
    kind: mini-mock
    variant: selected-state
  sources:
    - source_id: wai-aria-apg-patterns
      note: APG patterns distinguish selected states in composite widgets
  confidence: high
- id: tap-feedback
  status: draft
  category: feedback
  group: feedback-interaction-states
  kind: visual-effect
  ko:
    name: 탭 피드백
    aliases:
      - tap feedback
      - 터치 피드백
      - 누름 반응
  en:
    name: Tap feedback
    aliases:
      - Touch feedback
      - Press feedback
  one_liner: 터치나 클릭이 인식되었음을 색, 크기, 리플, 진동감 있는 변화로 즉시 보여주는 반응.
  description: 모바일에서 사용자가 버튼이나 행을 눌렀는지 확신할 수 있도록 아주 짧은 시각 반응을 준다.
  visual_anatomy:
    - touch target
    - pressed frame
    - feedback ripple or color
    - release state
  when_to_use:
    - 터치 대상이 즉시 반응해야 하는 버튼
    - 리스트 행
    - 카드에
  anti_use:
    - 비활성 요소나 오래 지속되는 상태 표시를 tap feedback으로 착각하게 만들지 않는다
  related:
    - id: touch-ripple
      relation: compare
      note: touch ripple은 tap feedback의 한 구체적 표현이다
  prompt_phrases:
    - 모바일 리스트 항목을 누르면 즉시 tap feedback이 보이게 해줘
  asset:
    kind: mini-mock
    variant: tap-feedback
  sources:
    - source_id: material-m3-components
      note: Material interaction states include press and touch feedback
  confidence: high
