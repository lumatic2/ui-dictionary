# 상태·알림 센터 (feedback-status-notifications)
# category: feedback · 용어 18개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: badge
  status: draft
  category: feedback
  group: feedback-status-notifications
  ko:
    name: 배지
    aliases:
      - badge
      - 숫자 표시
      - 상태 표시
  en:
    name: Badge
    aliases:
      - Status badge
      - Count badge
  one_liner: 숫자나 짧은 상태를 작게 강조하는 표시.
  description: 알림 개수, 상태, 라벨을 작고 눈에 띄게 보여준다.
  visual_anatomy:
    - small pill or dot
    - count or label
    - status color
  when_to_use:
    - 읽지 않은 개수나 상태를 빠르게 표시할 때
    - 카드나 메뉴 옆에 짧은 메타 정보를 붙일 때
  anti_use:
    - 긴 문장을 담지 않는다
    - 주요 행동 버튼처럼 쓰지 않는다
  prompt_phrases:
    - 알림 아이콘 위에 숫자 badge를 붙여줘
    - 상태를 초록색 배지로 표시해줘
  asset:
    kind: mini-mock
    variant: badge
    props:
      count: 3
  sources:
    - source_id: material-m3-components
      note: badges component
  confidence: high
- id: checkout-progress-header
