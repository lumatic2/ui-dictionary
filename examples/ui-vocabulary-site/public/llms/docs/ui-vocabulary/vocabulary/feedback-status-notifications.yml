  en:
    name: Coach mark
    aliases:
      - Feature hint
      - Spotlight hint
      - Guided tip
  one_liner: 특정 UI 요소를 강조하고 사용법을 짧게 알려주는 안내 오버레이.
  description: 새 기능이나 중요한 버튼을 처음 보여줄 때, 화면 위에 힌트 말풍선과 강조 영역을 덧씌운다.
  visual_anatomy:
    - highlighted target
    - overlay hint
    - pointer
    - dismiss action
  when_to_use:
    - 사용자가 놓치기 쉬운 새 기능이나 첫 사용 행동을 안내할 때
  anti_use:
    - 모든 기능을 코치마크로 설명하면 방해가 된다
    - 반복 노출은 피한다
  prompt_phrases:
    - 새 추가 버튼을 강조하는 coach mark를 한 번만 보여줘
  asset:
    kind: mini-mock
    variant: coach-mark
    props:
      visible: true
  sources:
    - source_id: apple-hig-components
      note: help and onboarding guidance for features
  confidence: medium
- id: connection-status
  status: draft
  category: feedback
  group: feedback-status-notifications
  ko:
    name: 연결 상태
    aliases:
      - connection status
      - 연결 표시
      - 네트워크 상태
  en:
    name: Connection status
    aliases:
      - Connectivity status
      - Network status
  one_liner: 실시간 연결, 재연결, 끊김 상태를 사용자에게 보여주는 표시.
  description: 채팅, 협업 편집, 스트리밍처럼 연결 상태가 기능 동작에 직접 영향을 줄 때 쓴다.
  visual_anatomy:
    - connection dot
    - label
    - reconnecting state
    - last update
  when_to_use:
    - 실시간 연결이 끊기면 사용자가 바로 알아야 하는 화면에서
  anti_use:
    - 일반 오프라인 안내는 offline state가 더 넓은 패턴이다
  prompt_phrases:
    - 상단에 연결됨 재연결중 연결 끊김 connection status를 보여줘
  asset:
    kind: mini-mock
    variant: connection-status
    props:
      reconnecting: true
  sources:
    - source_id: material-m3-components
      note: status and progress feedback
  confidence: medium
- id: conversation-marker
