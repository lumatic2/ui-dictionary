- id: delivery-tracker
  status: draft
  category: feedback
  group: feedback-status-notifications
  ko:
    name: 배송 추적
    aliases:
      - delivery tracker
      - 배달 추적
      - 배송 상태 타임라인
      - 주문 추적
      - 주문 추적 타임라인
  en:
    name: Delivery tracker
    aliases:
      - Order tracker
      - Delivery status timeline
      - Order tracking timeline
  one_liner: 주문이 접수, 준비, 이동, 도착 중 어디에 있는지 단계로 보여주는 모바일 상태 UI.
  description: 사용자가 기다리는 동안 현재 처리 상태와 다음 단계를 시간 순서로 이해하게 한다. 각 단계에 타임스탬프를 붙이고 배송사
    추적 번호와 외부 링크를 함께 노출하는 데스크톱/세로 타임라인 변형도 같은 개념이다.
  visual_anatomy:
    - status steps
    - active step
    - timeline dots
    - delivery labels
    - per-step timestamp
    - carrier tracking number and link
  when_to_use:
    - 배달
    - 배송
    - 픽업
    - 예약 진행 상태를 모바일에서 보여줄 때
  anti_use:
    - 단순 완료 여부만 있으면 status chip이나 toast로 충분하다
  prompt_phrases:
    - 주문 상태를 접수 조리 배달 단계로 보여주는 delivery tracker를 넣어줘
    - 배송사 추적 번호와 도착 예정일이 있는 order tracking timeline을 넣어줘
  asset:
    kind: mini-mock
    variant: delivery-tracker
    props:
      active: 1
  sources:
    - source_id: material-m3-components
      note: progress and status presentation
  confidence: high
