- id: inline-submit-field
  status: draft
  category: input
  group: input-text
  kind: component
  ko:
    name: 인라인 제출 필드
    aliases:
      - inline submit input
      - 입력창 안 제출 버튼
      - 붙어 있는 제출 필드
  en:
    name: Inline submit field
    aliases:
      - Input with inline submit
      - Joined submit input
  one_liner: 입력창과 제출 버튼을 한 줄 안에 붙여 짧은 값을 바로 제출하게 하는 필드.
  description: 이메일 구독, 초대 코드, 쿠폰 코드처럼 값 하나를 입력하고 즉시 적용하는 작은 폼에 쓴다.
  visual_anatomy:
    - input value
    - attached submit button
    - shared border or grouped surface
    - optional loading state
  when_to_use:
    - 값 하나를 입력하고 바로 적용하는 마이크로 폼이 필요할 때
    - 입력과 CTA가 분리되면 흐름이 느려지는 경우
  anti_use:
    - 여러 필드를 검토한 뒤 제출해야 하는 폼에는 일반 form layout이 더 적합하다
  prompt_phrases:
    - 이메일 구독을 inline submit field로 만들어줘
  related:
    - id: input-group
      relation: compare
      note: input group은 prefix/suffix 정보를 붙이는 조합이고, inline submit field는 제출 행동을 입력 옆에
        붙인다.
  asset:
    kind: mini-mock
    variant: inline-submit-field
  sources:
    - source_id: coss-ui-docs
      note: Origin input examples include attached button compositions
  confidence: medium
- id: input-group
  status: draft
  category: input
  group: input-text
  ko:
    name: 입력 그룹
    aliases:
      - input group
