- id: copy-field
  status: draft
  category: input
  group: input-text
  ko:
    name: 복사 필드
    aliases:
      - copy field
      - 복사 입력창
      - copyable field
  en:
    name: Copy field
    aliases:
      - Copyable field
      - Read-only copy input
  one_liner: 읽기 전용 값과 복사 버튼을 함께 제공하는 요소.
  description: 초대 링크, API 키, 쿠폰 코드처럼 사용자가 값을 직접 편집하지 않고 복사해야 할 때 쓴다.
  visual_anatomy:
    - read-only value
    - copy button
    - copied feedback
    - input-like container
  when_to_use:
    - 값을 보여주고 사용자가 클립보드로 가져가야 할 때
  anti_use:
    - 편집 가능한 입력창처럼 보이게 해서 혼동시키지 않는다
  prompt_phrases:
    - 초대 링크 옆에 복사 버튼이 있는 copy field를 넣어줘
  asset:
    kind: mini-mock
    variant: copy-field
    props:
      copied: false
  sources:
    - source_id: shadcn-ui-docs
      note: input and button composition
  confidence: medium
- id: field-group
  status: draft
  category: input
  group: input-text
  ko:
    name: 필드 그룹
    aliases:
      - field group
      - 폼 필드 그룹
      - 입력 그룹 묶음
  en:
    name: Field group
    aliases:
      - FieldGroup
      - Form field group
  one_liner: 라벨, 설명, 입력, 오류 메시지를 한 단위로 묶어 폼을 구성하는 패턴.
  description: shadcn form에서는 raw div보다 Field/FieldGroup으로 입력 요소의 구조와 상태를 일관되게 만든다.
  visual_anatomy:
    - field label
    - input control
    - description text
    - validation message
    - vertical grouping
  when_to_use:
    - 폼 입력을 일관된 라벨/설명/오류 구조로 만들 때
    - 여러 입력 필드를 같은 간격으로 묶을 때
  anti_use:
    - 단일 입력의 시각 요소 자체를 말할 때는 text field나 select를 쓴다
  prompt_phrases:
    - 로그인 폼을 field group으로 구성하고 이메일 필드 아래에 설명 문구를 넣어줘
  asset:
    kind: mini-mock
    variant: field-group
    props:
      invalid: true
  sources:
    - source_id: shadcn-ui-docs
      note: Field component and form layout pattern
  related:
    - id: mobile-form-field-stack
      relation: compare
      note: 같은 라벨-입력-helper 단위를 쓰지만, 모바일 화면에서는 48x48 최소 터치 타깃과 다음 필드로 넘어가는 키보드 액션 제약이
        추가된 mobile-form-field-stack을 쓴다.
  confidence: high
- id: fieldset
  status: draft
  category: input
  group: input-text
  kind: component
  ko:
    name: 필드셋
    aliases:
      - fieldset
      - 필드 묶음
      - 폼 그룹 제목
  en:
    name: Fieldset
    aliases:
      - Field set
      - Form fieldset
  one_liner: 관련된 여러 입력을 제목과 설명으로 묶는 폼 그룹.
  description: 주소, 결제 정보, 알림 설정처럼 한 주제로 묶인 필드들을 시각적·의미적으로 그룹화한다.
  visual_anatomy:
    - legend or group title
    - description
    - grouped fields
    - optional border or section spacing
  when_to_use:
    - 폼이 길고 입력들을 의미 있는 섹션으로 나눠야 할 때
    - 체크박스나 라디오 묶음에 공통 질문이 있을 때
  anti_use:
    - 입력이 하나뿐이면 label과 helper text로 충분하다
  prompt_phrases:
    - 배송 주소 입력들을 fieldset으로 묶고 제목을 붙여줘
  related:
    - id: field-group
      relation: compare
      note: field group은 시각적 묶음에 가깝고, fieldset은 여러 필드의 의미 그룹과 legend가 핵심이다.
  asset:
    kind: mini-mock
    variant: fieldset
  sources:
    - source_id: coss-ui-docs
      note: coss ui exposes Fieldset as a form primitive
  confidence: high
- id: floating-label-field
  status: draft
  category: input
  group: input-text
  kind: component
  ko:
    name: 플로팅 라벨 필드
    aliases:
      - floating label
      - 떠오르는 라벨
      - 플로팅 라벨 입력
  en:
    name: Floating label field
    aliases:
      - Floating label input
      - Float label field
  one_liner: 입력을 시작하면 placeholder처럼 보이던 라벨이 입력창 위로 작게 떠오르는 필드.
  description: 라벨 공간을 줄이면서도 입력 후에 필드 의미를 계속 남겨야 할 때 쓰는 입력 조합이다.
  visual_anatomy:
    - input container
    - label that moves above value
    - current value
    - focus or filled state
  when_to_use:
    - 좁은 폼에서 라벨을 항상 보이게 유지하고 싶을 때
    - 입력값이 있어도 필드 의미를 잃지 않아야 할 때
  anti_use:
    - 접근성과 가독성이 더 중요하면 일반 label + text-field가 더 명확하다
  prompt_phrases:
    - 이메일 입력창을 floating label field로 만들어줘
  related:
    - id: text-field
      relation: compare
      note: 일반 text field는 라벨 위치가 고정되고, floating label field는 입력 상태에 따라 라벨 위치가 바뀐다.
  asset:
    kind: mini-mock
    variant: floating-label-field
  sources:
    - source_id: coss-ui-docs
      note: legacy Origin input examples include floating label variants
