      - Input mask
  one_liner: 전화번호나 카드번호처럼 정해진 형식에 맞춰 표시되는 입력창.
  description: 사용자가 숫자를 입력하면 하이픈, 공백, 괄호 같은 구분자를 자동으로 넣어 읽기 쉽게 만든다.
