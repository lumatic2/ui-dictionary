# 텍스트·숫자 입력 (input-text)
# category: input · 용어 20개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: api-key-field
  status: draft
  category: input
  group: input-text
  ko:
    name: API 키 필드
    aliases:
      - api key field
      - secret key field
      - 키 표시 필드
  en:
    name: API key field
    aliases:
      - Secret key field
      - Token field
  one_liner: 민감한 API 키를 숨김 표시하고 복사하거나 재생성할 수 있는 필드.
  description: 개발자 설정에서 키 값을 노출하지 않으면서 필요한 행동을 제공한다.
  visual_anatomy:
    - masked value
    - reveal toggle
    - copy action
    - rotate action
  when_to_use:
    - 토큰이나 secret을 사용자가 확인/복사해야 할 때
  anti_use:
    - 일반 텍스트 값은 copy field가 더 단순하다
  prompt_phrases:
    - 숨김 표시와 복사 버튼이 있는 API key field를 넣어줘
  asset:
    kind: mini-mock
    variant: api-key-field
    props:
      masked: true
  sources:
    - source_id: shadcn-ui-docs
      note: input and button composition
  confidence: high
- id: character-count-field
  status: draft
  category: input
  group: input-text
  kind: component
  ko:
    name: 글자 수 카운터 필드
    aliases:
      - character count field
      - 글자수 표시 입력창
      - 입력 길이 카운터
  en:
    name: Character count field
    aliases:
      - Input with character counter
      - Textarea counter
  one_liner: 입력 가능한 길이와 현재 글자 수를 입력창 아래나 오른쪽에 보여주는 필드.
  description: 제목, 소개글, 메시지처럼 길이 제한이 있는 입력에서 사용자가 제한에 가까워지는지 확인하게 한다.
  visual_anatomy:
    - input or textarea
    - current count
    - maximum count
    - warning threshold
  when_to_use:
    - 글자 수 제한이 명확한 입력을 받을 때
    - 제한 초과 전에 사용자가 스스로 조절해야 할 때
  anti_use:
    - 길이 제한이 없거나 중요하지 않으면 보조 텍스트가 더 단순하다
  prompt_phrases:
    - 소개글 textarea 아래에 120자 character counter를 보여줘
  asset:
    kind: mini-mock
    variant: character-count-field
  sources:
    - source_id: coss-ui-docs
      note: Origin textarea/input examples include counters and helper states
  confidence: medium
- id: clearable-input
  status: draft
  category: input
  group: input-text
  kind: component
  ko:
    name: 지우기 버튼 입력창
    aliases:
      - clearable input
      - 지울 수 있는 입력창
      - 입력 지우기 버튼
  en:
    name: Clearable input
    aliases:
      - Input with clear button
      - Clear field
  one_liner: 입력값이 있을 때 오른쪽에 X 버튼을 보여 한 번에 내용을 비우는 입력창.
  description: 검색어, 필터 키워드, 임시 입력처럼 사용자가 자주 다시 입력하는 필드에서 입력 삭제 행동을 가까이 둔다.
  visual_anatomy:
    - text input
    - current value
    - clear icon button
    - empty or filled state
  when_to_use:
    - 검색어나 필터 값을 빠르게 지워야 할 때
    - 모바일에서 긴 값을 백스페이스로 지우기 번거로울 때
  anti_use:
    - 저장된 중요한 값을 실수로 지우면 안 되는 필드에는 쓰지 않는다
  prompt_phrases:
    - 검색창 오른쪽에 입력을 지우는 clear button을 넣어줘
  related:
    - id: search-field
      relation: compare
      note: search field는 검색 목적의 입력이고, clearable input은 값 삭제 행동이 핵심이다.
  asset:
    kind: mini-mock
    variant: clearable-input
  sources:
    - source_id: coss-ui-docs
      note: Origin input examples include trailing clear actions
  confidence: medium
