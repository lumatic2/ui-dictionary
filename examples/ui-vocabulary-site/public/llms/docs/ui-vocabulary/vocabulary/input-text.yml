      - prefix suffix input
  en:
    name: Input group
    aliases:
      - Input addon
      - Affixed input
  one_liner: 입력창 앞뒤에 아이콘, 단위, 버튼 같은 보조 요소를 붙인 입력 묶음.
  description: 금액 단위, URL prefix, 검색 아이콘, 복사 버튼처럼 입력값의 의미나 행동을 입력창과 함께 보여준다.
