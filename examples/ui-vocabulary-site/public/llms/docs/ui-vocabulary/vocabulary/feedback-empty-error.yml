- id: warning-state
  status: draft
  category: feedback
  group: feedback-empty-error
  ko:
    name: 경고 상태
    aliases:
      - warning state
      - 주의 상태
      - warning UI
  en:
    name: Warning state
    aliases:
      - Caution state
      - Warning UI
  one_liner: 위험하거나 주의가 필요한 상황을 노란색 계열과 설명으로 알려주는 상태.
  description: 삭제 전 확인, 할당량 초과 임박, 불완전한 설정처럼 즉시 실패는 아니지만 주의가 필요할 때 쓴다.
