- id: retry-panel
  status: draft
  category: feedback
  group: feedback-empty-error
  ko:
    name: 재시도 패널
    aliases:
      - retry panel
      - 다시 시도 영역
      - 실패 복구 패널
  en:
    name: Retry panel
    aliases:
      - Retry state panel
      - Recovery panel
  one_liner: 데이터 로드나 작업 실패 후 원인과 다시 시도 행동을 제공하는 패널.
  description: 사용자가 화면을 떠나지 않고 오류를 복구할 수 있도록 실패 메시지와 재시도 버튼을 둔다.
  visual_anatomy:
    - error message
    - retry action
    - support hint
    - optional details
  when_to_use:
    - 목록이나 카드 영역 일부가 실패했지만 재요청 가능할 때
  anti_use:
    - 전체 앱 장애나 점검은 maintenance state로 분리한다
  prompt_phrases:
    - 데이터 로드 실패 영역에 retry panel을 넣어줘
  asset:
    kind: mini-mock
    variant: retry-panel
    props:
      retry: true
  sources:
    - source_id: material-m3-components
      note: error and recovery feedback
  related:
    - id: background-job-queue-monitor
      relation: compare
      note: retry panel은 하나의 실패 상태를 복구하는 단일 패널이고, background job queue monitor는 여러 비동기
        작업의 큐 상태를 목록으로 감시하며 건별 재시도를 제공하는 별도 구조다
  confidence: high
