- id: empty-state
  status: draft
  category: feedback
  group: feedback-empty-error
  ko:
    name: 빈 상태
    aliases:
      - empty state
      - 데이터 없음 화면
  en:
    name: Empty state
    aliases:
      - No data state
  one_liner: 보여줄 데이터가 없을 때 이유와 다음 행동을 안내하는 화면.
  description: 아이콘, 짧은 문구, 보조 설명, 생성 버튼으로 빈 화면을 의미 있게 만든다.
  visual_anatomy:
    - empty icon or illustration
    - title
    - explanation
    - optional action button
  when_to_use:
    - 검색 결과가 없거나 아직 데이터가 없을 때
    - 사용자가 다음 행동을 알아야 할 때
  anti_use:
    - 오류 상태와 섞지 않는다
    - 빈 화면을 아무 설명 없이 방치하지 않는다
  prompt_phrases:
    - 데이터가 없을 때 empty state를 보여줘
    - 빈 목록에는 새 항목 만들기 버튼을 넣어줘
  asset:
    kind: mini-mock
    variant: empty-state
    props:
      action: true
  sources:
    - source_id: carbon-design-components
      note: empty states guidance
  confidence: medium
- id: empty-table
  status: draft
  category: feedback
  group: feedback-empty-error
  ko:
    name: 빈 테이블
    aliases:
      - empty table
      - 빈 표
      - no rows table
  en:
    name: Empty table
    aliases:
      - No rows table
      - Empty data table
  one_liner: 테이블에 표시할 행이 없을 때 빈 상태와 다음 행동을 보여주는 패턴.
  description: 단순히 빈 표만 보여주지 않고 이유, 검색 초기화, 새 항목 추가 같은 행동을 함께 제공한다.
  visual_anatomy:
    - table header
    - empty body
    - message
    - recovery action
  when_to_use:
    - 필터 결과가 없거나 아직 데이터가 없는 테이블에서
  anti_use:
    - 오류로 데이터를 못 불러온 상황은 error state로 구분한다
  prompt_phrases:
    - 테이블에 데이터가 없으면 empty table 상태와 추가 버튼을 보여줘
  asset:
    kind: mini-mock
    variant: empty-table
    props:
      action: true
  sources:
    - source_id: carbon-design-components
      note: empty states guidance
  confidence: high
- id: error-boundary
  status: draft
  category: feedback
  group: feedback-empty-error
  ko:
    name: 오류 경계 화면
    aliases:
      - error boundary
      - fallback UI
      - 컴포넌트 오류 화면
  en:
    name: Error boundary
    aliases:
      - Fallback UI
      - Component error fallback
  one_liner: 일부 UI가 실패했을 때 전체 앱 대신 해당 영역에 보여주는 복구 화면.
  description: 컴포넌트 렌더 오류나 데이터 실패를 격리하고 다시 시도 행동을 제공한다.
  visual_anatomy:
    - failed region
    - error message
    - retry action
    - contained fallback
  when_to_use:
    - 한 영역의 실패가 전체 화면을 망가뜨리지 않게 해야 할 때
  anti_use:
    - 사용자가 이해 못 하는 stack trace를 그대로 노출하지 않는다
  prompt_phrases:
    - 위젯 로딩 실패 시 retry 버튼이 있는 error boundary UI를 보여줘
  asset:
    kind: mini-mock
    variant: error-boundary
    props:
      retry: true
  sources:
    - source_id: carbon-design-components
      note: error and empty state guidance
  confidence: medium
- id: error-state
  status: draft
  category: feedback
  group: feedback-empty-error
  ko:
    name: 오류 상태
    aliases:
      - error state
      - 실패 화면
      - 오류 UI
  en:
    name: Error state
    aliases:
      - Failure state
      - Error UI
  one_liner: 작업이나 데이터 로딩이 실패했을 때 원인과 복구 행동을 보여주는 상태 화면.
  description: 오류 메시지, 재시도 버튼, 대체 행동을 함께 제공해 사용자가 막히지 않게 한다.
  visual_anatomy:
    - error icon
    - clear message
    - recovery action
    - optional detail text
  when_to_use:
    - 요청 실패
    - 권한 문제
    - 네트워크 오류처럼 사용자가 알아야 하는 실패가 발생했을 때
  anti_use:
    - 기술적인 에러 코드만 보여주지 않는다
    - 사용자가 할 수 있는 행동 없이 막아두지 않는다
  prompt_phrases:
    - 데이터 로딩 실패 시 error state를 보여줘
    - 재시도 버튼이 있는 오류 화면을 만들어줘
  asset:
    kind: mini-mock
    variant: error-state
    props:
      retry: true
  sources:
    - source_id: carbon-design-components
      note: error and empty state guidance
  confidence: medium
- id: info-state
  status: draft
  category: feedback
  group: feedback-empty-error
  ko:
    name: 정보 상태
    aliases:
      - info state
      - 안내 상태
      - informational message
  en:
    name: Info state
    aliases:
      - Informational state
      - Info message
  one_liner: 사용자가 알아두면 좋은 보조 정보를 중립적으로 보여주는 상태.
  description: 기능 제한, 팁, 시스템 안내처럼 경고나 오류는 아니지만 맥락 설명이 필요할 때 쓴다.
  visual_anatomy:
    - info icon
    - neutral container
    - concise message
    - optional link
  when_to_use:
    - 사용자에게 맥락이나 추가 설명을 제공해야 할 때
  anti_use:
    - 중요한 오류를 info처럼 약하게 표현하지 않는다
    - 긴 도움말은 documentation link로 분리한다
  prompt_phrases:
    - 상단에 info state 안내 박스를 넣어줘
    - 도움말 링크가 있는 정보 메시지를 보여줘
  asset:
    kind: mini-mock
    variant: info-state
    props:
      link: true
  sources:
    - source_id: shadcn-ui-docs
      note: alert component for informational messages
