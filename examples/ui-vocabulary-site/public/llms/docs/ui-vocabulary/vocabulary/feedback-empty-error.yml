# 빈 상태·오류 복구 (feedback-empty-error)
# category: feedback · 용어 14개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: empty-filter-state
  status: draft
  category: feedback
  group: feedback-empty-error
  kind: component
  ko:
    name: 필터 결과 없음 상태
    aliases:
      - empty filter state
      - 필터 빈 상태
      - 검색 결과 없음
  en:
    name: Empty filter state
    aliases:
      - Filtered empty state
      - No matching results
  one_liner: 필터나 검색 조건 때문에 결과가 없을 때 조건 해제와 재검색 행동을 함께 보여주는 빈 상태.
  description: 데이터가 아예 없는 것이 아니라 현재 조건에 맞는 항목이 없다는 점을 알려주고 필터 초기화를 돕는다.
  visual_anatomy:
    - empty illustration or icon
    - filter-specific message
    - clear filters action
    - optional suggested query
  when_to_use:
    - 검색어 또는 필터 적용 후 결과가 0개일 때
  anti_use:
    - 데이터 자체가 없으면 empty-state나 empty-table이 더 적합하다
  prompt_phrases:
    - 필터 결과가 없을 때 clear filters 버튼이 있는 empty filter state를 보여줘
  related:
    - id: empty-state
      relation: compare
      note: empty filter state는 조건 때문에 비어 있음을 설명하고, 조건 해제를 주요 행동으로 둔다.
  asset:
    kind: mini-mock
    variant: empty-filter-state
  sources:
    - source_id: coss-ui-docs
      note: coss ui Empty primitive and Origin table/filter examples inform filtered
        empty states
  confidence: medium
- id: empty-search-result
  status: draft
  category: feedback
  group: feedback-empty-error
  ko:
    name: 검색 결과 없음
    aliases:
      - empty search result
      - no results
      - 검색 빈 상태
  en:
    name: Empty search result
    aliases:
      - No results state
      - Empty results
  one_liner: 검색어에 맞는 결과가 없을 때 다음 행동을 안내하는 빈 상태.
  description: 검색어 확인, 필터 해제, 새 항목 생성 같은 복구 행동을 제공한다.
  visual_anatomy:
    - empty icon
    - query echo
    - suggestion text
    - clear filters action
  when_to_use:
    - 검색이나 필터 결과가 0개일 때
  anti_use:
    - 아직 데이터가 전혀 없는 상태는 empty state와 구분한다
  prompt_phrases:
    - 검색어와 필터 초기화 버튼이 있는 empty search result를 보여줘
  asset:
    kind: mini-mock
    variant: empty-search-result
    props:
      query: true
  sources:
    - source_id: material-m3-components
      note: empty and search states
