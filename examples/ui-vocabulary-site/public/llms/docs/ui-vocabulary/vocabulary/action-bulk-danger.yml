# 대량·위험 작업 (action-bulk-danger)
# category: action · 용어 6개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: bulk-action-bar
  status: draft
  category: action
  group: action-bulk-danger
  ko:
    name: 일괄 작업 바
    aliases:
      - bulk action bar
      - 선택 작업 바
      - bulk actions
  en:
    name: Bulk action bar
    aliases:
      - Selection action bar
      - Bulk actions
  one_liner: 여러 항목을 선택했을 때 삭제, 이동, 내보내기 같은 일괄 행동을 보여주는 바.
  description: 테이블이나 리스트에서 선택된 항목 수와 가능한 집합 행동을 한 영역에 표시한다.
  visual_anatomy:
    - selected count
    - action buttons
    - clear selection
    - elevated bar
  when_to_use:
    - 여러 행이나 카드에 같은 행동을 한 번에 적용해야 할 때
  anti_use:
    - 항목 하나에만 적용되는 행동은 row action으로 두는 편이 낫다
  prompt_phrases:
    - 테이블에서 행을 선택하면 bulk action bar가 나타나게 해줘
  asset:
    kind: mini-mock
    variant: bulk-action-bar
    props:
      selected: 3
  sources:
    - source_id: carbon-design-components
      note: data table row selection and batch actions
  confidence: medium
- id: destructive-confirmation
  status: draft
  category: action
  group: action-bulk-danger
  ko:
    name: 파괴적 작업 확인
    aliases:
      - destructive confirmation
      - 삭제 확인
      - 위험 작업 확인
  en:
    name: Destructive confirmation
    aliases:
      - Delete confirmation
      - Dangerous action confirmation
  one_liner: 삭제나 초기화처럼 되돌리기 어려운 행동 전 사용자의 명시 확인을 받는 UI.
  description: 위험한 결과를 설명하고 취소와 실행 버튼을 명확히 구분한다.
  visual_anatomy:
    - danger message
    - object name
    - cancel action
    - destructive action
  when_to_use:
    - 데이터 삭제
    - 권한 제거
    - 결제 취소처럼 영향이 큰 행동에서
  anti_use:
    - 되돌리기 쉬운 사소한 행동마다 confirmation을 띄우지 않는다
  prompt_phrases:
    - 프로젝트 삭제 전에 destructive confirmation dialog를 띄워줘
  asset:
    kind: mini-mock
    variant: destructive-confirmation
    props:
      typedConfirm: false
  sources:
    - source_id: wai-aria-apg-patterns
      note: alert dialog and modal confirmation
  confidence: high
- id: grab-handle
  status: draft
  category: action
  group: action-bulk-danger
  ko:
    name: 잡기 핸들
    aliases:
      - grab handle
      - 드래그 핸들
      - 잡고 끄는 손잡이
      - 이동 핸들
  en:
    name: Grab handle
    aliases:
      - Drag handle
      - Move handle
  one_liner: 항목이나 패널을 잡고 움직일 수 있음을 보여주는 작은 손잡이 affordance.
  description: 점, 막대, 그립 아이콘으로 드래그 가능한 영역을 명확히 표시한다.
  visual_anatomy:
    - grip dots or bars
    - draggable item
    - active drag state
  when_to_use:
    - 항목 이동이나 패널 크기 변경처럼 직접 조작이 가능한 곳에서
  anti_use:
    - 클릭만 가능한 요소에 장식처럼 붙이지 않는다
    - sheet-drag-handle과 용도를 구분한다
  prompt_phrases:
    - 각 리스트 항목 왼쪽에 잡고 끌 수 있는 grab handle을 넣어줘
  asset:
    kind: mini-mock
    variant: grab-handle
    props:
      active: false
  sources:
    - source_id: apple-hig-components
      note: drag affordances for reordering and direct manipulation
  confidence: medium
- id: swipe-action
  status: draft
  category: action
  group: action-bulk-danger
  ko:
    name: 스와이프 액션
    aliases:
      - swipe action
      - 밀어서 삭제
      - swipe row action
  en:
    name: Swipe action
    aliases:
      - Swipe row action
      - Swipe command
  one_liner: 모바일 목록 항목을 옆으로 밀어 숨겨진 행동을 드러내는 패턴.
  description: 삭제, 보관, 읽음 처리 같은 항목별 빠른 행동을 제스처로 제공한다.
  visual_anatomy:
    - list row
    - dragged offset
    - revealed action
    - destructive color optional
  when_to_use:
    - 모바일 목록에서 항목별 빠른 행동이 자주 필요할 때
  anti_use:
    - 중요 행동을 스와이프에만 숨기지 않는다
  prompt_phrases:
    - 알림 리스트 항목을 왼쪽으로 밀면 삭제 swipe action이 보이게 해줘
  asset:
    kind: mini-mock
    variant: swipe-action
    props:
      action: delete
  sources:
    - source_id: apple-hig-components
      note: mobile list actions guidance
  confidence: medium
- id: swipe-action-row
  status: draft
  category: action
  group: action-bulk-danger
  ko:
    name: 스와이프 액션 행
    aliases:
      - swipe action row
      - 옆으로 미는 행
      - 좌우 스와이프 명령
      - 리스트 스와이프 액션
  en:
    name: Swipe action row
    aliases:
      - Swipe row action
      - Leading trailing swipe action
  one_liner: 리스트 행을 좌우로 밀어 보관, 완료, 삭제 같은 명령을 드러내는 모바일 행.
  description: 한 방향 삭제뿐 아니라 양쪽 방향에 서로 다른 명령을 숨겨두는 목록 상호작용이다.
  visual_anatomy:
    - row surface
    - leading action
    - trailing action
    - horizontal reveal
    - action icons
  when_to_use:
    - 목록 항목마다 빠른 보조 명령이 두세 개 있을 때
  anti_use:
    - 명령을 발견하기 어려운 사용자에게는 더보기 메뉴나 명시 버튼을 함께 제공한다
  prompt_phrases:
    - 메시지 행을 좌우로 밀면 완료와 삭제 액션이 드러나는 swipe action row를 만들어줘
  asset:
    kind: mini-mock
    variant: swipe-action-row
    props:
      side: right
  sources:
    - source_id: apple-hig-components
      note: leading and trailing swipe actions
  confidence: high
- id: swipe-to-delete
  status: draft
  category: action
  group: action-bulk-danger
  ko:
    name: 밀어서 삭제
    aliases:
      - swipe to delete
      - 옆으로 밀어서 삭제
      - 스와이프 삭제
      - 밀면 삭제 버튼
  en:
    name: Swipe to delete
    aliases:
      - Swipe delete
      - Delete swipe action
  one_liner: 모바일 리스트 항목을 옆으로 밀어 삭제 명령을 드러내는 패턴.
  description: 항목 전체를 열지 않고 목록 안에서 빠르게 삭제할 수 있도록 빨간 삭제 영역을 노출한다.
  visual_anatomy:
    - list row
    - horizontal offset
    - revealed delete action
    - destructive color
  when_to_use:
    - 모바일 목록에서 항목별 삭제를 빠르게 제공할 때
  anti_use:
    - 삭제가 위험하거나 복구 불가능하면 확인 dialog나 undo snackbar를 함께 고려한다
  prompt_phrases:
    - 리스트 항목을 옆으로 밀어서 삭제 버튼이 드러나는 swipe to delete를 넣어줘
  asset:
    kind: mini-mock
    variant: swipe-to-delete
    props:
      revealed: true
  sources:
    - source_id: apple-hig-components
      note: swipe actions on list rows
  confidence: high
