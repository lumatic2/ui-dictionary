# 인증·보안 상태 (feedback-auth-security)
# category: feedback · 용어 14개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: access-pending-state
  status: draft
  category: feedback
  group: feedback-auth-security
  ko:
    name: 접근 승인 대기 상태
    aliases:
      - 권한 승인 대기
      - access pending
  en:
    name: Access pending state
    aliases:
      - Request pending state
      - Waiting for access approval
  one_liner: 접근 요청을 보낸 뒤 승인 전까지 현재 상태와 다음 가능 행동을 보여주는 화면.
  description: 요청이 접수되었음을 확인시키고 승인자, 예상 처리, 요청 취소나 다시 알림 같은 행동을 제공한다.
  visual_anatomy:
    - pending icon
    - request summary
    - approver hint
    - cancel or notify action
  when_to_use:
    - 권한 요청 후 즉시 접근할 수 없고 승인 처리를 기다려야 할 때
  anti_use:
    - 요청 전에는 access-request-panel이 맞고
    - 기술적 지연은 loading-state가 맞다
  prompt_phrases:
    - 권한 요청 후 access pending state를 보여주고 승인자 정보를 표시해줘
  asset:
    kind: mini-mock
    variant: access-pending-state
  sources:
    - source_id: atlassian-design-components
      note: status and permission flow reference
  confidence: medium
- id: access-request-panel
  status: draft
  category: feedback
  group: feedback-auth-security
  ko:
    name: 접근 요청 패널
    aliases:
      - 리소스 접근 요청
      - access request
  en:
    name: Access request panel
    aliases:
      - Request access panel
      - Resource access request
  one_liner: 접근 권한이 없는 리소스에서 관리자에게 권한을 요청하는 패널.
  description: 사용자가 왜 막혔는지, 어떤 권한을 요청하는지, 누구에게 요청되는지 확인하게 한다.
  visual_anatomy:
    - locked resource message
    - requested role
    - optional reason field
    - request access button
  when_to_use:
    - 문서
    - 프로젝트
    - 워크스페이스 접근 권한이 없지만 요청할 수 있을 때
  anti_use:
    - 권한 요청 자체가 불가능하면 locked-state가 더 적합하다
  prompt_phrases:
    - 접근 권한이 없을 때 사유 입력이 있는 access request panel을 보여줘
  asset:
    kind: mini-mock
    variant: access-request-panel
  sources:
    - source_id: atlassian-design-components
      note: permission and empty state pattern reference
  confidence: medium
- id: device-approval-state
  status: draft
  category: feedback
  group: feedback-auth-security
  ko:
    name: 기기 승인 대기 상태
    aliases:
      - 새 기기 승인 대기
      - device approval
  en:
    name: Device approval state
    aliases:
      - New device approval state
      - Waiting for device approval
  one_liner: 새 기기 로그인이나 접근 요청이 다른 기기에서 승인되기를 기다리는 상태.
  description: 사용자가 현재 화면에서 대기해야 하는 이유, 승인할 위치, 만료 시간을 알려준다.
  visual_anatomy:
    - device illustration
    - waiting status
    - countdown or expiry
    - resend or cancel action
  when_to_use:
    - 보안상 다른 기기나 관리자 승인이 필요한 로그인 흐름에서
  anti_use:
    - 일반 로딩이면 loading-state를 쓰고 승인 주체가 없으면 pending-approval-state가 더 넓다
  prompt_phrases:
    - 새 기기 로그인 승인 대기 device approval state를 보여주고 만료 시간을 표시해줘
  asset:
    kind: mini-mock
    variant: device-approval-state
  sources:
    - source_id: page-flows
      note: cross-device account approval flow reference
  confidence: medium
- id: email-verification-banner
  status: draft
  category: feedback
  group: feedback-auth-security
  ko:
    name: 이메일 인증 배너
    aliases:
      - 메일 인증 안내
      - 이메일 확인 배너
  en:
    name: Email verification banner
    aliases:
      - Verify email banner
      - Email confirmation notice
  one_liner: 아직 이메일을 인증하지 않은 사용자에게 상단에서 인증을 요청하는 배너.
  description: 가입 직후나 계정 설정 화면에서 이메일 인증이 필요한 상태를 계속 알려주고 재전송 행동을 제공한다.
  visual_anatomy:
    - inline banner
    - verification message
    - resend action
    - dismiss optional
  when_to_use:
    - 이메일 인증 전에도 일부 화면을 사용할 수 있지만 인증 완료를 유도해야 할 때
  anti_use:
    - 인증 없이는 진행할 수 없는 차단 상황이면 verification-required-screen이 더 명확하다
  prompt_phrases:
    - 상단에 이메일 인증 배너를 넣고 인증 메일 재전송 버튼을 보여줘
  asset:
    kind: mini-mock
    variant: email-verification-banner
  sources:
    - source_id: uswds-components
      note: banner and alert-like status messaging reference
  confidence: medium
- id: invite-expired-state
  status: draft
  category: feedback
  group: feedback-auth-security
  ko:
    name: 초대 만료 상태
    aliases:
      - 만료된 초대 링크
      - invite expired
  en:
    name: Invite expired state
    aliases:
      - Expired invitation state
      - Expired invite link
  one_liner: 초대 링크가 만료되었거나 사용할 수 없을 때 재요청 행동을 제공하는 상태 화면.
  description: 사용자가 링크가 왜 실패했는지 이해하고 새 초대를 요청하거나 관리자에게 문의할 수 있게 한다.
  visual_anatomy:
    - expired icon
    - invalid link message
    - request new invite action
    - contact support link
  when_to_use:
    - 초대 링크가 만료
    - 취소
    - 이미 사용됨 상태일 때
  anti_use:
    - 일반 링크 오류는 error-state나 retry-panel이 충분하다
  prompt_phrases:
    - 초대 링크가 만료되면 invite expired state와 새 초대 요청 버튼을 보여줘
  asset:
    kind: mini-mock
    variant: invite-expired-state
  sources:
    - source_id: page-flows
      note: account invitation failure flow reference
  confidence: medium
- id: magic-link-sent-state
  status: draft
  category: feedback
  group: feedback-auth-security
  ko:
    name: 매직 링크 전송 상태
    aliases:
      - 로그인 링크 전송됨
      - 이메일 로그인 대기 화면
  en:
    name: Magic link sent state
    aliases:
      - Sign-in link sent
      - Email link sent state
  one_liner: 로그인 링크를 이메일로 보낸 뒤 사용자가 메일함을 확인하도록 안내하는 상태 화면.
  description: 비밀번호 없는 로그인 흐름에서 전송된 이메일 주소, 재전송, 이메일 변경 행동을 함께 보여준다.
  visual_anatomy:
    - mail icon
    - sent address
    - check inbox message
    - resend timer
    - change email link
  when_to_use:
    - 매직 링크나 이메일 로그인 링크를 보낸 뒤 사용자가 앱 밖에서 확인해야 할 때
  anti_use:
    - 앱 안에서 코드를 바로 입력받는 흐름이면 otp-code-input이 더 적합하다
  prompt_phrases:
    - 로그인 링크를 보낸 뒤 magic link sent state를 보여주고 30초 후 재전송 버튼을 활성화해줘
  asset:
    kind: mini-mock
    variant: magic-link-sent-state
  sources:
    - source_id: page-flows
      note: email sign-in and account flow reference
  confidence: medium
