  prompt_phrases:
    - Google 계정 연결이 끊기면 reconnect account state와 다시 연결 버튼을 보여줘
  asset:
    kind: mini-mock
    variant: reconnect-account-state
  sources:
    - source_id: atlassian-design-components
      note: integration status and recovery pattern reference
  confidence: medium
- id: recovery-code-warning
  status: draft
