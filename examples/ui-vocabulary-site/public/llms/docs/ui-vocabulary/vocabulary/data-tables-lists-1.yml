- id: api-error-reference-table
  status: draft
  category: data-display
  group: data-tables-lists
  kind: block
  ko:
    name: API 에러 레퍼런스 테이블
    aliases:
      - api error reference table
      - 에러 코드 테이블
      - 에러 참조표
  en:
    name: API error reference table
    aliases:
      - Error code reference table
      - Error reference table
  one_liner: 에러 코드, 타입, HTTP 상태, 설명을 행으로 나열해 실패 케이스를 스캔 가능하게 만든 참조 테이블.
  description: API 레퍼런스 문서에서 파라미터 표와는 별도로, 발생 가능한 에러를 코드/타입/HTTP 상태 배지/설명 열로 나열한다.
    각 행은 anchor id를 가져 특정 에러로 바로 딥링크할 수 있다. 상태 열은 badge 용어의 색상 구분 배지를 그대로 재사용한다.
  visual_anatomy:
    - error code column (monospace)
    - error type column
    - HTTP status badge column
    - description column
    - per-row anchor id for deep-linking
  when_to_use:
    - API가 반환하는 에러 코드/상태를 체계적으로 스캔 가능한 표로 문서화해야 할 때
  anti_use:
    - 에러가 2~3종뿐이면 표 대신 본문 설명이나 callout으로 충분하다
  prompt_phrases:
    - 에러 코드/타입/HTTP 상태를 나열한 API 에러 레퍼런스 테이블을 만들어줘
    - 각 에러 행에 anchor id가 있어서 딥링크할 수 있는 에러 코드 표를 만들어줘
  asset:
    kind: mini-mock
    variant: api-error-reference-table
    props:
      rows: 4
  sources:
    - source_id: ui-patterns-library
      note: API error code reference table pattern with status badge column and
        per-row deep-link anchors
  related:
    - id: badge
      relation: use-with
      note: api-error-reference-table의 HTTP 상태 열은 badge 용어의 색상 구분 배지를 그대로 재사용한다 — 별도
        배지 컴포넌트를 새로 정의하지 않는다.
  confidence: medium
