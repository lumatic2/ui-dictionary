- id: radio-group
  status: draft
  category: selection
  group: selection-options
  ko:
    name: 라디오그룹
    aliases:
      - 라디오 버튼
      - 하나만 선택
      - radio
  en:
    name: Radio group
    aliases:
      - Radio buttons
  one_liner: 여러 선택지 중 정확히 하나를 고르는 요소 묶음.
  description: 각 옵션 앞에 원형 버튼이 있고, 하나를 선택하면 다른 선택은 해제된다.
  visual_anatomy:
    - group label
    - circular controls
    - selected dot
    - option labels
  when_to_use:
    - 선택지가 적고 모두 보여줘야 할 때
    - 사용자가 하나만 선택해야 할 때
  anti_use:
    - 여러 개 선택 가능하면 checkbox를 쓴다
    - 선택지가 많으면 select를 검토한다
  prompt_phrases:
    - 요금제를 하나 고르는 radio group을 넣어줘
    - 결제 방식을 라디오 버튼으로 선택하게 해줘
  asset:
    kind: mini-mock
    variant: radio-group
    props:
      selected: 1
  sources:
    - source_id: wai-aria-apg-patterns
      note: radio group pattern
  related:
    - id: checkbox
      relation: compare
      note: 하나만 선택하면 radio group, 여러 개 선택 가능하면 checkbox를 쓴다.
    - id: select
      relation: alternative
      note: 선택지가 많거나 공간을 아껴야 하면 select가 더 적합하다.
    - id: segmented-control
      relation: alternative
      note: 보기 모드처럼 즉시 전환되는 소수 옵션은 segmented control이 더 compact하다.
  navigation:
    canonical_path:
      - Plus
      - UI Kit
      - Forms
    also_appears_in:
      - - Plus
        - UI Blocks
        - Application UI
        - Forms
  confidence: high
