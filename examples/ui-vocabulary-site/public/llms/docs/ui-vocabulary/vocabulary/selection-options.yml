  prompt_phrases:
    - 여러 카테고리를 고르는 multi-select를 넣어줘
  asset:
    kind: mini-mock
    variant: multi-select
    props:
      selected: 2
  sources:
    - source_id: wai-aria-apg-patterns
      note: listbox pattern
