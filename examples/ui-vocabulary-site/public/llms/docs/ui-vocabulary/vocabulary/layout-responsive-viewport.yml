# 반응형·뷰포트 (layout-responsive-viewport)
# category: layout-rendering · 용어 7개
# 파생물 — 정본은 docs/ui-vocabulary/terms.yml. 손으로 고치지 마라.

- id: breakpoint
  status: draft
  category: layout-rendering
  group: layout-responsive-viewport
  kind: visual-treatment
  ko:
    name: 브레이크포인트
    aliases:
      - breakpoint
      - 반응형 분기점
      - responsive breakpoint
  en:
    name: Breakpoint
    aliases:
      - Responsive breakpoint
      - Media query breakpoint
  one_liner: 화면 너비 같은 조건에 따라 레이아웃이나 스타일이 바뀌는 기준점.
  description: 모바일, 태블릿, 데스크톱에서 같은 콘텐츠가 다른 열 수나 배치로 보이도록 분기한다.
  visual_anatomy:
    - small viewport
    - large viewport
    - layout change
    - threshold marker
  when_to_use:
    - 화면 크기에 따라 navigation이나 grid 구조를 바꿀 때
  anti_use:
    - 기기 이름만 기준으로 잡고 실제 콘텐츠 폭을 확인하지 않으면 깨질 수 있다
  prompt_phrases:
    - 768px breakpoint부터 카드 그리드를 2열로 바꿔줘
  asset:
    kind: diagram
    variant: breakpoint
  sources:
    - source_id: tailwind-utilities
      note: Tailwind responsive utility prefixes are breakpoint-based
  confidence: high
- id: container-query
  status: draft
  category: layout-rendering
  group: layout-responsive-viewport
  kind: visual-treatment
  ko:
    name: 컨테이너 쿼리
    aliases:
      - container query
      - 컨테이너 기준 반응형
      - component query
  en:
    name: Container query
    aliases:
      - Component query
      - Container-based responsive style
  one_liner: 화면 전체가 아니라 부모 컨테이너 크기에 따라 컴포넌트 스타일을 바꾸는 반응형 조건.
  description: 같은 카드가 사이드바, 그리드, 상세 패널 안에서 서로 다른 폭에 맞춰 재배치되게 한다.
  visual_anatomy:
    - same component
    - narrow container
    - wide container
    - internal layout change
  when_to_use:
    - 컴포넌트가 놓이는 영역 폭에 따라 내부 배치를 바꿔야 할 때
  anti_use:
    - 페이지 전체 breakpoint 하나로 충분하면 container query가 과할 수 있다
  prompt_phrases:
    - 카드 컴포넌트는 container query로 좁은 영역에서 세로 배치되게 해줘
  related:
    - id: breakpoint
      relation: compare
      note: breakpoint는 viewport 기준이고 container query는 컴포넌트가 들어간 영역 기준이다
  asset:
    kind: diagram
    variant: container-query
  sources:
    - source_id: mdn-css-layout
      note: CSS layout documentation covers component and container-responsive layout
        concepts
  confidence: high
- id: dynamic-viewport-unit
  status: draft
  category: layout-rendering
  group: layout-responsive-viewport
  kind: visual-treatment
  ko:
    name: 동적 뷰포트 단위
    aliases:
      - dynamic viewport unit
      - dvh
      - svh
      - lvh
  en:
    name: Dynamic viewport unit
    aliases:
      - dvh
      - svh
      - lvh
      - Dynamic viewport height
  one_liner: 모바일 브라우저 주소창처럼 변하는 viewport 높이를 반영하는 CSS 단위.
  description: full-height 화면, bottom sheet, 모바일 앱 셸이 주소창 표시 변화 때문에 잘리거나 튀지 않도록 한다.
  visual_anatomy:
    - mobile viewport
    - browser chrome
    - stable height
    - dynamic height
  when_to_use:
    - 모바일에서 100vh 영역이 주소창 때문에 잘리거나 흔들릴 때
  anti_use:
    - 단순 콘텐츠 페이지에는 일반 min-height와 자연 스크롤이 더 단순할 수 있다
  prompt_phrases:
    - 모바일 full-height 화면은 100dvh 기준으로 잘리지 않게 해줘
  asset:
    kind: diagram
    variant: dynamic-viewport-unit
  sources:
    - source_id: mdn-css-reference
      note: CSS viewport-relative units include dynamic viewport units
  confidence: high
- id: fluid-layout
  status: draft
  category: layout-rendering
  group: layout-responsive-viewport
  kind: visual-treatment
  ko:
    name: 유동 레이아웃
    aliases:
      - fluid layout
      - fluid UI
      - 유연한 레이아웃
  en:
    name: Fluid layout
    aliases:
      - Fluid UI
      - Flexible layout
  one_liner: 고정 폭 대신 사용 가능한 공간에 맞춰 크기와 간격이 자연스럽게 변하는 레이아웃.
  description: breakpoint 사이에서도 카드 폭, 컨테이너, 타이포 크기가 뚝뚝 끊기지 않고 부드럽게 적응하게 한다.
  visual_anatomy:
    - narrow width
    - medium width
    - wide width
    - continuous resizing
  when_to_use:
    - 다양한 화면 폭에서 같은 콘텐츠가 자연스럽게 늘고 줄어야 할 때
  anti_use:
    - 최소/최대 폭 제한 없이 무한히 늘리면 읽기 폭이 망가진다
  prompt_phrases:
    - 카드 그리드는 fluid layout으로 폭에 맞게 자연스럽게 바뀌게 해줘
  asset:
    kind: diagram
    variant: fluid-layout
  sources:
    - source_id: mdn-css-layout
      note: CSS layout guidance covers flexible and responsive layout behavior
  confidence: high
- id: mobile-first
  status: draft
  category: layout-rendering
  group: layout-responsive-viewport
  kind: visual-treatment
  ko:
    name: 모바일 우선
    aliases:
      - mobile first
      - 모바일 퍼스트
      - 작은 화면 우선
  en:
    name: Mobile-first
    aliases:
      - Mobile first design
      - Small-screen-first
  one_liner: 작은 화면을 기본으로 설계한 뒤 넓은 화면에서 레이아웃을 확장하는 반응형 접근.
  description: 핵심 정보와 조작을 먼저 압축해 정리하고, desktop에서는 사이드바나 다중 열을 추가한다.
  visual_anatomy:
    - mobile single column
    - desktop enhancement
    - shared content
    - breakpoint growth
  when_to_use:
    - 모바일 사용 비중이 높거나 작은 화면에서도 모든 핵심 흐름이 작동해야 할 때
  anti_use:
    - 복잡한 전문 업무 화면에서 desktop density가 핵심이면 별도 desktop 설계가 필요할 수 있다
  prompt_phrases:
    - 이 화면은 mobile-first로 만들고 desktop에서는 2열로 확장해줘
  related:
    - id: responsive-layout
      relation: use-with
      note: mobile-first는 responsive layout을 설계하는 한 접근 방식이다
  asset:
    kind: diagram
    variant: mobile-first
  sources:
    - source_id: tailwind-utilities
      note: Tailwind responsive utilities are commonly applied mobile-first
  confidence: high
- id: responsive-layout
  status: draft
  category: layout-rendering
  group: layout-responsive-viewport
  kind: visual-treatment
  ko:
    name: 반응형 레이아웃
    aliases:
      - responsive layout
      - 반응형 UI
      - responsive design
  en:
    name: Responsive layout
    aliases:
      - Responsive design
      - Adaptive layout
  one_liner: 화면 크기와 입력 환경에 맞춰 배치, 크기, 탐색 구조가 조정되는 레이아웃.
  description: 같은 기능이 모바일에서는 단일 열, 데스크톱에서는 다중 열과 사이드바로 보이게 한다.
  visual_anatomy:
    - mobile layout
    - desktop layout
    - reflowed content
    - navigation adaptation
  when_to_use:
    - 웹앱을 모바일과 데스크톱에서 모두 자연스럽게 써야 할 때
  anti_use:
    - 단순 축소만 하고 터치 크기나 읽기 폭을 조정하지 않으면 반응형이 아니다
  prompt_phrases:
    - 이 대시보드를 mobile-first responsive layout으로 정리해줘
  asset:
    kind: diagram
    variant: responsive-layout
  sources:
    - source_id: mdn-css-layout
      note: CSS layout docs cover responsive layout techniques
  confidence: high
- id: safe-area-inset
  status: draft
  category: layout-rendering
  group: layout-responsive-viewport
  kind: visual-treatment
  ko:
    name: 안전 영역 인셋
    aliases:
      - safe area inset
      - notch inset
      - 홈 인디케이터 여백
  en:
    name: Safe-area inset
    aliases:
      - Safe area padding
      - Notch inset
      - Home indicator inset
  one_liner: 노치, 둥근 모서리, 홈 인디케이터에 UI가 가려지지 않도록 더하는 기기 안전 여백.
  description: 모바일 하단 CTA, bottom navigation, full-screen panel이 시스템 영역과 겹치지 않게 한다.
  visual_anatomy:
    - device edge
    - unsafe area
    - padded control
    - safe area label
  when_to_use:
    - 모바일 하단 고정 버튼이나 전체 화면 레이아웃을 만들 때
  anti_use:
    - 일반 desktop layout에서는 불필요한 빈 공간이 될 수 있다
  prompt_phrases:
    - 하단 CTA 바에 safe-area inset padding을 적용해줘
  asset:
    kind: diagram
    variant: safe-area-inset
  sources:
    - source_id: apple-hig-components
      note: Apple HIG emphasizes respecting device safe areas
  confidence: high
